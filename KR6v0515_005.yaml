body:
  text: 臣汪孟鋗恭纂物產泉品二龍井水見咸淳臨安志詳卷一又煙霞嶺下水樂洞四望林巒聳秀巖石蟠峙有洞虛窈渟涵如淵泉味清甘與龍井埒老龍井水見西湖遊覽志詳卷一聶心湯錢塘縣志田子藝品泉以龍泓武林第一田藝蘅煮泉小品武林諸泉惟龍泓入品而茶亦惟龍泓山為最其上為老龍泓寒碧倍之其地產茶為南北山絕品謹案陸羽茶經論水山水上江水次井水下又云山水乳泉石池漫流者上瀑湧湍潄勿食歐陽修謂羽論水惡渟漫而喜泉源則龍井之水是已竹品一風篁嶺竹楊維楨等西湖竹枝詞別里沙詞風篁嶺下月色涼無數竹枝官道旁東家為愛青青節截得參差吹鳳凰西湖遊覽志地多蒼筤篠簜風韻淒清謹案咸淳臨安志竹有八種曰碧玉間黃金竹筀竹淡竹紫竹斑竹金竹鶴膝竹苦竹惟鶴膝竹據元時息齋道人李衎竹譜詳錄謂生杭州西湖靈隱山中節密而內實略如天壇籐間有突起如鶴膝人取為拄杖又引葉世程閩中記謂古田縣亦有之不言出風篁嶺也花品二風篁嶺梅東坡集探梅詩問訊風篁嶺下梅魏㟲錢塘縣志雞籠山在嶺下舊多梅花土人稱梅花嶺老龍井素蘭魏㟲錢塘縣志老龍井產素蘭品絕一郡謹案咸淳臨安志蕙蘭引蘇軾題楊傑蕙蘭二詩南山深處宜其品絕也茶品一老龍井茶西湖志劉瑛詩謝龍井僧寄茶春茗初收穀雨前老僧分惠意殷虔也知顧渚無雙品煩試吳山第一泉竹裏細烹清睡思風前小啜悟談禪相酬擬作長歌贈淺薄何能繼玉川王寅十岳山人集龍井試茶昔嘗顧渚茗鑿得金沙泉舊遊懷莫置幽事復依然綠染龍波上香搴穀雨前況於山寺裏藉此可談禪于若瀛弗告堂集龍井茶歌西湖之西開龍井煙霞近接南山嶺飛流密汩寫幽壑石磴紆曲片雲冷拄杖尋源到上方松枝半落澄潭靜銅缾試取烹新茶濤起龍團沸穀芽中頂無須憂獸迹湖山豈懼涸金沙漫道白芽雙井嫩未必紅泥方印嘉世人品茶未嘗見但說天池與陽羨豈知新茗煮新泉團黃分列浮甌面二槍浪自附三篇一串應輸錢五萬西湖遊覽志其地產茶為兩山絕品郡志稱寶雲香林白雲諸茶乃在靈竺葛嶺之間未若龍井之清馥雋永也浙江通志錢塘龍井富陽及餘杭徑山多產之魏㟲錢塘縣志此地產茶歲不過數斤在寶雲香林白雲諸品之上附茶真贋優劣谷應泰博物要覽浙江省杭州有龍井茶垂雲茶天目茶徑山茶昌化茶凡六品快雪堂集漫錄昨同徐茂吳至老龍井買茶小民十數家各出茶茂吳以次點試皆以為贋曰真者甘香而不冽稍冽便為諸山贋品得一二兩以為真物試之果甘香若蘭而山人及寺僧反以茂吳為非吾亦不能置辨偽物亂真如此子晉云本山茶微帶黑不甚清翠點之色白如玉而作寒豆香宋人呼為白雲茶稍綠便為天池物天池龍井為茶中臣種謹案唐宋尚建茶元和郡縣志樂史太平寰宇記杭之土貢俱不及茶至咸淳臨安志而茶滋詳矣據志云臨安歲貢茶錢塘寶雲產者名寶雲茶下天竺香林洞產者名香林茶上天竺白雲峯產者名白雲茶又寶嚴院垂雲亭亦產茶白雲垂雲並見東坡詩又東坡遊諸佛舍一日飲釅茶七盞戲書云且盡盧仝七椀茶蓋南北兩山及七邑大抵皆產茶近日徑山寺僧採穀雨前者以小缶貯送而獨未聞龍井茶之名以趙抃龍泓亭詩敘老僧烹小龍團迓余考之山之未有茶可知龍井茶始見西湖遊覽志自後品鬬遂多據志蓋老龍井側特未詳何年著稱然讀虞集次鄧文原遊龍井詩有烹煎黃金芽不取穀雨後之句度龍井茶元時已有之矣今寺內外徧植茶樹要以近老龍井者為佳又柴老餉龍井茶一斤試茶安樂山香勝龍泉味勝豈炒製不如法損其香耶又石城山產茶品在天池龍井之上廣羣芳譜引茶箋龍井茶不過數十畝外此有茶皆不及天目為天池龍井之次又西吳枝乘湖人於茗不數顧渚而數羅岕然顧渚之佳者其風味已遠出龍井下岕稍清雋然葉麤而作草氣丁長孺嘗以半角見餉且教余烹煎之法迨試之殊類羊公鶴此余有解有未解也余嘗品茗以武夷虎邱第一淡而遠也松羅龍井次之香而豔也天池又次之常而不厭也餘子瑣瑣勿置齒喙石公集天目山記頭茶之香者遠勝龍井浙江通志杭郡諸茶總不及龍井之產而雨前細芽取其一旗一槍尤為珍品第所產不多宜其矜貴也文震亨長物志龍井天目山中早寒冬來多雪故茶之萌芽較晚採焙得法亦可與天池並魏㟲錢塘縣志茶出龍井者作豆花香名龍井茶色青味甘又翁家山亦產茶最下者法華山石人塢茶而龍井法相僧收以語人曰本山果品一龍井楊梅咸淳臨安志舊載楊梅石塢今在煙霞嶺瑞峯寺側東墓嶺十八澗亦盛臯亭山產者尤甜又楊梅塢在南山近瑞峯石塢內有一老嫗姓金其家楊梅甚盛俗稱楊梅塢所謂金婆楊梅是也西湖遊覽志宋時有金嫗者所栽楊梅甚美因以起名蘇子瞻答參寥惠楊梅詩新居未換一根椽只有楊梅不值錢莫共金家鬬甘苦參寥不是老婆禪蓋謂此也至今其地楊梅異於他產施元之蘇詩註杭州圖經楊梅塢在山南近瑞峯楊梅尤盛有紅白二種今杭人呼白者為聖僧梅魏㟲錢塘縣志龍井法華山產者為天下冠謹案杭產楊梅不一蘇軾詩自註杭州梵天寺有月廊數百間寺中多白楊梅盧橘而陳善杭州府志又有徐村楊梅兩山楊梅有早色晚色燻色喫色數種北山多早南山多晚故近龍井楊梅塢法華山俱以此著楊梅塢詳卷一咸淳臨安志法華塢在西谿西湖遊覽志青芝塢又北為法華山去靈隱山後可里許過北十里為西谿吳本泰西谿梵隱志西湖北山一支其陽為竺國靈鷲其陰為法華有晉法華僧靈蹟因以名山亦近龍井故依魏㟲錢塘縣志存之又案魏㟲錢塘縣志蘭花紫白者名蓀出法華山又法華山筍最盛有烏哺雞白哺雞之名附識於此藥品二龍井貫眾咸淳臨安志生龍井口龍井益母草咸淳臨安志生龍井山谷亦名草天麻謹案浙江通志引此文誤增最佳二字鱗屬一龍井魚見武林舊事詳卷一張京元西湖小記過風篁嶺是為龍井即蘇端明米南宮與辯才往來處寺北向門內外修竹琅琅井在殿左泉出石罅甃小圓池下復為方池承之池中各有巨魚而水無腥氣池淙淙下瀉繞寺門而出小坐與偕亭翫一片雲石山僧汲水供茗泉味色俱清僧容亦枯寂視諸山迥異物產題後龍井為南山總名杭郡邑志物產凡近龍井者率冠以龍井不必以嶺以寺限也矧乃泉甘茶香品絕諸山者乎
