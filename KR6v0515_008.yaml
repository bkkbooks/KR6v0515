body:
  text: 臣汪孟鋗恭纂文名僧文宋釋元淨詳卷三文見咸淳臨安志心師銘咄哉此身爾生何為資之以食覆之以衣處之以室病之以醫百事將養一時不虧殊不知恩反生怨違四大互惱五藏相欺此身無常一息別離此身不淨九孔常垂百千癰疽一片薄皮此身可惡無貪惜之當使此身依法修持三種淨慈十六思維一行不退安養西歸成無上智是為心師元祐六年中秋寂室書與懷益釋居簡詳卷三龍井法堂榜二士共談必説妙法際元豐元祐昌明之時三人同行必有我師駕難弟難兄賢良之選蜀仙去後吳僧寂寞華表歸來塵世淒涼要見一堂冷淡千古分明還他百世楷模六種成就法空為座可無高廣之牀道直如弦亦有恢宏之地青眼皆逢北阮未稱全提一瓣竟為南豐休尋別調名賢文宋蘇軾詳卷四卷七跋楚逵二上人書經懷楚比德示我若逵所書二經經為幾品品為幾偈偈為幾句句為幾字字為幾畫其數無量而此字畫平等若一無有高下輕重大小云何能一以忘我故若不忘我一畫之中即見二相而況多畫如海上沙是誰磋磨自然平勻無有粗細如空中雨是誰麾灑自然蕭散無有疏密咨爾楚逵若能一念了是法門於剎那頃轉八十藏無有忘失一句一偈東坡居士説法已復還其經元祐七年四月二十五日靜坐帖無事靜坐便覺一日似兩日若能處置此生常似今日得生七十便是百四十歲人世間何樂能有此效既無反惡又省藥錢此方人人收得但苦無好湯使多咽不下蘇轍詳卷四卷七辨才法師塔碑浙江之西有大法師號辨才以佛法化人心具定慧學具禪律人無賢不肖見之者知尊其道奉其教居上天竺説法齋衆者二十年退居龍井燕居行道者十年元祐六年歲在辛未九月乙卯晦無疾而滅吳越之人失其所歸依奔走號慕如佛滅度乃使其弟子懷楚赴於淮南請於揚州太守蘇公子瞻以志其塔公曰吾固知師矣余弟子由雖未嘗識師然知其師不在我後我為汝請轍以公命不敢辭師姓徐氏名元淨字無象杭之於潛人家世喜為善師之生也客有過其鄉者指其居以語人曰是有佳氣鬱鬱上騰當生奇男子師生而左肩肉起如袈裟縧八十一日乃滅其伯祖父嘆曰是宿世沙門也慎無奪其願長使事佛八十一者殆其算也及師之終實八十有一師生十年從其邑僧法雨出家口不茹葷血每見講堂坐輒嘆曰吾願登此説法度人年十六落髮受具足戒十八就學於天竺慈雲師雲門人方盛厭衆欲卻之雲曰疇昔吾夢甚異此子殆法器也勿卻師日夜勤力學與行進不數年而齒其高弟雲沒復事明智韶師韶嘗講摩訶止觀至方便五緣曰淨名所謂以一食於一切供養諸佛及諸賢聖然後可以食此一方便也師聞之悟曰今乃知色聲香味皆具第一義諦因涕下如雨由此遇物中無疑矣嘗夢與其同門友元素入一寺曰妙樂有僧出師問之曰此非荊溪尊者製法華文句記處耶曰然師訪以尊者遺像相與至東閣見一梵僧趺坐不動容貌甚偉謂師曰我汝過去師也當為我作禮師拜已而覺忽若有得年二十五恩賜紫衣及辨才號蓋代韶為衆講説者凡十五年知杭州呂公溱始請師住大悲寶閣院師嚴設紀律犯者秋毫皆斥去其徒畏敬之居十年沈公遘治杭以為上天竺本觀音大士道場以聲音懺悔為佛事非禪那居也乃請師以教易禪師至吳越人爭以檀施歸之遂鑿山增室幾至萬礎重樓傑觀冠於浙西學者數倍其故有禱於大士者亦鮮弗答詔名其院曰靈感觀音熙寧初龍圖祖公無擇在杭言者或不説其政遽起制獄師以鑄鐘事預逮居其間泰然擬金剛篦撰圓事理説居十七年有僧文捷者利其富倚權貴人以動轉運使奪而有之遷師於下天竺師恬不為忤捷猶不厭使者復為逐師於潛逾年而捷敗事聞朝廷復以上天竺畀師捷之在天竺也吳人不説施者不至巖石草木為之索然及師之復士女不督而集山中百物皆若有喜色清獻趙公抃與師為方外交親見而贊之曰師去天竺山空鬼哭天竺師歸道場光輝然師復留三年終欲捨去謂其徒曰吾祖智者聖人也猶以急於化人害於行己位本鐵輪而證止五品況吾凡夫也哉固謝去老於南山龍井之上以茅竹自覆吳越聞之爭為之築室廬具像設甓瓦金碧咄嗟而就三年復為太守鄧公溫伯請居南屏一年鄧公去乃歸龍井終焉師於講説不擇晝夜嘗曰鬼神威德不具多畏人晝説或不得至比夜人靜庶幾能聽嘗焚指以供佛左三右二僅能以執其徒有欲效之者輒禁之曰如我乃可平生修西方淨業未嘗以須臾廢行成力具能以其餘見於外者非一也余兄子瞻中子逮生四年不能行請師為落髮摩頂祝之不數日能行如他兒布衣季生者習禪觀甚辨而無行欲從師出家子瞻憐之為請於師未言其名師拒不許若知其為人者秀州嘉興令陶彖有子得魅疾巫醫莫能治師咒之而愈越州諸暨陳氏女子得心疾漫不知人父母以見師警以微言醒然而悟嘗與僧熙仲會食仲視師眉間有光如螢遽起攬之得舍利師曰慎毋以告人不知者將以妄疑我自是常有於其臥起得之者及其將化入室晏坐謝賓客止言語飲食召其常所往來僧道潛告之曰吾西方業成如是七日無魔橫右脅吉祥而逝吾願足矣至五日出偈告衆七日奄然而寂皆如其言師度弟子五十人四方學者不可以數計頗能以其道教化吳越至十月庚午塔成頌曰如來昔在世心禪語為教譬如四大海惟是一溼性於其溼性中變化千萬億風來為濤瀾風去為湛然魚龍所遊戲鬼神所出沒船筏借其力網罟取其利其上為洲渚諸國所生育其下為淵谷百怪所藏伏東西出日月上下屬河漢觀者不能了𥈭眙何暇説如來知迷悶隨變為解釋因變所説者是則名為教彼善聞教人當知是幻爾既已知是幻則當識真實我觀世教師皆謂教是實由謂教實故則為禪所訶禪雖訶教乎終以教致禪禪若不取教是杜所入門教而不知禪是不識家也辨才真法師於教得禪那口舌如瀾翻而不失道根心湛如止水得風輒粲然以是於東南普服禪教師士女常奔走金帛常圍繞師惟不取故物來不得拒道成數有盡西方一瞬息西方亦非實要有真實處范仲淹字希文吳縣人大中祥符八年進士仕至樞密副使參知政事諡文正有文正集兵部侍郎致仕胡公志銘寶元二年六月十八日尚書兵部侍郎致仕胡公薨於餘杭郡之私第明年二月十有一日葬於杭之錢塘縣南山履泰鄉龍井原以夫人潁川郡君陳氏祔焉禮也孤子楷言於友人范某禮經謂稱揚先祖之美以明著於後世此孝子孝孫之心也然而言之不文行而不遠處喪之言烏乎能文今得浙東簽書寺丞俞君狀先人之事而敢請志焉某曰孔子見齊衰者必作重其孝於親也敢不唯命公諱則字子正婺之永康人也某聞虞舜之後有胡公武王封於陳蓋族望之來遠矣皇考諱彭王考諱濲皆隱於唐季其道不顯考諱承師在鄉閭間以積善稱因公而貴官至尚書比部員外郎贈吏部郎中妣應氏封永樂縣太君贈普郡太君公少而倜儻負氣格錢氏為國百年士用補蔭不設貢舉吳越間儒風幾息公能購經史屬文辭及歸皇朝端拱二年御前登進士第釋褐為許州許田尉以幹自聞補蘄州廣濟宰又補憲州録曹以本道計使諫大夫索公湘之舉改祕書省著作佐郎簽署貝州節度觀察判官公事升本省丞知潯州拜太常博士提舉二浙榷茶事兼知桐廬郡丁太夫人憂服除以本官知永嘉郡遷屯田員外郎提舉江南路銀銅場鑄錢監擢任江淮制置發運使轉戶部員外郎入為三司度支副使賜金紫除禮部郎中京西轉運使又移廣南西路轉運使以戶部郎中復充江淮制置法運使轉吏部郎中改太常少卿丁先君憂終制知玉山郡移福唐郡拜右諫議大夫知杭州入判流內銓以舉官纍責受少常知池州未行復諫議大夫知永興軍領河北都轉運使給事中入權三司使拜工部侍郎集賢院學士知陳州進刑部再牧餘杭郡踐更中外凡四十七年得請加兵部侍郎致仕朝廷命長子通判錢塘以就養又六年而終享齡七十有七天子聞而悼之進一子官初至道中公在憲州時西寇梗邊朝廷命師五路入討詔具三十日糧以從之索公方引公督隨軍糧草事公曰為百日計猶或不支奈何索公乃遣公入奏召對逾刻公陳邊事如指之掌上顧左右曰州縣中有如此人遂可其奏具示甄拔之意後大帥李繼隆果與寇遇十旬不解索公曰微子幾敗吾事一日其帥移文曰兵將深入糧可繼乎公曰師老矣矯問我糧為歸師之名耳請以有備報之索從其議彼即自還無以咎我其先見如此及索公主河北計又奏辟之遂以貝州之行朝廷遣使省天下冗役就命公行河北道凡去籍者僅十萬數民用休息在潯州人有虎患公齋戒禱城隍神翌朝得死虎於廟中其誠之效與案池州永豐監得匿銅數萬斤吏懼當罪公思之曰昔馬伏波哀重囚而縱之前史義焉今銅尚在吾忍重其貨而輕數人之生耶咸以羡餘籍之不復為坐在江淮制置日會真宗皇帝奉祀景亳公實主其供億千乘萬騎至於禮成無一毫之闕帝深愛其才面加奬勞遂進秩登於計相之二在廣南西路有大舶困風於遠海食匱資竭久不能進其人告窮於公公命瓊州出公帑錢三百萬以貸之吏曰彼本忘信又海舶乘風無所不之公曰遠人之來不恤其窮豈國家之意耶後其人卒至輸上之貨十倍其貸朝廷省奏而嘉焉又宜州繫重辟十九人時有大水公不慮患而特往辨之活者九人焉在福唐有官田數百頃民輸租食利舊矣至是計臣上言請就鬻之責其估二十萬貫民不勝弊公奏之未報章三上且曰百姓疾苦刺史當言之而弗從刺史可廢矣乃有俞詔減其直之半而民始安公領三司使寬於財利不以刻下為功時上方以兩京陝西官鹽歲久民鮮得食而日以犯法命通商有司重其改作公首請奉詔其事遂行公性至孝自曲臺丁太夫人憂廬於墓側以終喪紀有草木之祥本郡表之及京西之行以家君朱紱為請上曰胡某為孝雖非其例與以明勸也搢紳先生榮之又天禧中尚居郎署朝廷擬公諫議大夫知廣州公以家君八十歲懇辭於政府乃復有制置之行尋以哀去職得盡心於喪葬公富宇量篤風義往往臨事得文法外意人或譏之公亦無悔焉其輕財尚施不為私積士大夫交稱之福唐前郡將被訟去官嘗延蜀儒龍昌期與郡人講易率錢十萬遺之以歸事在訟中及公下車昌期自益部械至公曰斯何罪耶遽命釋之見以賓禮法當償其所遺公代以俸金仍厚遺而還又濟陽丁公為舉子時與孫漢公客許田公待之甚厚及其執政而雅故之情不絶若休戚士人而未嘗預暨丁有朱崖之行昔之賓客無敢顧其家公實被議出玉山郡尚屢遣介夫不遠萬里而往遺焉此又人之難矣及退居西湖乘畫船擊清波深樽雅絃左子右孫與交親笑歌於時歲之間浩如也人不謂之賢乎夫人潁川郡君有慈和之德先以壽終令子四人長曰楷都官員外郎前知睦州祥符七年秋登服勤詞學科所至政能有先君風度次曰湘好學有志識朋友多之次曰桂俊異居喪而亡次曰淮孝謹有成人風二女長適泉州德化縣尉蘇璠次適御史臺主簿華參而亡其閨門之範見其潁州之志某非特為重齊衰之情嘗倅宛邱郡會公為二千石以國士見遇且與都官布素之遊誠可代孝子而言焉銘曰進以功退以壽義可書石不朽百年之為兮千載後韋驤字子駿錢塘人皇祐五年進士纍官尚書主客郎中夔州路提刑獄有錢塘集吳平甫志銘吳平甫之喪還自浮梁將葬伯兄少卿以某知平甫之素乃以其行狀見屬以銘某義不得辭謹為之敘次平甫生而聰悟幼不好弄及就師學則夙夜勤苦以自勵弱冠術業大成為鄉里推重耽味經史平居未嘗釋卷聖賢去取之理古今因革之緒博通強記無不該洽加之德性謹厚造道深遠以誠接物以謙待人故學者多從焉天資恬退不嗜榮利公卿大夫之門不喜曳屨於其間三預鄉薦惟一試禮部蓋亦親朋之所強也其後絶意進取杜門著書捽茹以自食者幾二十年熙寧七年冬郊祀霈恩伯兄當薦子弟乃密以平甫為請奪其志而莫之告也未幾補太廟齋郎久之不赴調及伯兄還朝乃迫之偕行入銓授將仕郎出為南安軍大庾縣尉既而辭疾不往居數歲伯兄復以義趣之乃幡然悔曰仕非為貧也而有時乎為貧吾兄以友愛祿我而我獨不勉是誠何心哉不幾乎於陵之哇也人將以蚓視余矣於是再調饒州浮梁尉到官逾年感疾而沒問至鄉之賢士大夫皆歔欷嘆息曰平甫之所享止如是其命矣夫平甫其字也諱天秩世為杭人曾祖嗣祖贊皆不仕父肅贈工部尚書初娶邵氏生三男俱早世次娶邵氏生一男曰師明以疾不克嗣一尚幼有文集十五卷藏於家享年六十二卒以元豐三年五月之壬申葬以是年九月之乙酉縣曰錢塘鄉曰履泰原曰龍井塋域於是而合乎邵氏之室也銘曰位不稱德壽不遐子以疾廢孰克家天乎與善宜無差至此莫詰其何嗟秦觀詳卷四卷七龍井題名元豐二年中秋後一日余自吳興道杭東還會稽龍井辨才法師以書邀余入山比出郭日已夕航湖至普寧遇道人參寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間月明可數毛髮遂棄舟從參寥杖策並湖而行出雷峯度南屏濯足於惠因澗入靈石塢得支徑上風篁嶺憩於龍井亭酌泉據石而飲之自普寧經佛寺十五皆寂不聞人聲道旁廬舍或燈火隱顯草木深鬱流水激激悲鳴殆非人間境也行二鼓始至壽聖院謁辨才於潮音堂明日乃還高郵秦觀題跋元淨十題詩辨才法師謝天竺講事退休於龍井山壽聖院凡堂室齋閣山峯水泉皆名以新意復作詩繼之號龍井十題其言清警發人之妙思信非世間音也元豐二年八月高郵秦觀為寫遺其徒懷楚刻於石鄭清之詳卷四卷七跋秦少遊龍井題名坡仙至錢塘特與辨才師為世外交師歸龍井坡公為作二老亭詩一時名勝多與之遊瑰詞藻翰衣被泉石至今枯槎斷壁間奕奕飛動獨少遊記文得元章書二妙相輝宜耀不朽而寺失其傳好事者閟然不滿紹定己丑得真迹於戶書胡公摫印以他米書不謬每念鑱之寺中以苴放軼一日語京尹趙公公斂袵曰前賢之勝韻不續實遺吾邦羞寺於何有亟訪堅珉刻之且損錢百萬畀住山宗炳建樓植鐘新緇宇之弊於是龍井之勝若前賢之美如創見然余每愛少遊支筇步月敲辨才門夜半清語殆非人間世今留題中寫澗谷經行登危憩寂之境衝煙破暝之態溪潺林影斷續隱見雖善畫不能及題識猶爾況記乎雖然微趙公好古博雅則斯記未必遇雖遇未必遽赫然在人耳目間余幸記之遇顯之速也於是借石咫書其顛末如此程珌詳卷四有洺水集遊龍井記余舊讀秦太虛記想其事甚欲一追故步者不知幾年矣辛巳歲出清波門經淨慈寺過白蓮院上風篁嶺謁龍祠酌龍井遂至辨才塔飯於月林月林辨才所廬也主僧出范文正東坡欒城參寥辨才遺像及坡遺辨才水墨羅漢八軸軸皆二像仁皇飛白四字與南唐草字四紙已而酌泉瀹茗復汲二盎以歸徑旁佛舍多不知名獨白蓮為近晚不暇入四山多怪石如亂雲如虎豹下視西湖如盤狹處僅若帶沿路居民視昔不加密炊煙斷續相望澗泉則㶁㶁如故但太虛乃宵征所不見者怪石與西澗及炊煙耳元豐距今百三十七年矣人事幾變而景物則宛然當時可為太息辨才結廬今為廣福寺一山屹然內向故備録以告來遊者元黃溍字晉卿義烏人延祐進士仕至侍講學士同知經筵諡文獻有文獻集南山題名記婺之宦學於杭者每歲暮春必相率之南山展謁鄉先達故宋兵部侍郎胡公墓仍即其廟食之所致祭焉竣事遂飲於西湖舟中以敘州里之好大德八年春三月癸亥會者四十有四人魏國趙文敏公時方以集賢直學士領儒臺溍幸獲從先生長者之後而趨走於公履屐之末逮今三十有九年乃以非才補公故處暇日從鄉僧遊龍井覩公舊題而與道其故事咸謂不可久廢而莫之舉亟以白於宣政副使王公合同郡大夫士暨方外交四十有一人以至正二年春二月癸亥復會於南山雨弗克前艤舟望拜而追數向之四十有四人存者殆無幾或顯榮於中朝或隨牒調補於遠方或已倦遊歸休於家林惟溍忝有祿食於此而得齒兹盛集未知後三十有九年今之四十有一人重會者誰歟古人云後之視今亦猶今之視昔此題名之所為作也諸公謂溍宜題識其首是用弗讓而直書其歲月以俟後之覽者焉跋東坡書秦少遊龍井題名元豐元年東坡先生謫黃州少遊以二年秋至龍井三年秋先生乃為書此題名而記其後言與兒子適棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天而先生作赤壁賦則五年之秋冬也溍兒時即能誦少遊題名不意垂老獲見先生真迹因考其歲月而謹志之謹案蘇軾書題名以寄參寥不必藏龍井故不入書畫王逢字原吉江陰人薦不仕自號席帽山人所居曰梧溪精舍有梧溪集題遊龍井卷右鄧匪石虞道園二司業俞觀光先輩與澄湛堂無極元濟天岸若季衡四法師及匪石子衍同遊龍井倡酬之什後和者張晉公仲舉時為布衣未起實出山村仇先生門徐則芝石虛谷方先生弟子也劉師魯則鄜王後月心先生之子顧仁甫陳守忠王性存並石塘胡先生之門人余聞之前進士錢塘思復云因附見焉俾來者知當時朝野人物之盛蓋不減蘇黃參辨諸公追從之樂也夫湖山自吳越逮宋元數百年形勝今鞠為墟莽緇素文墨淪棄何限曦尚寶是卷哉曦湛堂曾孫裔明林右詳卷四有公輔集龍井志敘龍井距錢塘十餘里山水靚深宋辨才法師行道處也法師主席天竺所與遊皆名公巨人如趙清獻蘇文忠公相往來叩答尤密用是名滿天下其徒戴之如師小民仰之如佛一日自天竺謝事退於龍井依崖壑縛草以覆身錢塘之民聞之相與出力創其居殿塔臺宇隱映於疏林古木間至於一泉一石皆為文士所記詠錢塘雖多勝剎至語清迹必曰龍井凡東西遊者不之龍井必以為恨蓋三百餘年矣元末時燬於兵所存者唯數楹而已顧左右荊棘沒人脛猿猱晝棲暮出叫於風日之下回思昔日鐘鼓之音為何如耶天台懷思以仁自少受業於是山身與其盛而及其衰嘆曰吾老矣不能復也遂拾是山故實及詩文為一集名曰龍井志使後人據是志興復祖宗之盛可也以仁之心亦悲矣夫盛衰相為倚伏如晝夜寒暑之必至炎炎之隆固生於窮冬沍寒之所冥冥之昏實起於太陽亭午之際君子推微而知著測始而知終有知其必然者矣故遺心放形獨立於萬象之表以觀夫盛衰之運為何如而世之人汩於盛衰之中因其盛也自謂可傳百代而無泯故凡可以為者無不率先為之但恐為之者不廣廣之者不堅耳殊不知其衰之機駸駸乎已隨其後矣余少時猶及見豪家大族恣不度於閭里高櫩飛棟儼如封君之第無幾何時形消影歇求其倣佛而不可得況三百年至盛之久乎則其衰也亦數之所宜然也雖然數之所拘惟人力之為者爾人力之所不能為數亦不能如之何也如法師之道清獻公之德文忠公之操行固將回薄霄漢寄造物於無窮豈與是山俱盛俱衰者哉以是知道之不修德之不立區區恃夫人力之末宜其為盛衰所戲侮也以仁嗣法師之道甚至人之事以仁者無異於法師則法師之道雖有盛衰而其中之不可以盛衰者以仁固得之矣宋濂字景濂浦江人仕至翰林學士承旨有學士集杭州集慶教寺原璞法師璋公圓碑銘洪武元年夏六月二十七日杭之顯慈集慶教寺原璞法師滅度於京城大天界寺父母所生四十六年在菩提位中二十八夏其上首弟子住持圓覺一印升元克勤等以某年月日奉舍利靈骨歸窆於郡之龍井辨才塔南遵像法也後七年克勤奉詔往使日本上嘉其不辱命俾返初服列官於朝濂時待罪禁林克勤數以法師塔銘為屬未幾克勤出鎮方嶽承宣山西瀕行又復諄諄言之繼而一印結集白業成書千餘言遣使者申言之夫惟台衡之學佛法之大宗有若法師乃中流之舟楫觀化而往銘其可不造耶不造何以為訓耶法師諱士璋原璞其字也受生於海王氏伏犀貫頂目光炯炯射人自幼即決去羶葷弗御即御輒嘔逆不能勝唯日取天竺書習讀之鄰寺僧伽競曰此釋氏種也盍以乞我其父某怒曰吾兒非若倫也俾投城東太平興國傳法寺服五戒服其師某與翰林待制柳公貫遊公嘗憩止寺中親授法師儒家羣經為正句投敷繹旨要法師聞之有如破竹數節之後皆迎刃而解年一十九始除鬚髮著僧伽梨尋稟持犯於某師時佛護宣覺憲慈匡道大師自四明延慶遷主武林上天竺觀音教寺大師諱本無字我庵佛海法師湛堂澄公之嫡子令譽隆洽一時名浮圖爭擁輪下法師將擔簦趨之忽夢遊寶所大乘菩薩教之互跪作禮口唱懺辭覺而思之乃普賢淨行品偶文也法師以為祥徵佛護見果刮目相視凡天台大小部書以次環授之志慮專一飢則親狎釜鬵以事烹飪一飽而止寒暑晝夜若不知切身佛護如三吳俾法師遷丈室之西以便飲食逮還見白煙一抹起其寢所則自爨猶故也佛護陰鑒其勤以遠大期之佛護之門人曰天心瑩素高亢不服人亦欣艷法師之行約共燈火磨切詰難極於毫絲餘子皆望風而畏稱為雙璧佛護既示寂東溟日公來補其處大演摩訶止觀陶冶生徒夏中集讀選法師為之開科譬陟彼山巔阡陌溝遂雖詰曲鉤聯粲然辨數聽者心地朗融如飲甘露東溟性嚴毅而寡許可為之喜動顏色遂命其司賓繼升領懺摩事纓緌之士皆願與法師交聲華由此日重元至正十三年江南行宣政院命主州之棲真教寺棲真與南天竺演福鄰古稱教海而大用才公絶宗繼公二三大長老皆在焉法師猶以學之未足時往叩其所未至凡部味教觀之奧偏圓本迹之微疇昔有疑而未徹者二老無不條分縷析以喻之法師彈指嘆曰佛法教藏渺如煙海固非獨善偏長所能究使吾自畫而不加進其能免於專門寡陋乎二十年移住旌德教寺元季兵亂人多為自藏計法師專心寺事不以世相為纍彰善疸惡風采為之改觀日納清淨之衆共講諸經玄疏銷文入相洪纖弗遺才辨清發言與理冥往往推為義中之虎大方自是益斂袵矣皇明龍興當建元洪武之初三宗以今寺主席尚虛白於李曹公文忠公時戍杭遂從所請法師提唱接引如旌德時有過無弗及焉未幾中書被旨俾浙水西五府浮屠道流共甓京城立善世院以統僧尼同將作監交董其役時方內附相視莫知所為法師獨出方略具有條序十萬之衆多倣之以集事不幸報緣已盡竟入涅槃緇素翕然嗟惜之法師器局瀟灑論議慷慨據直道行不樂俯徇流俗意氣吻合即出肺腑相示否則白眼怒視俊乂來依推食解衣以遇之不計蓋藏有無然精練世故勇於有為棲賢敝陋殿堂門序為之一新旌德籍券久不白乃為稽鉤欺隱使有文可覆暴橫之徒束手待命始免捧漏沃焦之患每懲諸剎樹徒植黨而為怨尤之府誓不剃度弟子私建退休之室終身踐其言弗渝初法師受經佛護歷職東溟佛護既沒或者微以為諷法師笑曰丈夫制行當以義為斷豈可隨世浮沈哉終嗣佛護法師所著書多未脫藳詩文有別録若干卷嗣法而出世者升元圓覺之外曰某曰某共若干人云夫惟圓頓法門實般若之樞機奈何傳失其宗指真心而名境認理性以為總論心有具造而遺於色似此之類紊亂真乘法智一起而麾之然後天台之道復盛曾未六傳習者流於知解之説務新騁奇頗駸駸近於山外慈辨再起而正之然後法智之教益明擔負大法之任者其所繫蓋甚重也近代以來佛海以純慤之質一以法智為師最號能守家法者故其授受真切出其門者咸赫然發聞於世法師乃其嫡孫其行解似無讓於前人孰不望其大振元風而世壽僅僅若此銘以昭之一以傷斯道一以勉來裔云銘曰天台之學空假中一心三觀乃其宗如大火聚光彤彤五金遇之無不鎔渣滓渾化內外紅佛海拔起建寶幢摩尼遍照天南東入其室者膽力雄披精進鎧手挾弓一戰欲使魔軍降誰為嫡嗣躡孤蹤伏犀貫腦冰翦瞳震旦羣書貯心胸一朝易轍梵夾攻日狎井竈劬厥躬白煙上出橫晴虹五章四釋照厥朦事理即具靡弗同肯綮一中萬里融行解雙至方建功三鎮名山黑白從龍興致雲虎嘯風輪下瓶錫無地容法水灌頂障執通亭亭淨植青芙蓉似此良師不易逢火風分散報緣終水月鏡像索還空作銘者濂碑則豐千百億劫鎮幽宮馮夢禎詳卷四卷七龍井寺復先朝賜田記武林之龍井有二舊龍井在封篁嶺之西泉石幽奇迥絶人境蓋辨才老人退院所闢山頂産茶特佳相傳盛時曾居千衆東坡少遊先後訪辨才於此而坡公蹤迹尤數辨才送客例不出寺門一日送坡公間談信步遂過封篁嶺坡公笑曰遠公復過虎溪耶後人仰其風流作過溪亭其處今俱堙廢矣新龍井則今寺是也正踞封篁嶺疑亦辨才別院寺左奇石如林有宋人題識十餘處俱小篆八分書特精妙而不留款余每徘徊其間不能捨去惜以屋蔽之至寶不盡露也寺有賜田十餘頃嘉隆間寺中廢田沒於佃戶而僧食貧僧真果蓋中興此山者篤實精悍能於荊榛瓦礫間起為寶坊余甚嘉之又能訪求賜田之在海三十二都十圖之方家墟十一圖之唐家湖者凡一百六十四畝久為佃戶陸喬朱仕等所據訟之官而還之官斷畝除糧差外歲給租二斗以為常自萬歷十二年為始歲得三十二石零可贍十僧此諸護法宰官之寵靈而果之力也嘗憶壬午秋果重繭如京師謁余邸中乞當道書精神如此欲勿興得乎顧寺田迷失者尚多今日所還一成一旅耳然非果則不能復使果之後有果繼之祀夏配天不失舊物齋魚轟轟千衆聚飯以進其道業而復辨才之舊亦可待也果恐無記將遂湮沒再三懇余余亦再三諾之而竟不及償者凡數年此日果遣其徒詣白下守催乃援筆敘其顛末如此以告夫世守者是為記送果上人住玄同敘果上人住玄同過居士乞護居士曰二氏主釋與𣆀兩家焉如水與火玄同道者居也佛者入焉無乃傷教而敗族乎且上人已住龍井矣有此何為上人曰果之先有僧真志者居之果為第二世佛菩薩普入一切度苦衆生道者之居不賢於三惡道乎果十九在山十一在城有此以憩可也且果有上方而棄之去住惟緣豈戀此哉居士曰然子以無心而居余以無言而護遂書此送上人入院時萬歷己丑六月二十一日也龍井寺新建白衣觀音殿勸緣述儒者嘗論求矣軻書曰求則得之舍則失之是求有益於得求在我者也求之有道得之有命是求無益於得求在外者也在我之求為仁義忠信之求在外之求為公卿大夫之求一可一否豈不較著而佛者之論則不然普門品曰若有心願求男禮拜恭敬觀世音菩薩便生福德智慧之男心願求女便有端正有相之女夫男女之有無多寡及賢與愚儒者所謂制於天成於命而不可易者公卿大夫既不可求而男女獨可求公卿大夫之求為在外而無益而男女之求獨在我而有益誠以儒律佛何其相左之甚而不可信歟乃世之持白衣觀音咒者往往生子有白衣重包之異自唐迄今信持獲驗不減百千萬億以其事印普門之説佛豈有誑語而束教薄福之徒往往生謗造罪如入寶山而抉眼截手甘心覆宗滅煙之禍而不悔可憐也或曰佛語誠可信白衣大士咒誠歷歷可驗某豈敢纖毫置疑然所以可信而多驗者其義何居願吾子快為一切衆生演説令諸闡提隳彌戾車可乎搖手曰難哉因為之詩曰脫卻天衣換白衣婆心巧逐世人機手中孩子分明箇付與時人仔細疑子能洗眼靜坐三年猛參觀音大士當現身與汝説破丁亥三月上巳日真實居士書國朝張彙字華亭人諦暉和尚塔銘達磨西來不立文字廓然無聖脫屣去來其來也無法為法其去也不宜有銘雖然不宜有銘法也無法為法則亦可銘和尚諱慧輅以明天啓七年丁卯十月初八日得四大於吳興金田沈氏父濟母李以雍正三年乙巳三月二十日舍四大於錢塘雲林古靈隱寺春秋九十有九僧臘七十有四余與和尚潛遠之契垂三十年乙巳三月十一日夜示夢余從京師走書江南告弟奕山曰和尚將入涅槃地矣果以是日示寂豫指二十日午時為報年之限及期命鳴鐘自升繩牀趺坐點首三而滅遺命坐三日入龕門人智廣等以佛法斂丙午九月十三日於飛來峯側起塔安神和尚秀眉大耳步律音鐘六歲而孤家碎於役及母李終乃檀那身命自拔人間遍參諸方以求止泊順治己丑二月遊學至靈隱禮具德和尚一日拜直指堂下仰見直指二字憬然曰彼以直指我以直會又聞戶外鳥啼聲一時大千俱直時具德和尚弟子五千人碩德圓戒林植山宮而師以年少依位而立寶身突兀常住不遷乃嗣法焉歷住興福妙濟師林天竺龍井諸寺終於靈隱初聖祖仁皇帝賜寺額曰雲林因為雲林寺後南巡輒舉賜和尚御書曰禪門法紀又別賜御書黃金佛像白金等物和尚三身八勝而六時一真露地白牛無得無捨常造余竺西草堂行梅花下花千餘樹如雪香動心魂和尚行未嘗一仰視至草堂坐謂寺僧曰聞梅花香乎曰聞曰爾等看花去及返終亦不視九十後便不酬不對一以師子音接十方佛當機者不喻則曰和尚耋矣語不可曉偶落六通則曰和尚昔云然今果然銘曰醍醐味醨薝蔔香衰斑其相紛羊啞狐咍和尚智度七十四年縣解凥首草腐人天一佛既無千佛乃有演暢宗極下足撒手峯昔飛來師今飛去無去無來導師常住雍正四年歲次丙午九月朔日文題後韓愈歐陽修闢佛猶作文暢高間惟儼祕演等敘但不説佛法而已蘇軾始闌入法界語嗣是名家大家別集僧寺記敘恆居十之三四殆不過借題以發揮論議而山門之興廢衣鉢之授受舍是莫詳開堂大師嗣法上首不憚間關重趼謁吾徒而來請良有以夫首元淨者例同詩鄉寓人物志銘先後附見
