body:
  text: 臣汪孟鋗恭纂古今體詩名僧詩宋釋元淨詳卷三詩見咸淳臨安志龍井新亭初成詩呈府帥蘇翰林政暇去旌斾策杖訪林邱人惟尚求舊況悲蒲柳秋雲谷一臨照聲光千載留軒眉獅子峯洗眼蒼龍湫路穿亂石腳亭蔽重岡頭湖山一目盡萬象掌中浮煮茗款道論奠爵致龍優過谿雖犯戒兹意亦風流自惟日老病當期安養遊願公歸廟堂用慰天下憂和蘇子由春去春來冬復冬幾思虛論未緣逢歙谿道賞兄遺蹟勿少龍泓一老龍次韻參寥四照閣夜坐懷秦少游學士七律巖棲木食已皤然交舊何人慰眼前素與畫公心印合每思秦子意珠圓當時步月來幽谷拄杖穿雲冒夕煙臺閣山林本無異故應文字未離禪和佛印久仰真風揚四海今朝邂逅欲生蓮法燈晃耀皆蒙照佛印靈光孰可傳諸子叢林禪裏老十層塵剎上中天爍迦羅眼同三際豁破羣疑量擴然釋道潛詳元淨外傳有參寥子集夏日龍井書事呈辯才法師兼寄吳興蘇太守并秦少游四首少游時在越翠櫪高蘿結晝陰驕陽無地迫吾身石崖細聽紅泉落林果初嘗碧柰新揮麈已欣從惠遠談經終恨少遺民何時暫著登山屐來岸烏紗漉酒巾雨過千巖爽氣新孤懷日夜與誰鄰風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾已付天真露華漸冷飛蚊息窗裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最宜青石白沙含淺瀨碧梧翠竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞵隨步遠歸來幽火認茅茨朅來人外慰棲遲郭遠山長萬事遺好鳥未嘗吟俗韻白雲還解弄清姿藤花冉冉青當戶竹色娟娟碧過籬不羨故人探禹穴短橈孤榜逐漣漪龍井辯才法師新亭初成有詩呈府帥蘇翰林俾余繼和輒次原韻遠公吾家傑道妙非壺邱德傾龍象侶貌蓋江湖秋平生經綸學不為名相留滔滔若懸瀑下注萬丈湫昔年謝講事眾挽不轉頭刳心老巖穴百念本不浮東南多望士惟見此老優翰林天下公方外實輩流旌旗虎谿路竟日泉石遊眾生病未已師竟可忘憂寄龍井辯才法師法師安遠徒我見常罄折頹綱製象運棊構甚宏達煌煌四十載說法傾吳越人天會方丈萬趾常雜遝藹然如邱山四座羞蟻蛭投老倦揮麈毅然辭且決飢鷹得秋風轉盼俄一掣結茅南山陲雲蘿占幽絕昔我海上還相尋訪林樾夜闌叩微要猿鳥寂不聒慧風灑幽襟法雨濯枯枿別來經四載寒暑驚屢閱相望如晨星杳杳各天末何當從杖藜一笑龍泓月四照閣奉陪辯才師夜坐懷少游學士猿鳥投林已寂然芭蕉過雨小樓前雲依絕壁中間破月自遙峯缺處圓照坐不須紅蠟炬可人惟有蕙爐煙校讐御府圖書客疇昔還同此夜禪辯才生日像末真風恐不傳故生豪傑為人天慈航橫截三千界法雨均霑四十年獨鶴精神秋始健長松根節老彌堅莫將有物觀無象唾霧氷輪處處圓次韻文饒同自龍井出資國寺汎舟以歸北山踞虎奔犀列萬形奇觀直已逼南屏縈雲細路杳無盡落石飛泉靜有聲十里平湖初卷葑一天秋色共揚舲停橈共過孤山寺寂寂林僧半掩扃釋了元詳元淨外傳詩見咸淳臨安志七律願海談訶五十年舌根功德綻紅蓮身歸龍井庵中老法是天台意外傳珠網支羅真淨土香雲馚馥似諸天因思永遠東林社未復相逢豈惘然元釋圓至字天隱別號牧潛高安姚氏子有筠谿牧潛集寄思以仁風柳青青條葉新別愁江畔又逢春交情似我如君少一度相逢勝故人釋善住字無住別號雲屋吳郡僧有谷響集遊龍井江郊雨初霽野興入孤筇白道行時盡青山到處逢冷泉鳴遠澗旭日煦高松陰井空猶在如何不見龍名賢詩宋蘇軾詳卷四有東坡集辯才法師退居龍井不復出入余往見之嘗出至風篁嶺左右驚曰遠公復過虎谿矣辯才笑曰杜子美不云乎與子成二老來往亦風流因作亭嶺上名曰過谿亦曰二老謹次辯才韻日月轉雙轂古今同一邱惟此鶴骨老凜然不知秋去住兩無礙天人爭挽留去如龍出山雷雨卷潭湫來如珠還浦魚鼈爭昂頭此生暫寄寓常恐名實浮我比陶令愧師為遠公優送我還過谿谿水當逆流聊使此山人永記二老遊大千在掌握寧有離別憂贈上竺辯才師南北一山門上下兩天竺中有老法師瘦長如鸛鵠不知修何行碧眼照山谷見之自清涼洗盡煩惱毒坐令一都會男女禮白足我有長頭兒角頰峙犀玉四歲不知行抱負煩背腹師來為摩頂起走趁奔鹿乃知戒律中妙用謝覊束何必言法華佯狂噉魚肉謹案施元之註此詩載密州卷中查慎行補註稱蘇軾倅杭元淨正住天竺贈詩必於此時是也偶於龍井辯才處得歙硯奇作小詩羅細無文角浪平半丸犀璧浦雲泓午窗睡起人初靜時聽西風拉瑟聲蘇轍詳卷四有欒城集寄龍井辯才法師三絕有敘轍自績谿蒙恩召還將自宣城沿大江以歸家兄子瞻以書告曰不如道歙谿過錢塘一觀老兄遺蹟轍用其言既至吳中迫於水涸不能久留十月八日遊上天竺子瞻昔與辯才師相好今隔南山不得見乃作三小詩以寄之我兄教我過東吳遺墨山間無處無忽報冬潮催出堰俗緣深重道心粗山色青冥葉未紅湖光凝碧曉無風行窮上下兩天竺望斷南山龍井龍井水中藏東海魚側盆翻雨洗凡夫隔山欲共公相見莫道從來一滴無錢勰詳卷四詩見咸淳臨安志和辯才幻泡昧空色真夢迷黃邱宦學類狂走爾來四十秋齒髮非他時歲月不我留古剎插亂石蟄龍蟠霞湫天人大導師駐錫今白頭安住善護念晚節非沈浮昔嘗謂出處未用相劣優權貴分二乘股肱均九流今知擾擾者詎得逍遙遊從兹許禮足尚可治幽憂龍泓亭贈辯才辯才天人師一意演說法猶如一雨傾藥草皆萌達甕盎及湖海各現天一月以是度眾生報身隨數滅舊龕留香燈想像瞻華髮應供無時窮龍淵莫之竭米芾詳卷四詩見咸淳臨安志五絕竹徑隨泉上山雲觸石生寶樓彈指處的的是分明秦觀詳卷四辯才法師嘗以詩見寄繼聞示寂追次其韻遙聞隻履去翛然詩翰纔收數月前滄海盡頭人滅度亂山深處塔孤圓憶登夜閣天連雁同看秋崖月破煙尚有眾生未成佛肯超欲界入諸禪郭祥正字功父太平當塗人舉進士至殿中丞後隱於縣之青山有青山集和公擇遊壽聖院啜茶題名使君尚清淨攜客無杯肴茗酌披佛經塵緣頓沈抛疎雲墮簷際微風泛林梢吾心已皎皎吾學豈譊譊濡毫題名姓識此逍遙交葉紹翁龍泉人南宋時著四朝聞見錄靖逸小稿秋日遊龍井詩引道煩雙鶴攜囊倩一童竹光杯影裏人語水聲中不雨雲常濕無霜葉自紅我來何所事端為聽松風訪龍井山中村叟雨打荒籬豆莢垂柴門未啟立多時客來自掘蹲鴟煮旋拾枯松三四枝周文璞字晉仙有方泉集憶辯才讀了碑文讀祭詩冷看遺像立多時郎當嶺上生雲處山鳥山花憶老師坡使參寥滴奠茶定將老淚濕雲霞誰知走入靈山隊又對閒人說法華鄭清之詳卷四到龍井寺竹門斜倚酒家帘石路高低記水簾炙背老翁驚傴僂乘肩癡女笑窺覘數羝人立攀籬落一蝶兒嬉掠繖簷款約朋從歸去路馬頭應有月纖纖山圍古寺綠周遭一閣軒騰面勢高爐篆得薌抽露穟石泉借茗作雲濤風流二老歸靈鷲筆墨千年續楚騷拙語留題罥珠璧暗中摸索媿劉曹底忙不肯訪禪林山寺何曾避客深奇石韻高非令色老松皮脫見真心簷牙徇鐸關幽事谿曲無弦出妙音拂拭少游碑好在姓名曾記落碑陰十里輕軒憇佛廬夢身差記蝶蘧蘧伊蒲巧作魚蝦樣矮筍新鑱繭栗殊暫到欲陪僧處靜等閒生怕俗塵汚計然老去翻多事空挽西施向五湖謹案秦觀遊記原碑今不可見據此第三首落句知鄭跋即在秦記碑陰樓鑰字大防鄞縣人隆興元年試南宮末等仕至參知政事有攻媿集頃遊龍井得一聯王伯齊同兒輩遊因足成之路入風篁上翠微老龍蟠井四山圍水真綠淨不可唾魚若空行無所依勝處雖多終莫及舊遊誰在事皆非祗今匏繫何由到徒羨聯鑣帶月歸周弼字百弜文璞子有汶陽端平詩雋龍井道中雜記白髮宮人頻笑謔羅衣昔對君王著夜驚春雨洗桃花夢魂猶掛秋千索老僧病久聲嘶喝屢說紫衣勝短褐莫嫌兩手漸拘孿曾把御前供奉鈸謝翱字臯羽福之長谿人至元甲午來家西湖有晞髮集中秋龍井翫月逢秋月再圓不與復休眠腦滿魚龍夜精藏樹石年嗅衣腥在水窺戶影疑禪長嘯望參伐行來精舍邊葛天民字無懷初為僧後返初服居西湖有無懷小集龍井龍護深潭草木昏斷碑元祐典型存蜀仙已去吳僧少嶺上松篁亦斷魂董嗣杲字德明又字靜傳杭州人居西湖著道士服嘗以內醮至燕都有西湖百詠龍井橫陳翠葆列煙屏聯步蒼林想典型二老相分龍井嶺一時如過虎谿亭風吹貼石叢篁碧雨剝題名暈蘚青更有澗流朝暮落此聲不厭客來聽元虞集字伯生號邵庵蜀郡人以薦仕至祭酒奎章閣侍書學士諡文靖有道園學古錄寄澄湛堂法師月宮桂子落巖阿想在人間閱貝多禮足地神衣拂石獻珠天女襪凌波香因結願留龍受水為烹茶喚虎馱寄到竹西無孔笛吹成動地太平歌柳貫字道傳浦江人以察舉仕至翰林待制兼國史院編修有待制集送南竺澄講主校經後卻還杭州鹿苑開鴻妙龍宮閟象𤣥間關來幾譯披發露雙詮梵學傳皆正華文潤乃全義深含窈眇道廣極淵泉論自諸師造言因半偈宣何曾離性相間亦示機權述鈔心同悟分科緒各牽圅盛方秩秩棗剝益緜緜剞劂寧無舛研磨或更偏遂令迷亥豕不復辨夔蚿佛耀昌齡啟皇明正晝懸五城銀色界三殿寶花筵重見崇經日如逢出震年詔徵皆宿德御講盡真筌此士孤山隱前身華頂眠野雲生靜慧江月湛空圓天上青猊座人間白馬韉微君能引重與世孰昭先晦魄風簾燭頑陰雪屋氈聲將為律呂眼豈混珠鉛疑句多多證蕪詞一一鐫法珠終照乘宗鏡已當銓煥爛金泥字牽聯玉簡編指河符聖壽穿石畢僧緣竣事纔敷奏疏榮亟勞還萬回袍錦麗大覺鉢盂鮮尚食來珍供司農輟禁錢龎恩流濊濊鷁影去翩翩昨夢寧非蝶遲歸誤信鵑望京猶綠樹入寺始紅蓮雨外排千耦煙中聽雨舷屨盈南竺戶櫂集北湖船巖觀應增聳川容若載蠲應求隨燥濕鑽仰喻高堅夏懴朝朝禮秋燈夜夜然固知融至理直可寄單傳客袂難為別朝簪未放捐愛閒思結社食力待治田苦笑昌黎戅深懷惠遠賢獻花憑一詠安有筆如椽王惲字仲謀衛州汲縣人以宣撫辟仕至翰林院學士諡文定有秋澗集題西湖圖東南形勢繞餘杭誰辦山谿作國防踏雪欲尋龍井去表忠祠下謁錢王張雨字伯雨一字天雨別號貞居子錢塘人年二十棄家為道士有句曲外史集遊龍井方圓庵閱宋五賢二開士像詩獨尋招提遊果得世外歡昔賢所棲集畫像藏屋端山僧啟鎖魚不待啜茗乾修廣各異製精采俱生完堂堂蘇長公英氣邈難千笻杖紫道服天風吹袖寬清獻薄鬚眉示我鐵肺肝尚餘所施物片石橢而寒侍郎胡金華高括侍中冠眉間可容掌手版出中單潁濱與淮海秋色亞層巒參寥獨緇衣頷髭茁茅菅最後辯才師文茵高座安空山一室內舉目皆龍鸞再拜傾挈壺喜極重悲酸去之三百載歸路何漫漫斯人為列星下視蟲沙繁寧不念學子道術救凋殘抵舍亟摹貌微哉難控摶夢中儻未遇展詩時一觀成廷珪字原常一字元章又字禮執蕪城人有居竹軒集遊龍井過天竺登二老亭二老題詩處風流不再逢客歸紅葉雨僧住白蓮峯誰謂山無鳳人傳井有龍白頭江海上今夕寄行蹤張翥字仲舉晉寧人以隱逸薦仕至河南行省平章政事翰林學士承旨有蛻庵集南山蓮社偕韓友直伯清昆季遊龍井寺長憶東林遠法師三生張野有前期經書貝葉繙重譯漏刻蓮花禮六時長老布金多滿地高僧卓錫自成池不妨隨喜諸天上扶得風篁玉一枝陪劉侍中遊風篁嶺山行貴徜徉緩轡不可驅天竺已幽阻風篁更盤紆前瞻乳竇峯錯立石筍株洩雲相虧蔽蒼翠變態殊層梯俯山巔中豁見西湖晴旻散遠雁秋色連平蕪陰厓湛坳泓直下龍所都森突人上慄雷水止斯須泉流緊活活魚出閒于于飛霜未著樹綠陰尚紛敷兹晨正佳節況得暄暖扶雙亭俯澗谷列坐陳酒壺松風吹桂花香韻世所無奉常老博士幾載賜茱萸歸來北山南同此寂寞娛我友二三子文采珊瑚珠權然隨所適形迹安能拘窮探忘前期欲罷重踟蹰浮嵐收不上屐底青模糊炊煙忽生暝落日棲啼烏終當借上方雲臥蘿月孤勿盡兹遊興與君為後圖馬臻字志道別號虛中著道士服隱於西湖有霞外詩集陪葛元白仇仁近訪南竺詩僧分韻得影字花開空山春窮幽到絕頂入寺逢遠公頓覺塵慮屏遂作蓮社遊把酒酹龍井萬生各有態得意還自領此樂殊未極落日倒林影明朝下山去笑別風篁嶺明唐之淳字愚士山陰人建文初薦為翰林侍讀有萍居稿感龍井懷講師以仁近作長干別旋聞隻履歸影留身後相齋施日前衣龍井空秋水風篁自夕暉辯才祠下路青草沒泉扉方九敘字禹績錢塘人承天知府有十洲集衍慶院試茶南山新雨後隨興入泉林春茗搴初秀寒泉汲靜深悠然憩孤石端以滌煩襟何事文園令經年渴病侵孫一元字太初秦人居南山淨慈最久有太白山人集飲龍井眼底閒雲亂不開偶隨麋鹿入林來平生於物元無取消受山中水一杯馮夢禎詳卷四有快雪堂集乙未仲月廿五日曉泛任其所之因山行歷龍井諸處還步桃隄沿孤山湖是日物色加濃遊情曼衍不覺盡日清旦踐夙期泛舟益新侶和風薰肌骨初旭媚空水水窮山色親徑仄樹容美龍泓晝常陰竹閣晴亦雨返策循廣隄沿流越孤嶼落日纈通川紅芳爍羅綺青帝未迴鑣春物寧淹晷濃淡凖疇昔羽觴奮靡止夏錫祚字元寵長洲人有雪鴻堂詩草度風篁嶺至龍井不知何年代人家猶太古叢篁高百尺深密掩村塢寂寥絕人聲濃綠滴環堵徑轉下坡陀丁丁響樵斧道旁萬松樹落落清可數叩門墮山翠竹裏開僧戶呼童汲新泉泉自石穴吐烹以瀹茗芽炒焙初出釜客言香色絕僧意不自詡乍與佳勝辭迴顧失維宇樹密天常陰泉吼聲帶雨忽聞遠村雞有路出漁浦賀燦然字伯闇秀水人有五欲軒集遊衍慶寺石磴迴盤盡日過仙林寶剎迥嵯峨緣階井溜通泉乳繞殿花香挂薜蘿野鶴下時秋色淨山僧臥處白雲多南屏選勝無如此坐對煙霞一笑歌屠隆字緯真號長卿鄞縣人仕至禮部郎中有緯真詩集遊龍井寺藕花菱葉傍輕鷗路入南山景更幽赤日未消團扇暑青蘿先到寺門秋風前萬樹蟬鳴急雨後千崖水亂流好事祗今劉尹在身慙元度得同遊傅巖字野倩義烏人崇禎甲戌進士除歙縣知縣擢江西道御史有花巢詩龍井寺岧嶤精舍據神湫碧蘚猶封古玉溝委路輕颸叢竹曉孤雲片石嶺松秋寒渟絕壑通靈怪香潑新芽解拍浮結搆依巖高下在至今想像過谿遊姚綬字公綬嘉善人天順甲申進士有穀庵集龍井龍井泉頭與客過計程遠度石嵯峨菜畦麥隴連山麓僧寺人家各澗阿決決暗流霜葉亂斑斑飛雉夕陽多品嘗顧渚風斯下零落茶經柰爾何王穉登字百穀一字伯固長洲人國子監生有客越志龍井深谷盤迴入靈泉觱沸流隔林先作雨到寺不勝秋古殿龍王在空林鹿女遊一樽斜日下獨為散人留國朝朱彝尊字錫鬯號竹垞秀水人以博學宏詞官檢討有曝書亭集南山雜詠斷崖橫一嶺穉竹何娟娟時有山禽拂新粉墮我前欲尋巖下寺揮我風中絃風篁嶺一亭四無鄰棟壞柱已折山僧慣迎賓不忍過谿別偶語莎草間夕曛信明滅過谿亭一泓渟山坳過者不敢唾雖然龍窟宅亦許鬬茶坐起摹襄陽碑惜為僧所涴龍井峯頭石縹緲豈異一片雲有時風雨過獨立雲中君安得五丁手移置長水濆片雲石朅來給孤園玩此薩埵石石上生莓苔千年暈濃碧不見飤虎人且鋪苮草席薩埵石嚴繩孫字蓀友無錫人以博學宏詞官檢討詩見西湖志竹枝詞龍井新茶貯滿壺赤闌干外是西湖年時還有當壚女青斾紅燈唱鷓鴣汪光被字幼闇休寧人詩見西湖志竹枝詞山為城郭水為家風景清和蝶戀花昨暮老僧龍井出竹籃分得雨前茶查慎行字悔餘號初白海寧人康熙癸未進士翰林院編修有敬業堂集與靈上人餉龍井雨前茶二首風篁十里郎當嶺官焙爭收粟粒芽慚愧老僧親手摘青紗蠟紙餉山家今年穀雨雨廉纖茶味全勝筍蕨甜正是不嫌山少肉肉山無此好毛尖魏㟲南樂人康熙中任錢塘縣知縣詩見所撰縣志沖泉著屐尋龍井懸崖石磴長古苔侵竹色新雨沐山光滴瀝廬山雪分攜顧渚香泉聲初濺碧坐酌已生涼厲鶚字泰鴻錢塘人康熙庚子舉人有樊榭山房詩集遊龍井惠遠住虎谿辯才住龍井坡老獨見訪送過風篁嶺亦如虎谿邊三笑趣自永遂令龍井名遠與虎谿併惜哉過谿亭迹滅蒼煙冷而我果斯遊多年願力猛穿村拂女桑度磴落山杏何時毗嵐風吹墮石雲影片雲石已仆安得巨靈手重扶使之整寺門萬竹中蕭蕭翳光景幽雲擁殿角諸佛同一靜僧樸狀野鹿問事不復省導我窺井闌淺可弗用綆傳聞金鰻鱺或見游藻荇豈其青泥蟠時出應祈請前年秋大雨水立勢欲騁神物終斂形取足供瓢癭是日僧所述如此摩挲秦郎碑陳義臻奧境泉德類有道片語默已領酌泉為徘徊殘陽閃鴉頸羨彼樵牧流終日事幽屏聖幾餉龍井新茗一器松風出竹爐夢成水火戰新芽適開封昏睡不待遣為子手瀹嘗三嗅復三嚥中有參寥禪風味得正見吳巖茂詩見魏㟲錢塘縣志龍井甫出蠶叢另一天羣峯秀擁畫圖圜閒閒古樹餘秋態冉冉孤村正午煙巧石玲瓏雲作譜修篁排宕嶺如絃辯才故蹟堪尋訪頓使塵心欲化禪古今體詩題後唐人杭州題詠不少而莫富於白居易顧無一南山詩何與潛說友稱二蘇趙秦與辯才交名章大篇照暎泉石是宜斷自諸賢始今首元淨而次二蘇者以錄為寺作趙抃詩附註卷二故也
