body:
  text: 臣汪孟鋗恭纂寺內外古蹟歴代興建龍井寺咸淳臨安志楊傑延恩衍慶院記天台宗師辯才淨老坐道場者四十年指空假中以接人其心契於聖智具戒定慧以行己其德動於幽潛真有道之士也初住錢塘法惠院之寶閣次住上下二天竺又住南屏山之興教寺往來學徒蓋踰萬人分傳教觀多能演其所聞開悟學者師平生未嘗輒有求於人然所至必為四眾依嚮莫不興盛蓋其有所致也余在都下時見清獻公與師倡酬偈頌已知師之所存矣及觀蘇子瞻與師詩言其兒幼弱不能行因禱師加護即壯而能行然後知師功行至矣師一日謂諸徒曰吾筋力衰疲勞於應接安得幽僻處一庵地以養餘年檀越聞之曰辯才師有退居之意吾輩蒙其德不為不久盍往擇可居之地乃於龍井山得壽聖院敝屋數楹主者不堪其居願人為代以捨去於是請師徒弟懷益主奉香火汲巾侍缾甲乙相承以嚴佛事其院即吳越王所創國朝賜今額也檀越為師鼎新棟宇不日而成中建尊殿嚴聖像也前有三門示三解脫也鐘鼓有閣警晦明也堂曰潮音信羣聽也齋曰訥欲無言也室曰寂寂而常照也閣曰照照而寂也泉曰沖用不窮也又堂曰閒趙公致政訪師退居二閒人也庵曰方圓不執一也橋曰歸隱退以樂也沼曰滌心滌清澈也羣居有寮安其徒也眾山環遶景象會合斷崖泓澄神物攸宅龍井巖也勢將奮迅百獸竄懾獅子峯也昔人飼虎以度有情薩埵石也修竹森然蒼翠夾道風篁嶺也元豐八年秋余被命陪高麗國王子祐世僧統訪道吳越嘗謁師於山中乃度風篁嶺窺龍井過歸隱橋鑑滌心沼觀獅子峯望薩埵石升潮音堂憩訥齋酌沖泉入寂室登照閣臨閒堂會方圓庵從容論議久而復還師異日遣其徒丐文以紀其本末余既與之記又繫之以詩十三章云詩見後咸淳臨安志龍井延恩衍慶院在風篁嶺乾祐二年居民凌霄募緣建造舊額報國看經院熙寧中改壽聖院紹興三十一年改廣福院淳祐六年改今額有龍井元豐二年辯才大師元淨自天竺退休兹山始鼎新棟宇及遊覽之所山川勝槩一時呈露而二蘇趙秦諸賢皆與辯才為方外交名章大篇照暎泉石龍井古荒剎由是振顯豈非以其人乎西湖遊覽志延恩衍慶講寺俗稱龍井寺見林右公輔集龍井志敘詳卷八謹案傑作記時在元祐中當曰壽聖院記若延恩衍慶後來更名何得題曰延恩衍慶院記耶咸淳臨安志蓋誤魏㟲錢塘縣志龍井寺明弘治中洪水氾溢遂廢武林梵志萬歴二十三年司禮孫隆命僧真果重修浙江通志康熙間僧一泓重葺謹案蘇轍辯才碑沈遘請師以教易禪此講寺之所由稱也又龍井名寺之始不可考以西湖遊覽志臆之當在明之中葉迄今寺門扁曰龍井遊人不知宋時院名者多矣詳卷六謝輔碑下附寺址所在見秦觀遊記詳卷六沈儀兩湖麈談錄地勢幽僻峯巒迴合迥絕塵凡余童時猶見小庵及辯才塔俗呼為老龍井秦少游題名記所謂夜二鼓至潮音堂訪辯才即其地也今之寺則井之所在耳非院也張京元西湖小記寺北向井在殿左謹案秦觀遊記諸書知宋時寺址與井相遠又知遊者先至井旁然後至寺而寺之北向蓋其來久矣今寺內殿宇並向東北與寶俶塔正對舊寺門向南扁曰龍井寺者即此門也今去門扁為繚垣而於御道所經開建新門則與寺內殿宇同向東北又舊寺門之旁別有小新門向正南古蹟見咸淳臨安志者十七歸隱橋咸淳臨安志釋元淨詩謝講竺峯寺歸隱新此橋院幽結林表身老寄煙霄楊傑詩道人從此歸影不入廛市端坐笑浮雲往來太多事咸淳臨安志在龍井因東坡易名曰過谿武林舊事寺前有過谿橋又名歸隱橋又名二老橋吳自牧夢粱錄龍井路口曰歸隱橋蓋東坡欲易於過谿建此橋也過谿亭咸淳臨安志東坡嘗詣辯才師師送至嶺上因舉遠公過虎谿事師笑曰杜子美不云乎與子成二老來往亦風流遂作亭嶺上名曰過谿亦曰二老東坡賦詩紀之德威亭咸淳臨安志即舊龍井亭東坡書扁武林舊事二老亭後改德威舊在風篁嶺頭今移於龍井祠下謹案武林舊事以德威為過谿四名而志兩列院下或者移祠下時因借德威名耶方圓庵上天竺山志釋守一記天竺辯才法師以智者教傳四十年學者如歸四方風靡於是晦者明窒者通大小之機無不遂者不居其功不宿於名乃辭其交游去其弟子而求于寂寞之濱得龍井之居以隱焉南山守一往見之過龍泓登風篁嶺引目周覽以索其居岌然羣峯密圍㳷然而不蔽翳四顧若失莫知其鄉逡巡下危磴行深林得之于烟雲髣髴之間遂造而揖之法師引予並席而坐相視而笑徐曰子胡來予曰願有觀焉法師曰子固觀矣而又將奚觀予笑曰然法師命予入由照閣經寂室指其庵而言曰此吾之所以休息乎此也窺其制則圓蓋而方址予謁之曰夫釋子之寑或為方丈或為圓廬而是庵也胡為而然哉法師曰子既得之矣雖然試為子言之夫形而上者渾淪周徧非方非圓而能成方圓者也形而下者或得於方或得於圓或兼斯二者而不能無悖者也大至於天地近止乎一身無不然故天得之則運而無積地得之則靜而無變是以天圓而地方人位乎天地之間則首足具二者之形矣蓋宇宙雖大不離其內秋毫雖小待之成體故凡有貌象聲色者無巨細無古今皆不能出於方圓之內也所以古先哲王因之也雖然此遊方之內者也至於吾佛亦如之使吾黨祝髮以圓其頂壞色以方其袍乃欲其煩惱盡而理體圓定慧修而德相顯也蓋溺於理而不達於事迷於事而不明於理者皆不可謂之沙門以制禮樂為衣裳至於舟車器械宮室之為皆則而象之故儒者冠圓冠以知天時履句屨以知地形蓋蔽於天而不知人蔽於人而不知天者皆不可謂之真儒矣唯能通天地人者真儒矣唯能理事一如向無異觀者其真沙門歟噫人之處乎覆載之內陶乎教化之中具其形服其服用其器而於其居也特不然哉吾所以為是庵也然則吾直以是為蘧廬爾若夫以法性之圓事相之方而規矩一切則諸法同體而無自位萬物各得而不相知皆藏乎不深之度而游乎无端之紀則是庵也為無相之庵而吾亦將以無所住而住焉當是時也子奚往而觀乎嗚呼理圓也語方也吾當忘言與之以無所觀而觀之於是嗒然隱几予出以法師之說授其門弟子使記焉咸淳臨安志楊傑詩地方不中矩天圓不中規方圓庵裏叟高𧼈有誰知寂室咸淳臨安志釋元淨詩心寂寂自絕此意焉思說寒雲散空庭獨有月照雪楊傑詩白雲隔塵喧虛室太岑寂寒盡春自來鶯啼報消息照閣咸淳臨安志釋元淨詩高峯銜皎月深壑瀉飛湍誰來白雲裏與汝凭欄看楊傑詩幽人無適莫乘興登高閣夜月鎖雲林春花繡巖壑秦觀淮海集獼猴鏡裏三身現龍女珠中萬象開未若此軒人散後水光清泛月華來閒堂咸淳臨安志楊傑詩趙公歸休年訪師翠微間始知浮世上白日兩人閒咸淳臨安志註在方圓庵東趙清獻公既挂冠而辯才法師亦退居此山因以命名謹案西湖志以過谿亭閒堂入古蹟而寂室照閣仍列本寺下不以類敘易之訥齋蘇轍欒城集記錢塘有大法師曰辯才初住上天竺山以天台法化吳越吳越人歸之如佛出世事之如養父母金帛之施不求而至居天竺十四年有利其富者迫而逐之師忻然舍去不以為恨吳越之人涕泣而從之者如歸市天竺之眾分散四去事聞於朝明年俾復其舊師黽勉而還如不得已吳越之人爭出其力以成就廢缺眾復大集無幾何師告其眾曰吾雖未嘗爭也不幸而立於爭地久居而不去使人以己是非彼非沙門也天竺之南山山深而木茂泉甘而石峻汝舍我我將老於是言已策杖而往以茅竹自覆聲動吳越人復致其所有鑱嶮堙圮築室而奉之不期年而荒榛巖石之間臺觀飛湧丹堊炳煥如天帝釋宮師自是謝事不復出入高郵秦觀太虛名其所居曰訥齋道潛師參寥屬余為記余聞之師始以法教人叩之必鳴如千石鐘來不失時如滄海潮故人以辯名之及其退居此山閉門宴坐寂默終日葉落根榮如冬枯木風止浪靜如古澗水故人以訥名之雖然此非師之大全也彼其全者不大不小不長不短不垢不淨不辯不訥而又何以名之雖然樂其出而高其退喜其辯而貴其訥此眾人意也則其以名齋也亦宜繫之以詞曰以辯見我既非見我以訥見我亦幾於妄有叩而應時止而止非辯非訥如如不動諸佛既然我亦如是咸淳臨安志釋元淨詩憶昔毗耶老杜口有誰聽還聞寂寂裏其辯過雷霆楊傑詩天道竟何言四序自流轉迺知毗耶離默然真大辯謹案蘇軾次葉教授詩訥庵有老人即此訥齋潮音堂咸淳臨安志釋元淨詩真說無所示真聽無所聞海潮山外過妙響入深雲楊傑詩潮來音普聞潮平音亦歇孰若此山堂潮音未嘗絕滌心沼咸淳臨安志楊傑詩縱有狂風生未嘗險浪起何當招世人來此鑒清泚薩埵石咸淳臨安志釋元淨詩巨石如掌平兀然半青嶂欽哉昔道人飼虎兹巖上楊傑詩解虎錫常閒飼虎石常在忘軀度有情清風幾千載謹案咸淳臨安志又有獅子峯元淨楊傑俱有詩今考獅子峯係山名且非龍井所可獨擅與詩並附卷一兹不列月林堂巖齋風玉軒咸淳臨安志註見舊記不知何人所創謹案程珌遊記月林辯才所廬也即此龍井亭咸淳臨安志釋元淨詩虛亭亂石間中有潛虬府澄湛源莫窮旱歲為霖雨謹案元淨所詠疑即過谿亭存考沖泉咸淳臨安志釋元淨詩物外老餘生泉發幽巖裏自可給缾盂不羨滄溟水楊傑詩不汲泉不盈愈汲泉愈清湛然有常德隨氣利羣生見楊傑院記詳上魏㟲錢塘縣志舊志云在老龍井甚清冽謹案元淨十詠楊傑十三詠其方圓庵閒堂滌心沼三詠元淨無之又元淨曰龍井亭而楊傑則直曰龍井而已故楊傑詩別附龍井下龍泓亭咸淳臨安志趙抃詩并敘余元豐己未仲春甲寅以守杭得請歸田出遊南山宿龍井佛祠今歲甲子六月朔旦復來六年於兹矣老僧辯才登龍泓亭烹小龍團以迓余因作四句云湖山深處梵王家半紀重來兩鬢華珍重老師迎意厚龍泓亭上點龍茶釋元淨和詩南極星臨釋子家杳然十里祝青華公年自爾增仙籙幾度龍泓詠貢茶謹案龍泓亭亦疑即過谿亭古蹟雜見傳記者十二鐘鼓閣見楊傑院記詳上鐘樓見鄭清之秦觀龍井題名跋詳卷八謹案鄭作此跋時當紹定中蓋重建也與鐘鼓閣不嫌並列藏經閣鄧文原素履齋稿記寺肇始於吳越錢氏曰報國看經院宋熙寧初賜名壽聖紹興間又更曰廣福其曰延恩衍慶者淳祐六年賜額也壽聖故圮陋莫能庇風雨時辯才師謝事天竺來居之咄嗟而檀施響臻棟宇雲搆搢紳士大夫慕望而與之遊者迹接乎兹山之內由是人境之勝甲於西湖余嘗過龍井訪方圓庵登潮音堂高風逸韻灑然心目若見其人信知一念所攝即清淨妙圓覺境亦古今之常理也一日寺僧居弈來謁曰元貞初比邱德祐嗣兹法席崇敞像設廬居丹堊楞填之工咸增舊觀又買上腴一頃有半以飯僧復捐己田為畝者百以重追遠居弈纘承其志購四大部及華嚴合論宗鏡錄耆德時演時集居億等悉聚力具大寶藏襲以髹函庋以飛閣觀者挹其亢爽可以扶幽闡微於是寺有成績今住山者德泉也記之以諗來者聽泉軒張昱可閒老人集聽泉軒為龍井智法師賦詩山僧聽得泉聲好每夜坐忘清夜深松上落來驚鶴夢潭中瀉下雜龍吟觀身已淨平生垢到耳能空現在心此去涓流如不息沛然難禦海鯨音鏡清堂諸天閣並見武林舊事諸天閣亦見西湖遊覽志觀音殿見馮夢禎快雪堂集龍井寺新建白衣觀音殿勸緣述文詳卷八謹案此當在寺內與偕亭見張京元西湖小記詳卷五與眾亭西湖遊覽志與眾亭司禮孫東瀛所構鑿花池于前以復古蹟秋月堂與時亭並見魏㟲錢塘縣志謹案此一堂一亭不見他書惟魏㟲錢塘縣志有之錄以備考與時疑即與偕或與眾之誤別有鏡心堂必鏡清堂之誤鉢池庵則誤入他寺辟塵爐則非古蹟且亦別見六通論詳卷十又查慎行註東坡白雲堂詩引咸淳臨安志在龍井壽聖院今無其文而堂自在天竺查註誤詳元淨外傳古蹟不屬僧寺者三霖雨閣陳善杭州府志在龍井嘉靖間總督胡宗憲建相傳井中有龍每大旱禱之輒雨故名武林梵志僧智果重修霖雨閣龍井山齋譚元春嶽歸堂集同李長蘅尋聞子將龍井山齋詩楓色紅難已黃從翠處分偶然亂葉下風雨似同聞谷鳥臨寒路籬花間遠雲逢幽無一語心眼自氤氳十里蒼蒼路非深亦覺遐陰晴淡山氣雞犬靜人家閣迥生谿水萍香過荈花紅黃光莫豓羣動豈無涯西湖志明孝廉聞啟祥別業是宋人方圓庵遺址蓀壁山房夏時正杭州府志金應桂入元隱居風篁嶺吳瓚武林紀事應桂字一之標度風雅居西湖南山築蓀壁山房左絃右壺設圖史古器客至撫摩諦玩清談不休每肩輿入城幅巾氅衣望之若神仙然地志諸書所未詳者二凖提庵謹案今風篁嶺上有庵寺僧曰凖提庵也祀神胡姓南渡時著應者然則即舊顯應廟址也土人稱為土地廟雲共庵謹案今風篁嶺背一庵額曰雲共傳為國朝初年建惜無碑記歲月可考以上二庵不關龍井寺以其近嶺存之寺內外古蹟題後濳說友稱南北兩山僧寺大小合三百六十一院何論焉屬有功成身退從者歸市施集大檀品蓋萬衲於是後來踵繼益搜剔奇最故三宿之戀非所語於遊方之內者也
