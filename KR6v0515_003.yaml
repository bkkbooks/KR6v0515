body:
  text: 臣汪孟鋗恭纂名僧開山僧隋真觀法師釋道宣續高僧傳字聖達吳郡錢塘人俗姓范氏道安禪師頭陀石室續高僧傳隋開皇十四年真觀法師共道安禪師頭陀石室檀越陳仲寶率諸同侣開藏拓基搆立精舍號南天竺西湖遊覽志風篁嶺畔崇恩演福寺俗稱南天竺隋法師真觀居之釋元敬元復武林西湖高僧事略觀字聖達錢塘范氏子世本顯仕師生有奇相出家通經律論尋謁天台智者請受禪觀智者以師齊年止為法兄弟開皇十五年於靈隱山頭陀石室宴坐衆建南天竺寺請師居焉是為開山始祖常講法華以心為要感臯亭神請講捨祠宇為佛殿每盥洗餘滴地不為濡人尤異之師有雅操文帝三徵秦王兩延皆以疾辭大業中因山行自標葬地夢與智者同輦翼佛還山覺而嘆曰吾六十二應終以講法華力延一紀今七十四生期畢矣中夜入寂塔在東岡謹案西湖高僧事略謂師於靈隱山頭陀石室宴坐詳續高僧傳頭陀石室次道安之下陳仲寶之上人名非地名也説法僧唐通禪師處棲上座釋道源景德傳燈録杭州龍井通禪師處棲上座問如何是龍井師曰意氣天然別人工畫不成曰為什麼畫不成師曰出羣不戴角不與類中同曰還解行雨也無師曰普潤無邊際處處皆結粒曰還有宗門中事也無師曰有曰如何是宗門中事師曰從來無形段應物不曾虧問如何是吹毛劒師曰拽出著謹案景德傳燈録通禪師為吉州青原山行思禪師第六世慧能大鑑禪師之法嗣行思禪師實福州雪峯義存禪師法嗣也大鑑禪師即世所稱六祖柳宗元河東集有大鑑禪師碑文住山僧宋元淨法師咸淳臨安志元淨本姓徐字無象於潛人十歲出家受業於慈雲慈雲沒復事明智年二十五賜紫衣及辨才號知杭州呂溱請住大悲寶閣居十年沈文通遘治杭命住上天竺乃以教易禪師增室至萬礎重樓傑閣冠於浙西學者數倍居十七年有奪之者遂還於潛逾年復歸天竺留三年謝去老於南山龍井之上精修行業行成力具著應非一元祐八年示寂壽八十一門下侍郎蘇轍撰碑翰林學士蘇軾書集賢校理歐陽棐書額西湖高僧事略師名元淨字無象於潛徐氏生而左肩肉起如袈裟絛八十一日乃滅父嘆曰是宿世沙門也自幼出家受業於慈雲日夜精勤慈雲沒後復事明智年二十五賜紫衣及辨才號居天竺十七年有利而奪之者逾年奪者敗復以𢌿師越二年謝去老於南山龍井之上元祐八年示寂壽八十一果符初生肩痕之徵塔成東坡志其行事潁濱為銘贊曰法苑將興棟梁攸屬揮麈白雲雨花飄馥維趙與蘇式是高躅龍井風清過者必肅釋念常佛祖通載法師幼生其伯父異之曰必使事佛十歲出家十二就學於慈雲將示寂乃入方圓庵七日出偈示衆即右脅而化東坡命子由為之銘武林梵志元祐八年示寂塔成東坡銘其事王圻續文獻通考元淨杭州龍井法師始生伯祖異之謹案諸傳敘事大抵皆同並從刪節以蘇轍辨才碑考之十年出家十八學於慈雲則咸淳臨安志十歲出家受業於慈雲佛祖通載十二就學慈雲俱誤又伯祖父歎為宿世沙門則西湖高僧事略之以為父亦誤又元祐六年示寂而咸淳臨安志及西湖高僧事略武林梵志俱云八年亦誤至武林梵志謂東坡銘其事蓋承西湖高僧事略東坡志其行事潁濱為銘之誤而加誤焉尤不待辨弟子懷楚見蘇轍辨才碑詳卷八見秦觀元淨十詩跋詳卷八逵上人見蘇軾楚逵二上人書經跋詳卷八謹案楚逵並稱亦弟子也徒弟懷益見楊傑院記詳卷二見辨才心師銘詳卷八散老鄒浩道鄉集送散老歸龍井長安冥冥砂礫飛道人趼足來何為師恩浹髓未為報誓求卿相成其碑卿相盈朝成者誰尚書妙墨侍郎詞二公奔走天下士士獲一面猶幾希道人願力豈不滿文字乃今兼得之龍井神龍應護持杖頭星斗東南垂過門別我自色喜我愧儒冠多背師謹案道鄉集尚書妙墨侍郎詞下注云二蘇公考蘇轍辨才碑求碑者乃弟子懷楚即此散老耶又一人耶不可知矣詳儒冠背師語其為弟子無疑也居簡禪師白琳靈隱寺志敬叟居簡禪師臨濟宗潼川龍氏世業儒依邑之廣福院圓澄得度參別峯塗毒於徑山往育王見佛照機契出世台之般若遷報恩真西山為江東部使者虛東林命之以疾辭乃於飛來峯北澗掃一室居之十年人不敢以字稱以北澗稱之趙節齋奏請補靈隱師笑曰吾日迫矣淳祐丙辰春示寂三月二十八日索紙書偈於紙尾復書五月一日珍重六字至期昧爽索浴浴罷若假寐然視之已示寂矣壽八十三臘六十二有北澗集十九卷張子序其集曰讀其文宗密未知其伯仲誦其詩合參寥覺範為一人撰龍井法堂榜文見卷八住山宗炳見鄭清之跋秦觀龍井題名詳卷八僧全咸淳臨安志主僧可全蘇籀雙溪集龍井僧全示寄庵樞密程公纍篇季文弟新什求余繼其末一首程蘇中興什同庵有後前前朝沙門首辨淨超卓然耆宿失聞聰飼參餘小全龍泓風篁巘荏苒二十年緇儔幾換易巖崿豈變遷亭亭百歲杉泠泠九淵泉梵音擾龍性元解忘魚筌有容輦瓌詭無情施繒錢佛法佇隆興般若須人傳更令觀剎麗但俾子孫賢三空正覺路一踰實相圓不替人天師重新演教禪薑夔白石集嘉泰壬戌上元日訪全老於此觀沈傳詩碑隆茂宗畫贈詩二首深夜跨羸驂杳杳春山路入寺君未知間看桂移樹沈碑含秀潤隆畫出神奇道人那得此老子乃耽之又齋後與全老銛朴翁聰自聞酌龍井而歸賦詩二絶四人松下共盤桓筆硯花壺石上安今昔興懷同此味老仙留字在孱顏年時六月海揚塵遙見青山起白雲聞有高僧來誦咒巖前拋珓問龍君謹案薑夔四詩咸淳臨安志載於淨林廣福下白石集有注亦以全為淨林廣福主僧而蘇籀直云龍井僧益證演福為龍井之説不謬不獨詩有辨淨風篁句也咸淳臨安志稱全於淨林創松關南泉芳桂為留憩之地葛天民初為僧名義銛字朴翁聰師白石集詩題聰自聞詳上周紫芝太倉稊米集酌龍井泉書聰師房二首十里泉聲咽斷巖繡衣元衮閉朱龕老翁不要千山雨只乞龍君一勺甘八十霜髭不出門老師猶是辨才孫高人已復如雲散舊事那堪與客論謹案東坡集思聰名説云法惠圓師小童彭九自言未有法名而同師皆聯思字遂與名思聰庶幾他日因聲以得法又送錢塘僧思聰歸孤山敘云聰七歲善彈琴十二舍琴而學書十五舍書而學詩又不已遂讀華嚴諸經入法界海慧今年二十九老師宿儒皆敬愛之少遊取楞嚴文殊語字之曰聞復使聰日進不止自聞思修以至於道則華嚴法界海慧盡為蘧廬據此則聰師似即其人然自聞聞復其字不同而白石詩作於寧宗嘉泰時距元淨之寂一百餘年證以紫芝八十辨才孫句知又一聰聞也又軾記服生薑法淨慈寺有僧號聰藥王依公敖陶孫臞翁詩集僕以紹熙壬子中夏二十五日始躋風篁討龍井遂至廣福謁三賢像閲舊碑追觀一代風流為賦此詩適月林依公留設茗供因書以遺之他日能為我揭詩板於壁間使示來者亦山中之一助也奇石斕橫道兹山信多姿江湖釃兩股一泓乃孤危相傳龍所象或恐神護持腥風轉霮䨴陰崖立淋漓山僧作屋意慘淡生幽思胡為金繆影顛倒眩俗兒生來百念失蒼宮導前馳招提果深登屐痕恍前期咄哉少肉山看此高顴師端能致遨頭絶唱相娛嬉過溪亦何事相送了不疑渠能縛禪律因來數鬚眉我愛秦郎記字壓頭陀碑月林只夜夜人物自一時賢愚盡蟻封來者吾得知元澄公上天竺山志佛澄法師名性澄號湛堂會稽孫氏子虞集道園學古録次韻鄧文原遊龍井詩杖藜入南山卻立賞奇秀所懷玉局翁來往絇履舊空餘松在澗仍作琴築奏徘徊龍井上雲氣起晴晝入門避霑灑脫屐亂苔甃陽岡扣雲石陰房絶遺搆澄公愛客至取水挹幽竇坐我薝蔔中餘香不聞嗅但見瓢中清翠影落羣岫烹煎黃金芽不取穀雨後同來二三子三咽不忍嗽講堂集羣彥千磴坐吟究浪浪雜飛雨沈沈度清漏令我懷幼學何為裹章綬謹案柳貫有送南竺澄講主詩即此詩之澄公也宋濂學士集天竺圓照若公塔銘佛海大師主南天竺崇恩演福教寺上天竺山志澄公至順壬申效辨才故事拂衣歸南竺之雲外齋澄公蓋演福僧今以虞詩存之詳卷十僧蒙潤浙江通志引稽古續集字玉岡海鹽人生時母感異夢禮伽藍土偶皆仆居風篁嶺專精念佛修法華光明大悲淨土以七七為期後示弟子止觀安心之法稱佛而逝學士集故文明慧海法師塔銘南天竺素稱教海湛堂遷上竺玉岡潤公來補其處智法師見張昱詩題詳卷二德祐居奕時演時集居億住山德泉並見鄧文原閣記詳卷二謹案記稱元貞初比邱德祐嗣兹法席元貞元成宗紀號記蓋為住山德泉作明大彰學士集故文明海慧法師塔銘弟子廣福大彰演福如玘謹案壽聖院紹興中更名廣福詳卷十天巖上天竺山志竺隱存翁法師宏道傳秀之天巖耀公退寂廣福請師自代曦南仲上人王逢梧溪集奉覽龍井倡和什為曦南仲上人題竺源龍象國齊州鳳麟苑千齡始彙應匪惟晉陶遠惟杭萃秀靈梅柳並清婉湖飲六綵虹磬殷疊翠巘悠然泳飛外瓶錫簉軒冕藻章婉蘇秦泉思湧參辨間含棘林香勝味御厨雋遺珠信僧寶了不見兵燹蒼寒境四寂手之忍釋卷藤花墜來深松巢白雲偃以仁見公輔集龍井志敘詳卷八僧真志見快雪堂集送果上人敘詳卷八僧真果見武林梵志詳卷一卷二見快雪堂集龍井復賜田記詳卷八又日記詳卷九國朝僧一泓西湖志龍井延恩衍慶院康熙年間僧一泓重葺亦見浙江通志詳卷二僧慧輅張彙塔銘詳卷八白琳靈隱寺志諦暉歷住興福妙濟師林天竺龍井諸寺謹案地志諸書龍井甚略住僧莫考要亦住斯寺者大抵靈竺退院故不若名山大剎之可以世次也掇拾遺文疏其名字如右若蘇軾辨才尺牘之法孫程珌記出觀辨才像之主僧周必大記遊之龍井僧馬臻詩題之南竺詩僧張京元西湖小記之山僧者惜俱失其名矣僧塔可考者宋僧贊寧佛祖通載贊寧隨錢王歸朝姓高氏其先渤海人唐天祐中生於吳興之德清金鵝別墅出家杭之祥符習南山律武肅諸王公族咸慕重之署為兩浙僧統賜號明義宗太平興國三年太宗召對改賜通惠至道二年示寂十國春秋本傳本姓高氏為兩浙僧統太平興國三年召對資福殿賜紫方袍尋賜號曰通慧命充翰林史館編修纂高僧傳三十卷內典集一百五十卷外學集四十九卷歸杭州卒諡圓明葬龍井孫治靈隱寺志贊寧侍者塔龍井謹案咸淳臨安志在放馬場棲真院前武林舊事小麥嶺贊寧塔注天聖間葬此今依十國春秋等書存之僧元淨詳上咸淳臨安志在龍井夢粱録龍井壽聖寺辨才和尚塔謹案西湖遊覽志在演福院內上天竺山志邵氏七識亦云今依咸淳臨安志存之明僧原璞見學士集原璞法師璋公圓碑銘詳卷八謹案宋高僧傳遺身篇杭州真身院寶塔寺紹巖俗姓劉雍州人於錢塘水心寺挂錫恆諷持法華經俄感陸地生寶蓮續召於杭塔寺造上方淨院以居之開寶四年跏趺坐亡茶毗於龍井山收合作石函置於影堂孫承祐為碑詳文義蓋未造塔故不列名僧題後蘇軾云靈隱天竺和尚退院後卻住一個小村院子竊意正如間散之人託處別業又豈禪教兩院五山十剎甲乙住持者所可比論然而元淨居上竺自謂立於爭地以歸老為樂則兹之引蔓布條誠不可以無述
