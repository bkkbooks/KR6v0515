body:
  text: 臣汪孟鋗恭纂碑刻書畫碑之重刻者三宋秦觀遊龍井記在寺內明董其昌為方伯斗垣周公臨龍井舊名龍泓距錢塘十里吳赤烏中方士葛洪嘗鍊丹於此事見圖記其地當西湖之西浙江之北風篁嶺之上實深山亂石中之水泉也每歲旱禱雨輒應故老相傳以為有龍居之然泉者山之精氣所發也西湖深靚空濶納光景而涵煙霏菱芡荷花之所附麗龜魚鳥蟲之所依憑漫衍而不迫紆餘以成文陰晴之中各有奇態而不可以言盡也故岸湖之山多為所誘而不克以為泉浙江介於吳越之間一晝一夜濤頭自海而上者再疾擊而遠馳兕虎駭而風雨怒遇者摧當者壞乘高而望之使人毛髮盡立心掉而不禁故岸江之山多為所脇而不暇以為泉惟此地蟠幽而踞阻內無靡曼之誘以散越其精外無豪悍之脇以虧疏其氣故嶺之左右大率多泉龍井其尤者也夫蓄之深者發之遠其養也不苟則其施也無窮龍井之德蓋有至於是者則其為神物之託也亦奚疑哉元豐二年辯才法師元淨自天竺謝講事退休於此山之壽聖院院去龍井一里凡山中之人有事於錢塘與遊客之將至壽聖者皆取道井旁法師乃即其處為亭又率其徒以浮屠法環而咒之庶幾有慰夫所謂龍者俄有大魚自泉中躍出觀者異焉然後知井之有龍不謬而其名由此益大聞於時是歲余自淮南如越省親過錢塘訪法師於山中法師策杖送余於風篁嶺之上指龍井曰此泉之德至矣美如西湖不能淫之使遷壯如浙江不能威之使屈受天地之中資陰陽之和以養其源推其緒餘以澤於萬物雖古有道之士又何以加於此為我記之余曰唯唯跋云此文見淮海集龍井有此碑乃米元章書今已不復存但有方圓庵記余倣米法以補之壬戌元正晦秉燭記其昌錢塘門人金嘉會摹勒上石董其昌畫禪室隨筆補龍井記書後云秦太虛龍井記直稱蘇家勝友元章此碑絕得李栝州三昧惜多殘缺余為補之然聞趙吳興曾欲補米書數行一再易之皆不相似曰今人去古遠矣則余其有續貂之愧也夫家藏集集宋米芾書龍井記石本跋云天水尹希賓嘗蓄米老所書秦太虛龍井記石本字畫雄放但其文多缺處其子寬因錄全文於前以便讀者託吾友史明古求余題之尹君之意雖為故物重然亦重乎米書而又不無不重乎太虛之文也君如重其文則太虛又嘗有龍井題名記及東坡跋語更錄以附於後則不獨全龍井之文且并龍井之事全矣余方與明古約同遊杭豫期日月而龍井者杭之勝處也至則當案記文所載次第登覽亦將為數語以續古人歸其為君再書以附之又遊龍井記橫碑在寺內文見上謹案此碑不知何人重摹前則大碑也鄭清之跋備述刻記始末二碑並失之見下釋守一方圓庵記在寺內文見卷二元豐癸亥四月九日慧日峯守一記米芾書跋云不二作此文成過余愛之因書鹿門居士米芾元章又跋云辯才故與蘇子瞻伯仲洎趙閱道秦少游為方外交其人可知已太守請住名剎晚年自天竺歸老龍井之山結廬曰方圓夫生人圓顱方趾所本來也其用萬端幻化而不窮率歸於遑遑不吾寂斯方圓義畢至吾人寄身蜉蝣而襟期宇宙善用方圓者也泥之則不善將為方乎將為圓乎善乎師與守一之說守一記之而米南宮善其文手書於石並稱奇絕龍井昔傳神物所託故祠龍君於此遇夏不雨有司為百姓請命而禱輒應今年余以不雨禱於祠下問之遊人石已斷仆榛莽中久矣余覓有舊刻采石重一過樹於故蹟噫天地之靈物未嘗終祕師之蔽廬幾於道九九行完而率復人賢之而祀焉南宮書法超邁入神幸見之可洗瘴毒均山靈神氣所鍾此余重刻意也書以紀之萬歷丁酉仲夏知仁和縣事晉陵胡澄跋謹案仁和縣志萬歷二十一年知縣胡澄武進人壬辰進士任四年安世鳳墨林快事方圓石刻此米之最有聲合作者乃以庵之增修好事者適得米老舊搨以補亡而恰遇一顛倒裝潢者錯其先後遂據之入石虎林遊人如織莫有為之是政者余早得此本亦以為裝家誤旋入杭摩挲石下依然誤也因另搨一紙為之改裝則文從理順不致誚一公為傖父顛士為糊目矣欲再一正其石而匆匆北歸當賖此恨因識於此嗟乎余所手正之本或未必傳而此段儻不泯泯則後來見者豈遂乏一慧心之彥為了吾恨者余之汲汲老而為此者半欲為後人一二眼耳用寄示此一寸於永永豈區區誇蠧魚之架哉天啟乙丑九月三日魏㟲錢塘縣志章撫功跋案今古石刻雖存而文理舛錯略無倫次不知何人偽刻其真刻亦不知何時易去余志學之年初學執筆購南宮法書愛其奇變種種不一獨龍井記瀟灑俊逸有晉人風度惜其前後倒置因為訂正臨摹數紙稍具形似安得片石易其偽刻庶廬山面目不失舊觀冀有識者鑒之乎謹案孫克宏碑目有此碑不知斷石何往此記見錄於上天竺山志其文正與胡令重刻石本同文從理順惟石本有數缺字而已安世鳳章撫功俱云顛倒舛錯豈又一碑耶原碑存者十一明謝輔龍井感應碑記在寺內錢塘西行一舍許有勝地曰龍井羣山環護奇石行立如奔如仆如趨如伏如龍翔如鳳舞扶輿磅礡而鬱積世傳謂有龍宅其中故名曰龍井前鎮守浙江太監李公創佛寺於其上由是東行百步則公之佳城也然公物故已十有二載矣欽差御馬監太監覃公禮以公幹來莅兩浙欽差鎮守浙江都知監少監盧公永慨惟李公前輩碩德乃於癸未之秋七月丙午相率謁公之墓以覽龍井之勝惟時逾旬不雨沿途田疇乾涸稼將槁二公顧瞻嗟嘆謂農之依田猶魚之依水木之依土魚無水則腐木無土則枯民非稼穡則無以為生昔蘇文忠公謂十日不雨則無禾今不雨將及半月無禾則歲且歉矣其如吾民何爰相與默禱龍井之神其降甘雨以澤吾民則神亦享祀兹土而無愧矣井東面鑿石為龍首引水從口而出久為泥滓所湮覃公以手濬導水隨汩汩而流須臾有物如龍狀浮於水上二公欣然曰此感應之兆也於是與羣公觴詠於寺之東閣酒闌各乘輿之西湖為間油然雲興龍見於天雨下如注溝澮皆盈禾苗改色行旅悅於塗士夫慶於市農民樂於野何其感應之速哉蓋以二公惟忠惟孝敷仁施惠盛典足以動天地至誠足以感鬼神豈偶然哉書曰惟德動天無遠不屆又曰至誠感神其斯之謂與時相從者則鎮守浙江都指揮同知王公布政使司左布政使秦敬按察使副使張岐僉事王鎬都司都指揮僉事陳文劉鼎咸謂古人得禾得鼎則名之於書名之於年二公以精誠而得雨宜特書以示不忘使後人觀斯文則知二公愛民之心也井上有龍王廟二公又秦方伯從而修理一新僉謂余宜記之肆忘其固陋爰摭其實而勒諸石以垂永久云天順七年龍集昭陽協洽秋九月既望立石通奉大夫浙江等處承宣布政使司右布政使臨川謝輔撰文通奉大夫浙江等處承宣布政使司左布政使涿郡秦敬篆額亞中大夫浙江等處承宣布政使司左參政鳳陽王敞書丹謹案太監李公創寺井上謂李德也夏時湖山勝概記創寺山陽殆即其時嶺前寺始此龍井名寺亦始此王守仁風篁山龍井記在寺內新出土已斷為數塊不可搨風篁字模糊或傳為鳳凰蓋非黃克纘李承勳倡和詩在寺內龍井二首蘇公曾訪辯才處夜半空山入定時千古風流難再續徘徊泉上得歸遲千株翠栢半垂藤路繞清谿興自增安事辯公來說法青山何處不逢僧又六言二首廢興新舊龍井高低大小泉亭石似龍騰鳳舞鳥知日落山暝坐上明滅翠岫望中表裏西湖渴飲山僧茶茗醉看大將昆吾李大將軍同遊壬子夏日泉南黃克纘題奉和黃大司馬韻衝炎徙倚龍泓上何異坡公訪辯時喜有黃芽烹石髓清風習習欲歸遲偶隨元老共扶藤古井雲蒸景倍增怪石垂頭渾不語前身疑是缽龍僧路入方圓禪窟泉飛新舊山亭龍臥雲封寂寂客歸月破暝暝洞口兩分邱壑嶺頭雙見江湖坐擁幾篇珠玉顧慚三尺昆吾括蒼李承勳書謹案浙江通志名宦傳引名臣言行略承勳字立卿嘉魚人宏治進士為浙江按察使事持大體風紀肅然仕至兵部尚書又陳善杭州府志成化中為浙江右布政諡康惠朱卿如遊龍井詩在寺內遊龍井山寺逢秋木葉丹漫從飛閣見浮湍分開亂石一泓淺流到片雲千尺寒龍出洞邊朝雨集鳥歸峯外夕陽殘悠然已自忘歸去更有雲腴可當餐萬歷癸丑秋日郡人朱卿如題屠隆龍井茶歌在寺內龍井茶歌與李念江開府公同遊作山通海眼蟠龍脈神物蜿蟺此真宅飛泉歕沫走白虹萬古靈源長不息琮琤時諧琴筑聲澄泓冷浸玻璃色令人對此清心魂一潄如飲甘露液吾聞龍女參靈山豈是如來八功德此山秀結復產茶穀雨霡霂抽仙芽香勝旃檀華嚴界味同沆𤅈上清家雀舌龍團亦浪說顧渚陽羨詎須誇摘來片片通靈竅啜處泠泠馨齒牙玉川何妨盡七盌趙州借此演三車采取龍井茶還念龍井水文武每將火候傳調停暗合金丹理茶經水品兩足佳可惜陸羽未知此山人酒後酣氋氃陶然萬事歸虛空一杯入口宿酲解耳畔颯颯來松風即此便是清涼國誰同飲者隴西公萬歷甲午秋七月赤水洞天居士屠緯真書神運石題字謹案西湖志山水載神運石引陳善杭州府志文與西湖遊覽志同惟鐵牌二十面作二十四面銀二條作一條小異而於碑碣又稱南山道人李德遣五丁神運此石就立在石上有嶻𡺼神運石下有玉泓池十字且云運池二字獨大幾尺餘絕類米書其說不可合竊嘗從石下細加搜剔然後得實焉石前一面真書永鎮大安四大字另又真書嶻𡺼神運石五大字而略帶隸法石字左行又五行甎瓦工籴米等用不敢財助緣共造淘得金銀牌買木石欽差管浙江市舶司陳添保拾中常大夫內官阮隨發心捨財造殿差鎮處州兼總戎事小字極劣又石側有下有玉泓池真書五大字略帶行法後一面真書南山道人李德遣五丁神運此石就立十五大字又小字可辯者六行一二面見在二又淘得鐵牌三武見四造佛殿用諸不可取此一人之下又淘得玉石五兩上寫元豐年待東方姓就六淘池得乾得金一鎰銀五十末有勅令字又石側上有景泰二年歲在辛未仲秋子日此辰霧霾行者不見下有榮祿大夫柱國中臣都太監日南李書乃知德既出石託言五丁以神其事乃於石上增刻文字如上云云然則西湖志十字之說固未識其詳矣國朝谷應泰遊龍井詩在寺內春日同諸公遊龍井寺二首誰念荒山裏還留一片雲經臺花自落曲苑鹿為羣暗壁泉流注斜陽鳥背分臨風聊盥潄差可散微醺嘉會稱難遘兹遊未寂寥風前招白鶴雨後發青苕丹竈埋雲冷豐碑積蘚敲升沈陵谷路於此悟逍遙古燕谷應泰盧高遊龍井詩在寺內泉石生來原有癖每逢公暇到名山茂林自可坡仙坐絕壁猶懸米氏顏牧豎谿行敲法相高僧露宿寺潺湲古人陳迹嗟誰起遍語諸公慎莫慳武昌盧高謹案浙江通志高湖廣興國州人順治十三年任浙江驛道張縉彥五言古詩在寺內峩峩一片雲翻翥如驚鵠淅淅龍泓水繞砌鳴寒玉綺林通曲徑飛蓋相追逐石竇迷煙霄清音沸泉谷歷歷幾何時悉以供樵牧三賢遺往蹟千載懷高躅彈指廢與興日月何太速中州張縉彥後學潘輿書馬龍友立又七律二首在寺內題龍井寺風篁夾道響颼飀博得公餘一日遊秉笏何人呼石丈藉茅我欲拜山侯匡牀留月僧初定古栢藏龍樹已秋惟有片雲飛不去玲瓏長嵌老龍湫方圓庵方圓庵下草初長丈室相傳莽棘場短拂空留寒篠綠遺碑猶帶紫茸香共尋二老當年路欲祀三賢何處堂片石停雲猶足記戲鴻遊鶴出襄陽天中張縉彥謹案浙江通志縉彥字坦公河南新鄉人前辛未進士順治十一年任浙江布政使張士偉禱雨記在寺內康熙癸酉五月中旱所在設壇禱雨至六月初一日撫憲諭各處行香余往龍井虔禱擊神運石而雲生回至湖中雷聲隱隱遙望塘棲一帶下雨既至萬松書院魁星樓見雨自北關至昭慶約下一二時初二日杭城又雨甚喜而誌杭府經歷錦州張士偉記謹案此附刻秦觀遊記橫碑後碑文見咸淳臨安志者八釋元淨龍井十題詩并秦觀跋詩見各卷跋見卷八趙抃辯才法師真贊文見元淨外傳謹案咸淳臨安志載在延恩衍慶院下未言刻石夏時正杭州府志註元豐元年資政殿學士右諫議大夫知杭州趙抃撰疑必有見蘇軾題名咸淳臨安志蘇軾錢勰江公著柳雍同謁龍井辯才元祐六年正月七日又咸淳臨安志元祐庚午辯才老師年始八十道俗相慶施千袈裟飯千僧七日而罷眉山蘇軾子瞻洛陽王瑜中玉安陸張璹全翁九江周燾次元來餽薌茗二月晦日書秦觀題名文見卷八陳善杭州府志舊在龍井寺鄭清之跋秦觀題名文見卷八陳善杭州府志舊在龍井寺賈似道題名咸淳臨安志靜庵邱邠賈似道乙未臘月二日來遊復亨泰侍又咸淳臨安志後三十一年夏閏大丞相魏國公再登揆席少駐湖曲賜第因謁演福來此客廖瑩中陳詩川從子德生侍西湖志此段題名今已不見碑文見西湖志者二葛采詩西湖志千年靈洞幾人看洞裏丹青畫未乾當是神仙棲止處石懸龍迹噴陰寒巢葛采留題住山善慶摩刻西湖志在龍井正書摩崖乾道題名西湖志林景度韓無咎李無咎李秀叔司馬季思崔子霖韓子師乾道辛卯八月晦自龍井來西湖志在龍井正書字徑四寸摩崖碑文見東坡集者一蘇軾辯才法師真贊文見元淨外傳碑文見快雪堂集者一馮夢禎龍井寺復先朝賜田記文見卷八謹案魏㟲錢塘縣志又有禱雨記以無撰人姓氏不錄碑見文獻集文缺者一趙子昂題名見黃溍南山題名記詳卷八碑見府志文缺者二蘇轍辯才法師行業記夏時正杭州府志在龍井寺元祐癸酉中大夫守門下侍郎蘇轍撰謹案欒城集無此記文楊傑壽聖院訥齋記夏時正杭州府志在龍井寺元祐元年三月朝奉大夫主客郎楊傑撰謹案蘇轍撰訥齋記文見欒城集未言刻石傑作疑誤姑列於此陳善杭州府志亦有之碑見縣志文缺者一孫沔龍井普澤院仁法師行業贊見魏㟲錢塘縣志謹案普澤院詳卷十仁法師無考竊疑魏㟲錢塘縣志多謬誤仁法師或即天台以仁而孫沔則孫姓而其名偶誤題者他無可証闕之書之可考者十一南唐草書四紙宋仁宗飛白四大字並見程珌遊記詳卷八謹案記不言何字寧宗歲寒亭三字養性二字咸淳臨安志並在龍井山路太清宮謹案咸淳臨安志太清宮道院也在錢塘縣履泰鄉龍井山路又有矩玉亭武林舊事歲寒亭作歲寒軒蘇軾書壽聖院額武林舊事延恩衍慶院後改壽聖院東坡書額猶存跋舊與辯才書跋與書並見元淨外傳楚逵二上人書經跋文見卷八靜坐帖文見卷八西湖古蹟事實在寺中釋元淨心師銘文見卷八謹案銘末有書與懷益語寺當有真蹟也周必大等題字周必大二老堂雜志乙亥二月與張德莊周孟覺同遊題字郭祥正題名見郭祥正青山集有和公擇題名詩詳卷七畫之可考者五蘇軾竹石畫壁武林舊事在延恩衍慶寺范仲淹蘇軾蘇轍釋道潛元淨遺像見程珌遊記詳卷八五賢二開士像見張雨句曲外史集詩題詳卷七謹案題云遊龍井方圓庵閱宋五賢二開士像胡則趙抃蘇軾轍秦觀五賢也道潛元淨二開士也水墨羅漢八軸見程珌遊記詳卷八廉布枯木畫壁武林舊事在龍井寺圖繪寶鑑廉布字宣仲山陽人自號射澤老農畫山水尤工枯木叢竹奇石松栢本學東坡青出於藍官至武學博士以張邦昌壻負才不得用鄧椿畫繼後居紹興有畫軸傳於世謹案武林舊事但云廉布枯木而西湖志云枯木竹石且但云蘇軾廉宣仲留題而西湖志云畫壁俱未詳又湯垕畫鑑布自號射澤老人亦互異碑刻書畫題後石壽世最長風霜剝落為矼為礎則不得不有賴乎裒集著錄非石壽不敵梨棗之壽聚於一而流播者廣也一龍井而所得如是意荒崖斷澗之旁埋泐者多矣若夫雲煙過眼放失尤易是宜附之
