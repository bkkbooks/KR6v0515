body:
  text: 臣汪孟鋗恭纂卷上於潛出家之所於潛縣西菩山明智寺咸淳臨安志明智寺在縣西十八里波亭鄉初山之西有光亘天現菩薩像僧道志立茅廬其下元祐間因建佛殿遂名西菩寺治平二年改今額熙寧七年八月蘇文忠公同毛君寶方君武訪參寥辯才遂留西菩山留題建炎間重修秦少游之子湛為記有清涼池明月池雙峯堂滌軒賢秀軒西資閣見山亭又秦湛寺記略云於潛之西菩有光屬天現菩薩像其時僧道志茅廬其下遂聚邑人之錢而廟佛焉號西菩寺實唐天祐中也本朝改曰明智今謂其山猶曰西菩辯才既從此山行道吳越山中之徒思踵其武踴躍精進云云明智以有道者之故棲學佛者望之如仲尼之徒於闕里其氣象景物又蓋境內自於潛十有三里至山之麓未及之五里上松旁澗與道委蛇仰可以蔭俯可以鑑循環曲折乃得平直兩峯屹然如立長人如獲居迎來五老九華未易伯仲泉湧西巖之址盛暑常寒筒引錯落遍於百室是以居者忘出遊者忘歸云云自有此寺已數百年土殞木壞風雨入室像設不嚴威儀不成雙峯既歸未嘗有求邑之富於力者相率施所有寺為之一新云云余先人與辯才善余兒時先人對辯才語必令旁侍其高世之論至今能記一一而辯才物故前先人十年今龍井天竺間雲容山色或誨人愁其能念先人乎余每見來自吳越者未嘗不問辯才門人何如故聞雙峯之名久矣杜門錫山之下一旦蒼頭告余曰門有道人吳語而文亟出見之乃常樂性禪師也謂明智重葺欲余為記且曰先太史常為辯才記龍井今記明智非子可乎余不敢辭雖然雞鳳異調大方之家豈不笑我謹案秦觀為元淨作龍井記而其子又為常樂作明智記亦宗門嘉話也咸淳臨安志載記文本係節錄今從之又釋居簡有西菩造五鳳樓疏註云辯才參寥受業寺則參寥亦出家西菩矣蘇軾有遊西菩寺詩王註於潛圖經毛君寶同尉方君武與東坡於熙寧七年八月廿七日同遊西菩山明智院石刻存焉杭州曾經住持之所上天竺靈感觀音院咸淳臨安志嘉祐末守沈禮部文通以為天竺起於司馬晉時逾七百載而觀音發迹西峯甫及百年遂分為二所謂上天竺也大士以聲音為佛事非禪那所居即謝去住持智月以辯才法師元淨為其主仍請於朝以教易禪賜名靈感觀音院時曾魯公公亮為相實奬其事既而蔡端明襄出守魯公以錢十萬為扁委蔡公為書之蓋魯公慶歷間道杭同行僧元達至天竺瞻禮途中見衣素婦人謂達曰上座同曾舍人來耶舍人五十七入中書語訖無所見已而如其言事具石刻元淨乃益鑿山闢地增廣殿宇魯公又以經五千二百三十卷遺元淨西廡為藏又肅儀亭辯才建蔡襄名謹案蔡襄名者為肅儀上天竺山志云郡守蔡襄有銘不存蓋誤以名為銘上天竺山志山門橋在上竺山門外中竺天正殿前橋右宋時辯才重建雪坡亭東坡訪辯才法師適雪霽搆亭厓下以紀其勝夜講臺治平中辯才淨法師演說無倦嘗謂鬼神少威德則不敢隨眾晝聽乃為夜分講經故名莫考厥初至辯才更建又李綱上天竺天台教寺十六觀堂碑曰辯才淨法師於嘉祐熙寧間兩住本山兼統禪講二教律三宗賜詩褒美東宮復書歸隱之額聽其退居興福謹案碑文千言然不載李綱梁谿集賜詩書額惜他無可証所謂歸隱豈即歸隱橋之謂耶興福疑廣福字誤陳善杭州府志治平中元淨益鑿前山闢地二十有五尋殿皆重檐大悲寶閣院見蘇轍辯才碑詳卷八下天竺佛祖通載元豐三年謝去天竺居龍井六年居南屏明年復歸龍井時靈山虛席師以慈雲師祖道場俯就眾請及月餘定中見金甲神跪前曰師於此無緣不宜久住既受冥告遂還龍井南屏興教寺見楊傑院記詳卷二謹案楊記初住錢塘法惠院之寶閣蓋即大悲寶閣院而咸淳臨安志不載法慧大悲寶閣二院名案淮海集有法慧院記東坡集有法慧院詩正此院也據佛祖通載又知元淨之住下竺最淺云流寓秀州真如寺佛祖通載杭守祖無擇坐獄檇李師以鑄鐘例被追辯幸得釋寓止真如蘭若教祖天台智者大師姚鉉唐文粹梁肅天台智大師碑天台山西南隅一山曰佛隴蓋智者大師得道之所長老大比邱然公光昭大師之遺訓以啟後學門人安定梁肅聞上易名銘勒大師之遺烈以示後世云大師名智顗字德安時號智者其先潁川陳氏世居荊州之華容感緣應蹟載在別傳昔如來乘一大事因緣菩薩以普門示現自華嚴肇開至雙林高會無小無大同歸佛界及大雄示滅學路別派世既下衰教亦陵遲故龍樹大士病之乃用權略制諸外道乃詮智度發明宗極微言東流我惠文禪師得之由文字中入不二法門以授南嶽思大師當時教尚簡密不能廣被而空有諸宗扇惑方夏及大師受之於是開止觀法門其教大略即身心而指定慧即言說而詮解脫緣離化城示滅兹山是歲隋開皇十七年也得深心者三十有二人纂其言行於後世者曰章安禪師灌頂頂傳縉雲威禪師威傳東陽東陽縉雲同號時謂小威威傳左谿朗禪師自縉雲至左谿以元珠相付向晦宴息而已左谿門人之上首今湛然禪師行高識遠超悟辯達凡祖師之教在章句者必引而伸之後來資之以崇德辨惑不可悉數見蘇轍辯才碑辯才曰吾祖智者聖人也詳卷八又見海月碑銘詳卷下釋氏稽古略天聖四年始詔天台教師入大藏流行天竺僧思悟焚身日觀庵前用報佛恩學士集天竺圓照若公塔銘天台一宗自法智尊者之後分為廣智神照南屏三家而南屏最盛謹案肅又有天台法門議止觀統例各一篇載唐文粹上天竺山志亦列教觀一門知天竺住持概宗天台智者蘇轍碑稱元淨因講摩訶止觀悟道是也又傳燈指月等書俱稱智者為應化聖賢故曰聖人本師法雨見蘇轍辯才碑詳卷八遵式咸淳臨安志遵式本姓葉字知白其母始乞靈於觀音遂生法師學行孤高博習教觀因苦學嘔血兩足皮裂師願力堅固以著懺儀行世號慈雲懺主天聖中滅度度弟子百餘人學徒千數崇寧二年賜號慧通天台教觀益盛於吳越者實師之力侍郎王古述其行事紹興三十年旨賜號曰懺主禪慧大法師塔名瑞光見蘇轍辯才碑詳卷八西湖高僧事略師台州寧海人母夢嚥明珠而生出家於東掖山傳天台教於寶雲通未幾繼其席祥符八年刺史薛公請居靈山天竺寺王文穆出守重師之道奏復天竺名尋賜慈雲號依經撰集諸懺法盛行於世常行三昧以九十日為期感應非一凡為法祈禱必燃指惟存三焉天聖九年歸東嶺草堂明年示寂累諡法寶禪慧淳祐八年其徒明禋禱晴獲應加諡聖應淳祐十一年復應加諡正覺咸淳臨安志下竺靈山教寺理宗宸翰八其五曰瑞光之塔曰靈應大法師曰靈應正覺大法師曰靈應正覺廣濟大法師曰靈應正覺廣濟普照大法師謹案此皆慈雲身後賜額又有慈雲禪師真贊及行業記又胡宿下竺寺記祥符中州人聯牒叢叩府下請大士遵式領其眾演天台教觀式公辯博明解遠近向慕智者之學自是益振天禧初文穆王冀公臨州一見加禮為奏復天竺舊額遄承可報冀公親題其榜筆力殊勁且有敕旨許作十方講院主持還朝又表其高行賜號慈雲仍施錢萬緡為營佛殿侍郎胡公繼典是郡又捐己俸於是裒合眾施凡百十餘區又造旃檀觀音像置三昧堂中慈相穆如智者之遺法也初寺有檜枯至是柯葉復茂眾目之曰重榮檜乃蘭若中興之兆又强至寺記王冀公呼主藏者取緡若百萬俾新殿宇謹案咸淳臨安志師諡靈應則西湖高僧事略以為聖應非也然正覺之後又加廣濟普照亦失之又佛祖通載敘孤山圓智法師事有云王欽若出使錢塘慈雲遣使邀圓同迓之圓笑謂使曰錢塘境上且駐卻一僧林逋和靖集有送慈雲師謁王相國詩祖韶見蘇轍辯才碑詳卷八咸淳臨安志胡宿寺記慈雲告老庵於東嶺傳寺事於明智大師祖韶韶公亦宿植德本密資覺力延棲海眾宴坐道場二紀有餘百事無曠又强至寺記慈雲夏臘高樂退巖屋傳其事於門人高弟明智祖韶孤標獨行克遵師業建教藏院以聚本經禮也建延壽院以養病孤仁也建冀公祠宇不忘外護義也建慈雲真堂不忘先禀孝也是四善皆釋子之難能者而明智兼有焉明道歲王人左藏黃副使元吉將命過杭得師歡甚因還侍上懇求御書願賜為叢林榮皇祐改元始賜飛白字凡六軸謹案二記皆為祖韶作遵式祖韶俱未住上竺晁公遡嵩山居士集有明智法師碑姓陳氏名中立明州鄞人常折高麗僧談辯此又一明智也禪友道潛咸淳臨安志道潛於潛浮谿村人本姓何字參寥幼不茹葷以童子誦法華經度為比邱於內外典無所不窺能文章尤喜為詩嘗賦臨平絕句蘇軾為寫而刻諸石軾守錢塘卜智果精舍居之軾南遷道潛欲轉海望之軾以書戒止當路亦捃其詩語謂有譏刺得罪返初服建中靖國初曾肇言其非辜詔復祝髮崇寧末歸老西湖其法孫穎刊其詩集行世又道潛嘗賜號妙總大師墨莊漫錄本名曇潛子瞻改曰道潛謹案續文獻通考道潛在詩僧列又十國春秋吳越時別有一道潛了元陳善杭州府志佛印浮梁縣人名了元字覺老俗姓林性穎異襁褓不茹葷三歲記詩三千餘篇稍長從師通經義因讀釋書恍然有悟遂從釋神宗賜號佛印謹案咸淳臨安志不載了元惠辯蘇轍海月塔碑名惠辯字訥翁姓富氏從韶於天竺受天台教習西方觀復事三衢浮石矩法師韶之將老也命代講續文獻通考海月名惠辯華亭傅氏子生時有異父母令出家入普照寺得法明智遂領寺事遷至杭州都僧正蘇軾倅杭高其行一日合掌坐化遺言須東坡至方合龕四日軾至見其趺坐如生賦三詩焉參寥子集詩當年吳會有名緇盡是人天大導師自註大覺海月辯才釋氏稽古略祖韶有二弟子曰慧辯海月曰元淨辯才海月華亭人受業普照寺上天竺山志在別傳謹案東坡集有海月真贊欒城集有塔碑詳卷下慧惠傅富字誤大覺亦詳卷下元素見蘇轍辯才碑詳卷八熙仲見蘇轍辯才碑詳卷八高麗僧統釋氏稽古略高麗國君文宗仁孝王第四子出家名義天咸淳臨安志惠因寺吳越王建元豐八年高麗國王子僧統義天入貢因請從淨源法師學賢首教詔許之見楊傑院記詳卷二弟子懷楚逵上人懷益散老並詳卷三雙峯見咸淳臨安志詳上繼起之僧圓照咸淳臨安志淨慈圓照禪師宗本字無詰本姓管招善本居上座圓照退居善本繼之泊宅編大通乃圓照弟子時稱吳中二本東坡集書贈惠臻杭州圓照律師志行苦卓教法通洽晝夜行道二十餘年矣無一念須有作相自辯才歸寂道俗皆宗之謹案蘇軾有淨慈寺謁圓照本禪師詩又書贈惠臻稱善本曰小本禪師龍井法嗣聰自聞見太倉稊米集詳卷三謹案龍井僧自懷楚四人外系元淨者惟聰自聞一人可考上天竺法嗣慧日上天竺山志東溟名慧日天台赤城人宋丞相賈魏公諸孫拜竹屋元淨於上竺至元元年涖下竺又遷上竺題名碑第四十三代上天竺山志心安房在雙檜峯麓祖嗣辯才法師為元東溟法師退院至明嘉隆間析為三曰心大心南心外又宋源梵法師東溟門人學士集普濟大師東溟日公碑銘所度弟子下竺則圓興等十人上竺近二百人而妙思妙本妙修為最先嗣真法系者則思齊行樞允鑑允忠良謹普智文會元琇景梵各闡教於一方繼師任上竺者即妙修也謹案上天竺山志宋源梵法師疑即景梵又有性源修疑即妙修
