body:
  text: 臣汪孟鋗恭纂山水總敘陳善杭州府志杭之山紀首昌化竹嶺至於潛白沙關為首節豪千關為第二節臨安泥隖為第三節新城青牛為第四節富陽塌石嶺為第五節餘杭由拳為第六節錢塘分金嶺為第七節自分金嶺徂東而北而東五里五朝山三里龍門山二里牛軏嶺三里黃山三里焦山三里水山五里天柱塢五里五雲山二里郎當嶺三里風篁嶺四里南高峯一里玉岑山一里學士嶺一里九曜山一里梯子嶺一里鍋子山一里慈雲嶺一里教場山又一里積里六十交仁和之鳳凰山為第八節其泉為龍門青山白沙天柱九谿甘谿天真凡七直達乎江北源則為龍門西谿冷泉天竺龍井黃泥程公方家峪凡八北向錢塘謹案陳善杭州府志以里紀山極為明白易曉其北源之泉北向錢塘者猶之曰入湖也山脈天目山李吉甫元和郡縣志天目山有兩峯峯頂各一池左右相對如目左屬臨安右屬於潛田汝成西湖遊覽志西湖諸山皆宗天目西去府治一百七十里高三千九百丈周廣五百五十里蜿蟺東來舒岡布麓若翔若舞萃於錢塘而崷崪於天竺從此而南而東則為龍井為大慈為玉岑為積慶為南屏為龍為鳳為吳皆謂之南山從此而北而東則為靈隱為仙姑為履泰為寶雲為巨石皆謂之北山主山風篁嶺潛說友咸淳臨安志釋元淨詩風篁蔭修嶺挺節含虛心悠悠往還客孰不聆清音楊傑詩微風搖琅玕蕭瑟嶺一道萬帚掃晴空纎塵不可到咸淳臨安志在錢塘門外放馬場西路通龍井嶺最高峻元豐中僧辯才師淬治修篁怪石風韻蕭爽因名曰風篁東坡探梅詩有問訊風篁嶺下梅介亭詩有丹青明滅風篁嶺之句嶺之巔有龍井西湖遊覽志林壑深沈迥出塵表流泉活活自龍井而下四時不絕陳善杭州府志在南山飲馬橋西龍井在其下嶺之西可達江滸謹案風篁嶺在今龍井寺後東北面近嶺諸山雞籠山咸淳臨安志在龍井風篁嶺側高而圓若雞籠然西湖遊覽志獅子峯西有稽留峯俗訛雞籠陳善杭州府志遠樹亭亭望若車蓋四山閴寂虎豹窟藏以是遊者特罕謹案雞籠山今在龍井寺南沙盆塢魏㟲錢塘縣志在風篁嶺下有金沙井回泉鍾液謹案咸淳臨安志龍井山沙盆塢周密武林舊事云風篁嶺沙盆塢西湖遊覽志則云嶺下與魏㟲錢塘縣志同金沙井西湖遊覽志繫演福而魏㟲錢塘縣志演福下亦有此七字次夕佳樓諸勝之列必有一誤碧螺峯聶心湯錢塘縣志自龍井達煙霞可三里許兩旁悉皆奇石森峭其崒者為碧螺峯魏㟲錢塘縣志在風篁嶺側謹案碧螺峯今無之土人稱寺南之山曰螺螄巖疑即此鵶雞峯咸淳臨安志在西山崇因報德院有怪石狀似鵶雞魏㟲錢塘縣志在靈石山前金鐘峯魏㟲錢塘縣志在丫髻峯側謹案丫髻峯即鵶雞峯之異名金鐘峯在龍井寺東南而武林舊事繫雞籠山下存考獅子峯咸淳臨安志釋元淨詩獨爾羣山裏人稱獅子峯無心自哮吼顯晦煙雲中楊傑詩巖峯壯威猛晴雷隱哮吼無心露爪牙百獸自奔走西湖遊覽志高出羣岫可瞰江滸北望天竺諸峯曡秀如畫魏㟲錢塘縣志在天門山側勢若蹲獅最為高峻靈竺諸峯皆拜其下山徑孤峭草樹蒙茸為南山最深處釋廣賓上天竺山志在乳竇峯之右翊大師經行忽聞獅吼故名又天門山兩峯對峙如門其西南曰栗山栗山北擁為天竺諸峯獅子其一也從上竺而南則為龍井謹案獅子峯在風篁嶺西北其名不列咸淳臨安志而當日題詠即多及之山高則四望皆見此靈隱上竺所以亦採入志也袁宏道石公集西湖雜記稱為獅子石未是武林舊事寺下云山有獅子峯楊梅塢傅牧西湖古蹟事實在南山近瑞峯石塢上天竺山志在獅子峯麓又明劉康祉興福院記乳竇獅子兩峯間即楊梅塢魏㟲錢塘縣志在上天竺後謹案西湖遊覽志以楊梅塢敘於片雲石獅子峯之間今由龍井至天竺新開小路必經楊梅塢南山禪關武林舊事舊名龍井路今又改南天竺片雲石李衛西湖志張丹詩荒塗趨沙塢斷崖得石壁鳥足不可棲猿臂豈相借冰核實夏凍露珠信晝滴蘭草倒叢生藤根互盤越仰視巧玲瓏眉宇皆翠色側聞薜蘿人駐此曾洗滌我題聊與賞早閟白雲迹西湖遊覽志在風篁嶺上高可丈許青潤玲瓏巧若鏤刻松磴盤屈草莽間有石洞堆砌工致巉巖可賞西湖志引名勝志風篁嶺上有石俗呼一片雲片雲亭西湖遊覽志片雲亭司禮孫東瀛所構設石枰於前上鐫興來臨水敲殘月談罷吟風倚片雲之句謹案魏㟲錢塘縣志云石上刻字多漫故卷六碑刻削之又國朝厲鶚遊龍井詩註片雲石已仆今已重立寺內矣神運石西湖遊覽志龍井神運石高可六丈許奇怪突兀特立簷下有木香一架穿繞竅竇宛若蛇蟠正統十三年中貴李德駐龍井屬旱令力士淘之初得鐵牌二十面玉佛一枚金銀各一錠鑿大宋元豐年號次得兹石以八十人搜出之上有神運二字旁多款識漶漫不可讀不知何代所鐫也繼得鐵牌十五面銀二條上鑿吳赤烏年號蓋皆投龍以祈雨者其日黑雲四匝泉頭洶湧德懼而止西湖志在龍井寺謹案神運石西湖遊覽志止云兩字西湖志云十字今考石上字甚多詳卷六風篁嶺四至夏時湖山勝概記南高峯麓四出一由前洋嶺大慈山南出龍山抵六和塔當江而止一過慈雲嶺出包家山鳳凰山秦望山一落石塢煙霞二嶺嶺有楊梅塢下有玉岑山山對高麗寺一落西湖過大小二麥嶺西下飲馬橋南至風篁嶺上有龍井今創龍井寺於山之陽西接演福寺路轉而北過胭脂嶺出九里松西湖遊覽志南山勝蹟出清波門折而南為南屏山山西為九曜山與赤山聯屬又西為玉岑山對赤山由湖而陟此者為赤山步赤山北為三台山自此而北為小麥嶺蓋積慶山之陂陁迆邐者有永福橋又西為大麥嶺旁為花家山瀕湖而登為茆家步自永福橋西北為積慶山即靈石山又西北為雞籠山風篁嶺一片雲石楊梅塢獅子峯延恩衍慶寺龍井神運石嶺下沙盆塢嶺畔有崇恩衍福諸寺嶺北有碁盤山登其巔則江湖之勝皆可環眺矣謹案近嶺諸山不必皆以風篁嶺為主山然不立主山則界域不明故由載記所列薈萃考之赤山三台山小麥嶺花家山大麥嶺積慶山山前鵶雞峯並在嶺之東南南則為翁家山煙霞嶺石屋洞水樂洞獅子峯楊梅塢在嶺之西北北則為碁盤山其靈竺諸峯又在獅子峯西北惟金鐘峯今在嶺南而地志或繫雞籠山或繫鵶雞峯疑皆約略之詞耳今敘次諸山雞籠山沙盆塢碧螺峯從風篁嶺次列又崇因報德寺在鵶雞峯褚莊在金鐘峯咸淳臨安志於崇因武林舊事於褚莊並冠以龍井二字武林舊事又次金鐘峯於雞籠山下故鵶雞峯金鐘峯又從雞籠山次列獅子峯則以老龍井錄之楊梅塢又從獅子峯次列而以南山禪關及二石附焉夏時所記過二麥嶺飲馬橋而不言積慶山疑必別由支徑越小麥嶺并疑不經大麥嶺云二麥嶺非也西湖遊覽志乃正由赤山步至龍井路故並載之詳卷十參以圖說形勢大略可觀矣水源老龍井西湖遊覽志龍井之上為老龍井有水一泓寒碧異常泯泯叢薄間幽僻清奧杳出塵寰岫壑縈迴西湖已不可復覩矣再上為天門可通靈竺徑術崎巇草樹蓊鬱人煙曠絕幽悄不禁魏㟲錢塘縣志天門山側為獅子峯獅子峯下為老龍井張遂辰湖山編越風篁嶺為老龍井謹案今龍井在嶺前面考宋蘇軾秦觀楊傑程珌周必大紀遊及敖陶孫詩無有不先過嶺然後至井至井然後至寺者明張京元西湖小記夏錫祚詩猶然故西湖遊覽志老龍井即馮夢禎記舊龍井皆宋時龍井也詳卷十龍井秦觀遊龍井記見卷六程珌遊龍井記見卷八咸淳臨安志楊傑詩巖下一泓泉窈奧莫可測有時靈氣生散作人間澤蘇軾東坡集次葉教授韻紀龍井之遊先生魯諸儒飲食清不溽空腸出秀句吟嚼五味足華堂鬧絲管眸子漲春綠先生疾走避面冷毒在腹歸來煮瓠葉弟子歌旱麓聲淫及靈臺中有麀鹿伏功名一走兔何用千人逐故應容我輩清座時閉目高停石排衙木杪挂飛屋我來無時節客亦不待速似聞雪髯叟西嶺訪遺躅朝陽入潭洞金碧涵冰玉泉扉夜不扃雲袂本無幅慈皇付寶偈神侶得幽讀訥庵有老人宴坐天魔哭時來獻瓔珞法供燈相續吾儕詩酒汗欲往無乃觸齋厨費辰炊車騎滿山谷願聞第一義鉢飯非所欲便投切雲冠余幼好奇服咸淳臨安志本名龍泓吳赤烏中葛洪鍊丹於此近西湖南山登風篁嶺澗泉決決與幽花野草延緣山磴更上嶺背巖壑林樾皆老蒼而西湖已蔽掩不可見氣象愈清古巖骨稜瘦泉流停涵一泓清澈即之淒然相傳有龍在焉觸石為雲禱者輒應因建龍祠咸淳五年安撫潛說友重建門古篆龍井二大字為扁祝穆方輿勝覽龍井去城十五里武林舊事在風篁嶺上巖壑林樾幽古石竇一泓清澈翠寒甘美可愛雖久旱不涸石上流水處其色如丹遊者視久水輒溢人去即減其深不可測相傳與江海通有龍居之每禱雨必應或見小蟹斑魚蜥蜴之類西湖遊覽志水經飲馬橋合黃泥嶺東出茅家步入湖謹案宋人志龍井蓋皆今日老龍井也姑繫於此黃泥嶺在行春橋外見夏時正杭州府志武林舊事繫南山末今西湖志繫北山是也井旁惠濟祠咸淳臨安志寧宗加封嘉應廣濟孚惠王敕昔我高宗千乘萬騎嘗登南山之風篁嶺駐蹕龍湫酌泉於上一草一木咸被昭回之光時維明神實見敬禮涓滴分派通海浹湖寸雲出岑潤吳澤越揆以祭式宜有寵褒而封爵未加是為缺典朕今以徹侯美稱加寵於爾有神珠宮貝闕莫窮其源華衮輪臺其永有耀奠我都邑振爾光靈可特封嘉應靈潤普廣濟王咸淳臨安志在風篁嶺上紹興十八年賜廟額累封為嘉應廣濟孚惠王咸淳五年安撫潛說友更創祠宇旁有德威亭即舊龍井亭東坡書額武林舊事龍井旁有龍王祠西湖遊覽志井上覆以樓為惠濟龍王祠謹案地名龍井則龍之神靈著焉故附井下敕末嘉應靈潤普廣濟七字西湖志作嘉應廣濟孚惠誤也陳善杭州府志封號七字恐誤存考龍井一名龍泓見秦觀遊記詳卷六謹案靈隱有龍泓洞咸淳臨安志引晏元獻說亦云吳赤烏二年葛仙翁於此得道故龍井之名龍泓不顯於世龍井一名龍泉司馬光資治通鑑天復二年鏐如衣錦軍命右武勇都指揮使徐綰帥眾治溝洫鎮海節度副使成及聞士卒怨言白鏐請罷役不從鏐臨饗諸將綰稱疾先出鏐怪之命綰將所部先還杭州及外城縱兵焚掠左武勇都指揮使許再思以迎侯兵與之合進逼牙城鏐子傳瑛閉門拒之牙將潘長擊綰綰退屯龍興寺鏐還及龍泉聞變疾驅至城北使成及建鏐旗鼓與綰戰鏐微服乘小舟夜抵牙城北隅踰城而入胡三省註龍泉即龍井在杭州城西南風篁嶺上去城十五里又宋自高宗駐蹕杭州以杭州牙城為宮城東北隅則今之和寧門外也顧祖禹方輿紀要風篁嶺龍井在其上亦曰龍泉錢鏐自衣錦軍還至龍泉聞其部將叛據羅城微服兼行踰城夜入是也謹案歐陽修五代史歸至北郭門不得入吳任臣十國春秋微服至德勝門牙將周肅以舟迎王遂沿江至內城東北互有詳略據此知當日由臨安入城亦經龍井後以兵阻然後由城北而為沿江之行其往來路徑甚為明悉故詳載之近井諸水沖泉見楊傑延恩衍慶院記詳卷二玉鉤澗聶心湯錢塘縣志在風篁嶺下謹案龍井水初由過谿橋經飲馬橋迆東北循茅家步路出通利橋以入湖約行四里疑即玉鉤澗然土人無知者訪諸寺僧但云是虎谿蓋以過嶺事襲訛而不知為玉鉤澗今新增插劒疋鍊二瀑布即在澗下流但瀑布水自風篁嶺後雲𠔏庵用竹筧屈曲承引不獨恃龍井水以馮夢禎記考之在嶺背者或即老龍井也金沙泉聶心湯錢塘縣志金沙泉與龍井滙從飲馬橋入湖謹案咸淳臨安志金沙泉在仁和縣永和鄉金沙井在孤山廣化寺俱非此金沙又金沙澗在靈隱寺側魏㟲錢塘縣志引十三洲記靈隱寺東西瀵二水東源橫過寺前名龍谿西曰錢源龍谿之名諸志所無疑以此致誤但澗在極北自由今關帝廟金沙橋入湖即所謂金沙港並不與龍井滙細訪土人云天馬山有金沙井其水自天馬山來龍井水過飲馬橋與此井水下流合滙而出通利橋考西湖遊覽志演福寺下魏㟲錢塘縣志沙盆塢下並有金沙井蓋即此井惟天馬山諸郡邑志諸寺志無之土人則指靈隱後山為天馬山考魏㟲錢塘縣志馬鞍山在靈石山側今其地為天馬山蓋以地志馬鞍實天馬之俗稱當即其地插劒池浣花池浴麟池西湖遊覽志李德疏神運石旁三池陳善杭州府志三池並在龍井鉢池吳之鯨武林梵志鉢池庵有洗鉢泉德周果師棲隱處魏㟲錢塘縣志鉢泉在風篁嶺上泉出石閒其形如鉢又稱鉢池西湖遊覽志龍井旁有沖泉舊邑志云在老龍井甚清冽今訪其處不可得而鉢泉則又舊志所無時代未遙泉之興廢若此西湖志田志龍井旁有沖泉今訪其處不可得而鉢泉則田志所無也謹案鉢池庵在今螺螄巖下稱鉢池從庵名也西湖記從魏㟲錢塘縣志似欲實為沖泉殆不然雜地名善安橋永安橋永福橋咸淳臨安志並在麥嶺至龍井路飲馬橋武林舊事地名放馬場西湖遊覽志永福橋俗稱飲馬橋吳越宋時皆牧馬於此謹案西湖志永福橋飲馬橋並列仍考注其下云咸淳志載永福武林舊事載飲馬而西湖遊覽志謂飲馬即永福因宋志所有並存之今依其舊孝義橋咸淳臨安志在麥嶺西太清宮前新河橋咸淳臨安志在麥嶺口寨前小水樂武林舊事風篁嶺小水樂福邸園謹案咸淳臨安志福王府北園在天水院橋橋在城中非此園也褚家坎武林舊事金鐘峯褚家坎漢末褚盛族舊有居此者褚莊魏㟲錢塘縣志在金鐘峯下謹案咸淳臨安志褚家塘在蒲橋左軍寨之北褚家故居蒲橋鹽橋東不通舟楫西湖遊覽志忠清里本名昇平巷北褚家堂又載胡世寧書云居近褚堂以遂良故里得名塘作堂蓋陽翟褚氏之寓居城中者與金鐘峯褚家坎褚莊不同步司左軍寨咸淳臨安志左步軍三寨在麥嶺行春橋二謹案三寨一在麥嶺二在行春橋放馬場見咸淳臨安志並武林舊事詳上陳善杭州府志崇恩演福寺在小麥嶺宋渡江初斥為放馬場履泰鄉咸淳臨安志錢塘縣管十二鄉履泰南鄉管里三曰放馬胭脂皇妃履泰北鄉管里六曰黃山石塘掃帚石堰師姑青枝山水題後志杭之名勝者分路敘次龍井為南山路今御覽西湖志纂又別之為南山西路蓋瞭如指掌矣昔人或曰南山或曰西山實則一也其地磽磝犖确凸凹上下而水泉正出懸出穴出循山與俱山不在高有仙則名水不在深有龍則靈以之舉似西湖不若舉似龍井為尢近
