body:
  text: 臣汪孟鋗恭纂軼聞孝宗行幸乾道二年春二月戊寅幸玉津園宴射遂幸龍井宋史孝宗本紀謹案孝宗屢幸玉津園見咸淳臨安志而不言至龍井賴有正史可據又寧宗加封惠濟龍王敕有昔我高宗嘗登南山風篁夜駐蹕龍湫酌泉於上則高宗亦嘗幸龍井而史闕之咸澤機鋒杭州靈隱山廣嚴院咸澤禪師初參保福展和尚問曰如何是廣嚴家風師曰獅子石前雲水響雞籠山上白猿啼景德傳燈錄謹案武林舊事資聖寺開山咸澤禪師咸淳臨安志亦名北資聖院錄此以見雞籠獅子南北山皆可見也元淨道潛優劣辯才參寥皆蘇子瞻友也其贊辯才云即之浮雲無窮去之明月皆同欲知明月所在在汝唾霧之中其贊參寥云身寒而道富辯於文而訥於口外尫柔而中健武與人無競而好刺譏朋友之過枯形灰心而喜為感時翫物不能忘情之語此余所謂參寥子有不可曉者五也觀此則二僧之優劣可見矣子瞻謫齊安參寥不遠二千里相從朞年子瞻謫南海參寥欲泛海訪之子瞻以書戒止會當路亦摘其詩有譏刺語遂反初服建中靖國初曾肇言其非辜復祝髮觀其友善如此亦幾於近道者西湖遊覽志兩參寥兩辯才宋有杭州僧參寥唐亦有道士參寥見孟浩然集唐有藏蘭亭僧辯才宋亦有高僧辯才隱天竺見淮海集郎瑛七脩類稿智月宋皇祐五年孫沔以直閣學士給事知杭州延禪師幻旻住持上天竺繼以禪師智月開堂提唱宗風凡十年又智月機緣法嗣及氏里無考上天竺山志文捷吳僧文捷戒律精苦奇迹甚多能知宿命然罕與人言余羣從為知制誥知杭州禮為上客文通嘗學誦揭帝咒都未有人知捷一日相見曰舍人誦咒何故闕一句既而思其所誦果少一句浙人多言文通不壽一日齋心往問捷捷曰公更三年為翰林學士壽四十歲後當為地下職任事權不減生時與楊樂道待制聯曹然公此時當衣衰絰視事文通聞之大駭曰數十日前曾夢楊樂道相過云受命與公同職事所居甚樂慎勿辭也後數年果為學士而丁母喪年三十九矣明年秋捷忽與文通訣別時文通在姑蘇急往錢塘見之捷驚曰公大期在此月何用更來宜即速還屈指計之曰急行尚可到家文通如其言馳還徧別骨肉是夜無疾而終捷與人言多如此不能悉記此吾家事耳捷嘗持如意輪咒靈變尤多缾中水咒之則湧立畜一舍利晝夜轉於琉璃缾中捷行道遶之捷行速則舍利亦速行緩則舍利亦緩士人郎忠厚事之至謹就捷乞以舍利捷遂與之封護甚嚴一日忽失所在但空缾耳忠厚齋戒延捷加持少頃見觀音像衣上一物蠢蠢而動疑其蟲也試取乃所亡舍利如此者非一忠厚以余愛之特以見歸余家至今嚴奉蓋神物也沈括夢谿筆談孫莘老知湖州日問文捷曰呂吉甫如何捷曰只三年便在官家左右更有一人白晳而肥一人美髯而長後三年甫果參大政同列韓子華馮當世皆如其言上天竺山志宋呂惠卿與吳精進寺僧善時辯才主上天竺頗有人緣惠卿入相使文捷主上竺逐辯才邵古菴山人曰文捷乃一奇僧故呂敬而主之然辯才又正而奇者捷不得掩之也辯才復天竺未幾不欲與人相形退避龍井則去捷遠矣上天竺山志謹案智月文捷上天竺山志在別傳並與元淨天竺為代者據蘇轍辯才碑稱捷倚權貴人不言姓名考上天竺山志乃知為呂惠卿要亦宗門爭勝傾軋常事故不礙為高僧如邵重生言也故詳錄之胡則工部胡侍郎則為邑日丁晉公為遊客見之胡待之甚厚丁因投詩索米胡延晉公常日所用樽罍悉屏去但陶器而已丁失望以為厭己遂辭去胡往見之出銀一篋遺丁曰家素貧惟此飲器願以贐行丁始喻設陶器之因甚愧德之後晉公驟達極力攜挽卒至顯位慶歷中諫官李兢坐言事謫湖南物務內殿承制范亢為黃蔡郎都監以言事官坐謫後多至顯官乃悉傾家物與兢辦行兢至湖南少日遂卒前輩有言人不可有意有意即差事固不可前料也夢谿筆談胡則永康方巖廟記廷直四世從祖尚書兵部侍郎保定公於婺州為鄉里婺之人廟公於方巖歲時奉祭甚謹紹興三十一年廷直為建安縣丞請於上賜廟額曰赫靈明年二月命下廷直跪拜伏讀至於感泣謹齋祓稽首而記之先保定公由儒學登顯仕八典藩郡為良二千石七按錢穀為能刺史出入禁闥為名從臣開國建功生有榮焉始公被天子知遇申命進秩乃奏免衢婺民身丁錢到於今受其賜自公之薨謀報無從即絃誦之所廟而食之沒有靈焉公於平生之志可謂盡矣宣和中盜起清谿保險方巖弄兵踰月王師不能下首惡夜夢神人飲馬於巖之池是池盜實怙之以濟朝夕平明往視已涸矣其徒駭亂大兵一臨即日平蕩由是邦人事公有加於他日若水若旱若疫若癘有求無不應有禱無不答赫靈之賜於義為大公蒙報祀之典可謂至矣先是賊平廉訪使王導以聞封佑順侯倉卒不審止用方巖神奏而逸其名氏衢婺之人凡厥祀事板祝旗幟皆實公為佑順侯從舊也繼而闔邑之士狀於有司廷直於公為孫也詎宜緘默於是詳述始末力請正名自天發號繄公之神載祈載禱享顧廷直才不邵不敢自任論譔亦庶幾由此以明其善之萬一也浙江通志胡廷直赫靈廟記胡公仕宋為時名卿婺之永康實公鄉邑公嘗讀書方巖山中沒而為神發祥其處宣和間封佑順侯紹興末乃賜廟額曰赫靈者初封誥命中語也佑順之號既累加以嘉應福澤靈顯極於八字淳祐間遂進爵為公更號顯應尋加正惠寶祐初再加忠祐杭之南山龍井原公墓次有顯應廟敕命在焉廟不書賜額而以顯應名者因初進封之號也公本以助王師殄巨寇廟食於一鄉而其光靈無遠勿被能出雲為風雨農人咸以望歲者望於公凡邨墟里社必為祈報之所故公之別廟布滿於郡境不啻數十百區其在吾烏傷之裯巖者里人方氏倡眾為之也宋初婺之第進士者自公始至其季年方氏有大冶丞應龍以進士起家而族日益大其子孫相率致力於祠事彌久弗懈者蓋亦視公為鄉先達而知所敬慕不徒效俚俗徼福於公而已廟之創造以至元二十六年重興以至正九年新廟告成以記來謁於溍曰公之陰祐乎斯民而變化不測有以驚動其耳目者庸夫孺子皆能言之至於公之奮由一第逮事三朝十握州符六持使節選曹計省歷踐要途晚以從官全身而退其有德於人有功於國與夫出處之大致非搢紳先生莫能言也願備著之溍竊惟公之官伐治行有傳在魏國韓公所修宋實錄而文正范公所撰公墓銘論次尤悉謹書而俾之使刻諸石且為之記其作廟之顛末附見於石背若郡志言公嘗奏免衢婺身丁錢民被其賜而為之立廟則傳與墓誌皆無所登載姑俟博洽之君子而考質焉黃溍文獻集胡侍郎廟碑陰記虞集題陳述古詩陳文惠公述古守杭州題詠絕句二首綽約新嬌生眼底侵尋舊事上眉尖問君別後愁多少好似春潮夜夜添又云長垂玉筯殘妝臉肯為金釵露指尖萬斛閒愁何日盡一分真態為誰添蓋為佳人敘幽思也蘇子瞻書此詩并周胡龍三妓詩作一卷元時柯敬仲得之虞邵菴伯生題其後云祇今誰是錢塘守頗解湖中宿畫船曉起鬬茶龍井畔花開陌上載嬋娟又云三生石上舊精魂邂逅相逢莫重論縱有繡囊留別恨已無明鏡着啼痕又云能言學得妙蓮華嬴得春風對客誇乞食衲衣渾未老為誰靈塔向金沙徐𤊹榕陰新檢引西湖志三賢堂錢塘西湖三賢堂兩處皆有東坡先生其一在孤山竹閣乃香山居士白樂天和靖先生林君復東坡先生蘇子瞻三賢像中興建都孤山為延祥觀而閣與像俱廢乾道五年郡守周琮建於水仙王廟之東廡其一在龍井壽聖院方圓庵東即趙清獻公閒堂而為三賢堂乃清獻公閱道蘇東坡辯才法師若訥像而寺在龍井之西北數里羣山中寺門有歸隱橋下有滌心沼遊人多不到彼是以少有語及者趙葵葦杭紀談碁盤石戊子九月初六辰刻出湧金門渡湖至龍井諸君已進老龍井方迎之數十步而相遇讓肩輿老丈而與存吾子晉沈祖均登碁盤石初問途登歷甚艱逾四五峯復下而至一石甚巨左有石筍四五屋居石上僧扃戶而出索火烹泉不得坐石上良久尋別路而下路亦甚澀賴林而行至大路坐草閒德周上人索民家茶為供乃別快雪堂集日記暎山己丑六月初二早詣海會寺謁天竺大士為禱雨拈香出清波門入龍井薄暮同師之暎山觀一片雲巧石山獅子石快雪堂集日記片雲石武林山水奇勝處頗多若普光巷之吳坡泉永壽寺之芝巖甘露寺之頓足泉龍井寺之片雲石法相寺之錫杖泉皆郡志野史之所未載登臨訪古所當窮其勝概者也兩湖麈談錄龍口瀉水龍井泉從龍口瀉出水在池內其氣恬然若遊人注視久之忽爾波瀾湧起其地產茶作荳花香與香林寶雲石人嵨乘雲亭者絕異採於穀雨前者尤佳啜之淡然似乎無味飲過後覺有一種太和之氣瀰淪乎齒頰之間此無味之味乃至味也為益於人不淺故能療疾其貴如珍不可多得陸次雲湖壖雜記徐村翁家山壬寅閏二月初十陰午後微雨冰雹同章紹陽入山先看龍井外演福地辛龍卯向正應左旗右鼓地鈐至龍井飯於德周山居周申甫以昨約如期至同至翁家山而別余從十八澗出徐村一路李花盛開如雪快雪堂集日記葛井水與龍井伯仲己丑六月初十晴而𤍠早至龍井翻山至天竺看二地內優於外憇長生房白先生返龍井而余入城飲葛井水甚甘冷當與龍井伯仲快雪堂集日記記西湖登覽壬午三月己亥晴與芮國器程泰之蔣子禮出暗門上風篁嶺酌龍井入壽聖寺拜趙清獻公蘇翰林僧辯才畫像觀乙亥二月與張德莊周孟覺同遊時題字寺有海棠一株蓋蘇公手植僧頗有乾道元祐間諸公談論自言得於其師云午飯後過長耳相院泰之讀書處也與國器弈於山亭小酌而去道旁有六通院無足觀遂由支徑叩鄧氏時思庵庵僧導至石屋嵌空可愛進尋水樂洞聲如琴筑音節天成以路僻人罕知者捨馬上煙霞嶺國器子禮至中道憚其險余乃與泰之自往至寺亦憊矣少休秉燭入洞深十二丈上下平濶近城郭不易得也歸飲淨慈食雞甚美徵事戲為聯句數十韻如日膳雙月攘一之類語甚工二老堂雜志謹案周必大年譜紹興二十五年乙亥監行在太平和劑局三十二年壬午除監察御史南山遊約張伯雨有春遊南山約手書一卷題至正三年四月廿二日詞致字法可稱奇品略云鷲峯猿洞眾人何莫由斯雲石龍泓賢者而後樂此風篁蕭爽憇德威二老之亭蟬冕煇煌拜元祐諸賢之像豈沙門不得稱高士而濁醪亦足名賢人盤飱為具酌必真率會中車騎後時罰依金谷酒數釋大堅淨慈寺志遊龍井烹茶龍井泉既甘澄石復秀潤流淙從石澗中出泠泠可愛入僧房爽塏可棲余嘗與石簣道元子公汲泉烹茶於此石簣因問龍井茶與天池孰佳余謂龍井亦佳但茶少則水氣不盡茶多則滋味盡出天池殊不爾大約龍井頭茶雖香尚作草氣天池作荳氣虎邱作花氣唯岕非花非木稍類金石氣又若無氣所以可貴岕茶葉粗大真者每斤至二千餘錢余覓之數年僅得數兩許近日徽有送松蘿茶者味在龍井之上天池之下龍井之嶺為風篁峯為獅子石為一片雲神運石皆可觀秦少游舊有龍井記文字亦爽健未免酸腐石公集西湖雜記遊老龍井得茶辛卯三月二十八晴陰熱不能勝裌甲子與曹林師兄行出湧金茂吳已先往至老龍井相及茂吳與閩人莊生者俱得茶數斤以不持臥具別去余與林兄宿龍井快雪堂集日記玉岑詩社西湖八社其一玉岑詩社高麗法相煙霞洞石屋洞水樂洞龍井碁盤山九谿十八澗諸勝屬焉祝時泰等西湖八社詩帖水漲弘治三年六月杭州大雨龍井鳳凰兩山水暴漲陳善杭州府志謹案魏㟲錢塘縣志係五年傳聞之異萬歷三十年五月杭州大雨龍井山水出頃刻高四尺陳善杭州府志陳剛中杭州西湖風篁嶺下沙盆塢宋陳剛中墓謫知安遠歸葬於此余嘗至嶺詢剛中墓榛蕪日甚無有識者榕陰新檢引竹窗雜錄張伯雨元高蹈張伯雨墓在南高峯左麓張號句曲外史吾郡姚公綬為營脩其墓穹碑在焉余昨到龍井過其處讀姚文欲尋張埋骨處草樹蓊鬱竟不可得徘徊太息久之陳季象云曾見李洙山封翁說正德年間有山民鋤地深數尺遂犯張墓見一人盤膝坐爪髮俱長偶傷其腦漿忽迸出良久復合其人驚懼急瘞之墓中有書二冊攜其一出至鄭栗菴公諱環家鄭願以一金易之其人云當至墓中再取其一至途中忽風雷大作失書所在向以張風流詩翰欽之不知其有道術也快雪堂集漫錄謹案西湖遊覽志地名玉鉤橋在積慶山而此云龍井可知龍井為諸山通稱也瑞芝德玉之先扈高宗家臨安其六世祖茂榮昭慶軍承宣使生椿年榮州防禦使生待舉恩州防禦使生好問殿前都指揮使判太醫局生中廣東提刑亦判醫生壽孫仕元廣平路醫學教授咸葬龍井之方山其地負金鐘靈石至正二十三年夏四月芝一本產指揮墓上余因敘之并為詩紀其事梧谿集題方德玉先隴瑞芝卷孫隆施捨己亥三月初一晴和昨夕與金小竹約拉宋宇菴為龍井之行早出湧金門過湖淨慈南庫房訪蓮筠泉病略愈慧日一脈之為華嚴閣基鼎建之費當二千金此閣成湖南像法亦宏壯矣到龍井宋金二君已至龍井賴孫中貴施捨改作一新遊人如螘頗傷雅道德周上人邀過新起淨室具齋相款秦冰玉寓此與同追覓龍井正結得之於風篁嶺為茅氏山左右山俱玲瓏秀巧重重圍抱真佳城也在坐有孫里長即為余治佃湖灘者歸途步看演福寺址張氏墳後為正結即蒼龍戲子形惜機緣未便可得耳快雪堂集日記謹案快雪堂集自言於萬歷十五年丁亥遊天目徑山自此以後並有日記至三十三年乙巳止凡十九年中間三十二年甲辰八月十五日始落成快雪堂日遊南北兩山故日記中及龍井者不下數十則大抵品茶相地居多今采其有關考証者分別載之如右餘不錄演福寺崇恩演福禪寺在小麥嶺積慶山淳祐八年充惠順貴妃賈氏攢所賜今額為教院景定三年周漢國端孝公主祔焉咸淳四年有旨改禪院太傅平章魏公施資增造五年聖上御書六大字為扁且益賜平江田為畝五千除其科役苾蒭來駐多堅苦有梵行咸淳臨安志演福俗稱南天竺隋開皇中有法師真觀居之元至元後復為教院學徒甚眾號為教海至元中燬至正初重修後有無垢院已併入寺有白蓮華院在玉几峯側有安養寺本澤雲夢塔院有樓曰夕佳至正燬惟院與樓存西湖遊覽志謹案龍井演福互為興廢其址相去極邇詳錄以備參考三記附見餘杭徑山錢塘靈隱淨慈寧波天童育王等寺為禪院五山錢塘中竺湖州道場溫州江心金華雙林寧波雪竇台州國清福州雪峯建康靈谷蘇州萬壽虎邱為禪院十剎錢塘上竺下竺溫州能仁寧波白蓮等寺為教院五山錢塘集慶演福普福湖州慈感寧波寶陀紹興湖心蘇州大善北寺松江延慶建康瓦棺為教院十剎七脩類稿謹案宋濂德公塔銘宋季史衞王奏立五山十剎使之拾級而升據郎瑛說知演福在教院十剎之列宜其傳教之盛過於龍井已此敘教院五山止四山有缺馮夢得寺記恭惟皇上聖性仁孝思皇繼述粵先皇帝在宥以戊申年六月詔有司備禮葬惠順貴妃賈氏於積慶山之原蓋是山自天目蜿蜒邐迤清淑盤礴面金鐘腋龍井並湖諸峯勢若拱揖迺建寶坊賜名崇恩演福教寺越十四年壬戌周漢國端孝公主祔右妃所出也若稽舊刻資薦惠順甚備惟端孝未果輟賜及是益以吳門田五十畝蠲其科徭以崇先帝割愛遺育之意始改教為禪時平章魏國公建無量福海簷蔔林易丈室而東堂廡寮位內外煥列命僧可湘主寺事咸淳臨安志黃溍寺記杭之南山由雷峯訖龍井其間浮屠之居四十二而傳天台學者惟崇恩演福寺為最盛寺在小麥嶺積慶山之靈石塢今所謂南天竺也宋渡江初未有寺嘗斥為牧地淳祐戊申葬貴妃賈氏山左建坊錫額命天台宗師圓庵果為開山率眾居之尋復給田以充食飲降錢以資土木景定壬戌葬周漢國公主山右嗣領教事者初巖鑑石庭生並賜紫衣加右鑑議咸淳戊辰賈魏公大發私帑俾禪僧絕岸增新棟宇至元丁丑燬行宣政院求能負荷其事者得今才公至正癸未涖事伊始僧俗信嚮凡可以致力者無不為惟是兹山支於天目至是適當風氣之會清淑所鍾鬱而不洩岡巒迴復窈然靚深泉甘土肥林木茂邃誠宇宙間奧壤也才公名必才字大用嗣法於湛堂云文獻集謹案黃溍寺記見西湖志引文獻集今集中不載徐一夔夕佳樓記演福寺明靜塔院佛海之徒窆其師爪髮之所院東西二樓夕佳西樓也右瞰澄湖左挹高峯二麥嶺在其前至正中海慧居兹樓黃文獻公張外史至輒相攜登樓鬻茶賦詩歐陽文公元持節過杭造訪海慧為書夕佳二字而名始著徐一夔始豐稿軼聞題後田汝成西湖遊覽志雜采小說家為志餘當全書强半差云美備今以深山荒剎遊迹罕到之境執筆而記者蓋寥寥矣卮言剩語亦有他無可附者依志餘例存之
