body:
  text: 臣汪孟鋗恭纂餘論南天竺當屬龍井一路南天竺之名始見唐陸羽靈隱寺記記文不傳雜見地志所引有南天竺北靈隱之文咸淳臨安志下竺靈山教寺隋開皇十五年僧真觀法師與道安禪師建號南天竺西湖遊覽志襲用其文增一寺字於南天竺之下是下竺為南天竺也然歷考元明以來名流詩文如元成廷珪有過南竺登二老亭詩柳貫有送南竺澄講主詩黃溍有南天竺崇恩寺記云寺在小麥嶺積慶山之靈石塢今所謂南天竺也皆謂龍井一路以是西湖遊覽志演福寺下亦曰俗稱南天竺且繫以法師真觀是龍井演福一路為南天竺也竊思龍井演福在南山一路下竺在北山一路南北雖分而龍井演福當南山之極北下竺當北山之極南其地密邇案魏㟲錢塘縣志天門山在北高峯後為南北兩山之祖上天竺山志天門山在上竺捫壁嶺之上即郎當嶺北擁上竺獅子乳竇諸峯從此東南是為龍井西湖遊覽志中天竺之對為永清塢永清塢之背即龍井永清塢者乳竇峯之支也亦見聶心湯錢塘縣志然則南天竺者大概上竺以南諸山之通稱不必屬下竺矣且下竺隋慧理法師首先建寺地志甚明而武林舊事於真觀塔下註為下竺開山祖師非是若南山則至真觀始闢高僧傳所載實有開山興創之象其不在下竺可知今錄敘僧首列隋真觀師誠以高僧傳不言下竺咸淳臨安志所載胡宿强至二記俱不言南竺其說惟見咸淳臨安志周密田汝成因之而汝成作志仍以南竺真觀兼繫演福固已顯然及再參之元明以來詩文於是南天竺定屬龍井一帶無疑宋時寺在嶺背今老龍井即當日龍井老龍井宋人紀載未聞始見西湖遊覽志咸淳臨安志於龍井稱更上嶺背武林舊事以下並稱在嶺之上而今日龍井僅在山半則昔之龍井非今日之龍井也據秦觀遊記院去龍井一里遊客至壽聖者皆取道井旁而張京元西湖小記井在殿左其說不合兩湖麈談錄因童時所見老龍井辯才塔及小庵不在今寺左右遂疑今寺所在為昔日井之所在非寺故址此不深考之故也山泉能洑地潛行忽隱忽見即一風篁嶺左右前後察之水泉不一要皆恃老龍井以源源不竭觀西湖遊覽志敘老龍井即用咸淳臨安志敘龍井語無所更易安知非今日龍井在昔猶未著上出之功而今日之老龍井正昔日之龍井乎馮夢禎復賜田記龍井有二舊龍井在嶺西辯才退院新龍井則今寺是也尤為明白可據又詳宋人秦觀程珌周必大所記並先過嶺次至井然後至院則井與院址並在嶺背所以有過嶺越嶺之文其說確不可易滄桑更易固不必專屬伽藍矣魏㟲錢塘縣志天門山側為獅子峯獅子峯下為老龍井則老龍井蓋屬獅子峯然龍井遊人罕有至老龍井者小龍井今人知有老龍井不知更有小龍井武林舊事南高峯塔小龍井註云井側有龍王祠魏㟲錢塘縣志南高峯塔下有小龍井據咸淳臨安志龍王祠在榮國寺後鉢盂潭未有此名要其去龍井則遠矣徑山龍井世傳龍井水可洗眼案東坡集徑山詩問龍乞水歸洗眼欲看細字終殘年自註龍井水洗病眼有效乃徑山龍井也集中又有次韻楊次公惠徑山龍井水詩浙江龍井不一龍之神靈能屈能伸往往託迹幽隱凡稱龍潭龍湫龍池龍井職此之故龍井亦名龍泓咸淳臨安志載王隨寄慈雲詩丹井經臺接巖洞或曰龍泓即壽聖院龍井非也知當時龍井之名已專屬靈隱矣龍泓之外案咸淳臨安志方家峪寶藏庵有古井俗名烏龍井西湖遊覽志令泉峪有龍王井及南高峯塔下小龍井又咸淳臨安志鹽官縣有烏龍井新城縣有折桂鄉龍井昌化縣凡邑禱祈處在龍井院者名龍湫在龍興寺者名龍潭在峒坑山大鵠頭山者名龍湫而昌化之院紹興中亦賜廣福額又案浙江通志紹興府餘姚縣龍泉山有龍泉宋高祖飲之甘取十甕以去考東坡集送劉寺丞詩餘姚古縣亦何有龍井白泉甘勝乳疑即指此又台州府巾子山有龍井葛谿山有龍湫明陶望齡遊五泄詩諸暨縣五泄有二龍井一黑龍井一白龍井又浙江通志寧波府鄞縣有龍井七金華府金華縣有龍井處州府龍泉縣九漈有龍井九浙稱澤國而祈請雨澤所恃在龍無怪比比皆是惟杭郡雨暘自宋以來多請之天竺觀音東坡集祈雨文甚多可見故雖有龍井而不甚著葛洪鍊丹處不足信胡承謀湖州府志引吳興掌故葛洪鍊丹處天下凡十三今案咸淳臨安志靈隱龍泓洞葛仙於此得道又有葛嶺葛塢天竺山丹井治平寺雙井西湖遊覽志智果寺葛井上方下圓陳善杭州府志有葛谿聶心湯錢塘縣志翁家山有葛井水樂洞後有丹井並以洪著兼風篁龍井是錢塘已居其十又案咸淳臨安志臨安縣九仙山新城縣寶勝院亦以洪著新城又別有丹井又案浙江通志寧波府定海縣葛仙峯在金塘山有丹井上虞縣龍頭山有洪坐石西莊山有洗藥谿金華府金華縣葛公山一名葛仙峯三峯山有鍊丹所義烏縣有鍊丹石紹興府會稽縣有諸葛山又有葛仙巖丹井湖州府烏程縣有葛仙山並以洪著是在浙江所屬又居其十四又陳善杭州府志昌化縣有武隆山丹井海寧縣有紫薇山丹井他如江南丹徒之丹井江西袁州之洪陽洞贑州府興國縣之洗藥池廣東惠州之蓬萊閣載之地志不可悉數而湖州府志謂烏程居其一殆不然也竊詳本傳洪丹陽句容人生平僑寓廣州最久得仙亦在羅浮僅一至吳興一至洛陽仕於金陵如此而已何緣浙東西棲隱之所至二十餘處耶或謂此皆得仙後隨處顯著靈蹟則不可得而知矣封篁咸淳臨安志辯才淬治脩篁怪石風韻蕭爽名曰風篁而快雪堂集概作封篁初非寫刻之誤未詳與龍井聯屬諸山水寺院赤山北連麥嶺東接湖濱下為赤山步有惠因寺即高麗寺寺側有澗秦觀遊記濯足於惠因澗是也案西湖遊覽志澗出自赤山經寺前以入湖陳善杭州府志又有筲箕泉在赤山之陰流出合於惠因澗其北為法相寺即長耳相寺周必大記遊午飯後過長耳相院是也其西靈光庵有靈光泉見咸淳臨安志西湖遊覽志謂之錫杖泉六通寺在長耳巷更北為大麥嶺咸淳臨安志嶺與步司左軍寨相連路通放馬場西湖遊覽志又有小麥嶺西支徑通大麥嶺則咸淳臨安志所無也嶺有積慶教忠寺旌德顯慶寺慶安院咸淳臨安志積慶寺有君子泉天一泉慶安院即水陸庵充旌德廨院又大麥嶺山後有花家山三賢堂後相對亦見咸淳臨安志更北為靈石山即積慶山有靈石寺崇報顯慶院崇因報德院咸淳臨安志山在西山放馬場側而靈石山靈石塢靈石凡三見可為複冗又崇報院在放馬場即舊棲真院獨不著崇因惟歲寒泉下云在龍井山崇因院武林舊事靈石山崇因報德院有靈石泉又名歲寒泉西湖遊覽志繫院於雞籠山側足補咸淳臨安志之闕廟一靈應廟祀宋蔣通在小麥嶺下飲馬橋邊見夏時正杭州府志道觀一太清宮咸淳臨安志所謂在履泰鄉龍井山路者也靈隱觀據武林舊事改仁壽院矣以上寺觀惠因法相而外西湖志並云久圮又法空寺咸淳臨安志不言何地西湖志繫麥嶺亦云久圮九谿十八澗通江不滙龍井九谿咸淳臨安志云在赤山煙霞嶺西南通徐村出大江北達龍井十八澗咸淳臨安志云在龍井之西步司左軍寨後路通龍井西湖遊覽志在龍井西路通六和塔李賢等明一統志云在龍井山西東出錢塘江所謂達龍井通龍井者謂循谿而行有路可至龍井非谿澗之水與龍井滙也西湖遊覽志又云龍井之南為九谿其西為十八澗蓋亦指路而言三獅子峯複一龍井獅子峯以辯才十詠存之此峯極峻四望皆見在天竺乳竇峯之右以是靈竺諸志亦皆采列然志西湖者不可以此為例西湖遊覽志於南北兩山並列獅子峯西湖志從之複矣又魏㟲錢塘縣志獅子峯在寶石山以形似名繫北山則非此獅子峯也故今西湖志有三獅子峯三茯苓泉誤南泉噴月泉僧錄泉本在淨林廣福院茯苓泉本在無垢院西湖志山水以噴月泉僧錄泉繫暗竹園以南泉茯苓泉繫廣福寺似未知暗竹園之即為廣福寺者雖淨林無垢後皆為廣福寺要已參錯不倫而前此鵶雞峯下又據魏㟲錢塘縣志列無垢院之茯苓泉是一而為二矣後此北山路又據西湖遊覽志列靈隱後山之茯苓泉是又一而為三矣北山之誤沿西湖遊覽志之舊案武林舊事無垢院舊在石人嶺慶元中韓平原移寺於此故後來脩靈隱志者並載無垢院不詳更改之由宜其誤也石人嶺咸淳臨安志在靈隱寺西武林舊事無垢院次演福寺之上西湖遊覽志亦繫之風篁嶺畔今西湖志從之可見兩君子泉南山積慶教忠寺有君子泉北山定業院亦有君子泉見武林舊事案兩湖麈談錄鳳林寺有乳泉石上刻君子泉鳳林本宋喜鵲寺寺與院俱烏窠禪師道場當時二地相去不遠意者年歲既久其一已亡故指院以為寺與兩噴月泉南山廣福院有噴月泉六和塔亦有噴月泉見西湖遊覽志一地兩名地志諸書訛複不可枚數咸淳臨安志無垢院之鵶雞巖即鵶雞峯西湖志亦名丫髻峯咸淳臨安志之靈石塢即靈石山魏㟲錢塘縣志之鉢泉即武林梵志之鉢池庵聶心湯錢塘縣志之金沙泉即天馬山之金沙井趙抃詩之龍泓亭即元淨詩之龍井亭武林舊事之飲馬橋即咸淳臨安志之永福橋咸淳臨安志之德威亭即過谿亭武林舊事之寂照閣即咸淳臨安志之寂室照閣魏㟲錢塘縣志之鏡心堂即武林舊事之鏡清堂魏㟲錢塘縣志之浣沙池即西湖遊覽志之浣花池或舛易其名或兩名並列良以書成非出一手遂致傳疑兹錄類多削而不登附辨於此寺名先後重出龍井寺宋淳祐六年改延恩衍慶額其名壽聖者在衍慶之前并在廣福之前其實即此寺也魏㟲錢塘縣志列龍井寺於寺觀列壽聖院於古蹟西湖志南山路列衍慶院於衍慶下又列壽聖院俱複誤與西湖遊覽志麥嶺列淨林廣福院風篁嶺亦列淨林廣福院正同龍井演福為一宋元以來龍井演福並嘗被燬然演福屢興而龍井無聞焉觀林右志敘荒涼在目演福盛則龍井衰以是名流詩文多演福僧而及其紀遊則直以龍井之名加之演福大抵龍井寺址與演福本相鄰並又或元明之交併歸演福若所謂下院子院者亦未可定如僧澄湛堂住演福見黃溍寺記又見宋濂圓照若公塔銘而虞集龍井詩有澄公愛客至句則又似當為龍井僧又王逢遊龍井詩為曦上人作而跋遊龍井卷亦以曦為湛堂孫裔蓋無分彼此也田汝成作西湖遊覽志時演福久廢西湖志亦云燬於元末其址咸淳臨安志謂在小麥嶺積慶山而西湖遊覽志附之風篁嶺畔今西湖志從西湖遊覽志疑亦約略之詞案馮夢禎日記頗多道演福寺者亦不言舊址何所然則明末當尚有知者他寺併歸演福亦稱龍井不獨演福也他寺亦有焉如淨林廣福院咸淳臨安志不言所在而下有主僧可全語附姜白石四詩詩題有全老又有銛樸翁聰自聞二僧其為淨林之僧何疑而蘇籀有龍井僧全一詩中歷敘辯才淨自聞聰以及全則亦為龍井僧考其實蓋淨林廣福院後為演福寺而淨林廣福遂廢具載武林舊事及西湖遊覽志演福以龍井著而併歸演福之淨林廣福院亦以龍井著矣又考程珌遊記月林辯才所廬今為廣福寺廣福乃衍慶以前額証以西湖遊覽志知後來復為廣福寺然則其始也衍慶為廣福其繼也衍慶廣福並歸演福此亦衍慶衰而演福盛之一証也他若咸淳臨安志之無垢院亦不言所在而武林舊事亦云後為演福寺遂廢西湖遊覽志云與廣福院俱併為廣福寺武林舊事之劉庵註云今歸龍井寺武林舊事之白蓮院北磵集白蓮院翻蓋法堂榜註云在風篁嶺下程珌遊記云傍佛舍獨白蓮為近俱此淨林廣福院無垢院白蓮院與武林梵志之鉢池庵歷來地志並云在風篁嶺又靈隱西無垢院半山古松婆娑下有甘泉見咸淳臨安志武林舊事松下有茯苓因名茯苓泉魏㟲錢塘縣志院在鵶雞峯下淨林廣福院有南泉噴月僧錄二泉在南山暗竹園廣福院咸淳臨安志寺下泉下互見西湖遊覽志則云噴月僧錄二泉在淨林廣福院暗竹園下是皆考龍井故實者所當知也普澤院宋孫沔有龍井普澤院仁法師行業記惟見魏㟲錢塘縣志據咸淳臨安志嘉會門龍山六和塔沿江一路有普澤院舊名靈源治平改額似不得屬之龍井疑當時以普澤為龍井之下院如武林舊事劉庵併入龍井又如快雪堂集海寧三十二都有龍井田之類演福僧演福與龍井為一此以寺言也僧則不在此例見咸淳臨安志者一堂僧紹祖環薪自焚見馮夢得寺記者一僧可湘主寺事見黃溍寺記者二淳祐戊申天台圓庵果開山才公名必才字大用嗣法於湛堂至元丁丑住山見徐一夔夕佳樓記者一至正中佛海弟子海慧與黃文獻張外史交海慧即繼絕宗亦見宋濂學士集見宋濂學士集者十圓照若方巖則愛山靜玉岡蒙潤天岸濟大山仲齡瞽菴顯示東溟慧日良謹如玘或住演福或為上座玘亦見一夔詩見西湖遊覽志者二元僧清古源澤雲夢疊主寺事見上天竺山志者一我庵本無見湛堂於演福今錄所列非鑿然龍井僧不入附此備考亦因以見元明間演福徒眾之盛禪教互易上天竺靈感觀音院至元淨始以教易禪龍井為教寺以此演福初建實為教寺越十四年易教為禪馮夢得寺記可考而據西湖遊覽志則元至元中復為教院魏㟲錢塘縣志舛複魏㟲錢塘縣志成於康熙五十七年其書舛複極多不可勝舉即以龍井論山川門列龍泓龍泓下列歸隱橋寂室照閣閒堂訥齋潮音堂秋月堂滌心沼鏡心堂薩埵石諸天閣方圓庵諸勝蹟而寺觀門列龍井寺寺下又複列諸名又去秋月堂鏡心堂增鉢池庵辟塵爐片雲亭與時亭古蹟門列壽聖院院下又複列諸名又去寺觀門之鉢池庵與時亭增三賢祠神運石插劒池浣沙池浴麟池與眾亭至諸天閣本出武林舊事今於龍井既已三見而於演福寺下又見諸天閣又秦觀遊記題名鄭清之跋題名山川寺觀兩載全文一何重複舛謬至此夢粱錄因襲吳自牧夢粱錄二十卷向少足本近多有之其所載山谷谿井寺塔橋之類大概抄錄咸淳臨安志原文毫無增益刪潤每段末自註云依咸淳志敘之殊為不解即如咸淳臨安志噴月泉在南山暗竹園廣福院僧錄泉在南山暗竹園福聖院暗竹園無兩院福聖乃廣福此咸淳臨安志刻字之誤而夢粱錄亦依之不改仍作福聖其他可知也西湖遊覽志亦作福聖誤同而朱存理朱彝尊極稱其書殆未深考詩文編錄之誤蘇轍訥齋記自欒城集而淳臨安志誤作蘇軾西湖志及上天竺山志從之楊傑院記陳善杭州府志誤稱為訥齋記又傑訥齋寂室照閣三詩魏㟲錢塘縣志誤以為趙抃詩又傑風篁嶺詩誤以為楊蟠詩至我聖祖仁皇帝五巡浙西未至龍井魏㟲錢塘縣志卷首天章一卷稱龍井御書一聯云禪心澄水月法鼓聚魚龍謹案西湖志雲林寺載康熙三十八年聖駕再幸御題一聯正此十字疑當時住持僧人後來或有退院歸龍井摹刻以往遂傳本寺魏㟲不知載入雲林寺而繫之龍井極為疎略是皆不可不辨趙抃詩不見本集趙抃龍泓亭詩并敘見咸淳臨安志其事當時緇俗咸樂稱道之然今清獻集不載而西湖志云見清獻辯才諸集非也元淨著述陳起聖宋高僧詩選四十三人續選十九人陳世隆宋詩補遺三十二人不錄元淨詩續文獻通考釋老門元淨在名釋傳不與道潛同在詩僧傳知不以文詞見也元淨詩見咸淳臨安志及上天竺山志者五古一首七律二首五絕十首七絕二首文則心師銘一首又上天竺山志詩散句十七字更無遺者圓事理說見塔碑及釋傳燈天台山方外志魏㟲錢塘縣志經籍有釋元淨字無象著辯才集今亦不傳疑不必果有其書元淨詩入蘇軾集上天竺山志元淨有次韻參寥子寄秦少游三絕時少游舉進士不得蓋道潛原倡秦觀亦有次韻而施元之註蘇詩以元淨詩繫蘇軾莫可考然詳詩格知非蘇也詩云秦郎文字固超然漢武憑虛意欲仙底事秋來不得解定中試為問諸天一尾追風抹萬蹄崑崙元圃謂朝躋回看世上無伯樂卻道鹽車勝月題得失秋毫久已明不須聞此氣崢嶸何妨卻伴參寥子無數新詩咳唾成道潛參寥子集彭門書事寄少游三首云我思君處君思我此語由來自謫仙欲借野人傳紙尾詩憑新鴈寄遼天戲馬臺邊駐馬蹄迴廊曲院總攀躋秦郎前日曾來否試拂凝塵覓舊題百尺黃樓拂杳冥樓前風物極崢嶸東州詞客渾爭詠獨怪相如賦未成秦觀淮海集次韻參寥云武林漁子入花源但見秦人不得仙會有黃鸝鳴翠柳何妨白眼望青天長安仕路與雲齊倦僕羸驂不可躋但得元暉曾折簡何妨平子更安題且折花枝醉復醒人間時節易崢嶸大瓠肯自羞無用畫虎從人笑不成元淨詩誤入蘇軾集元淨次韻參寥四照閣七律一首蘇軾嘗書之而跋其後其跋見元淨外傳今刻本猶列元淨詩於跋前馮景蘇詩續補遺以此詩為軾作此因軾書而誤者也名媛詩西湖志用西湖遊覽志香匳一卷錄閨秀詩一卷遊龍井者得二人焉張瓊如字赤玉杭州人龍井七律一首縹緲旛幢綠樹低山門斜路夕陽西古壇危磴千層幛細路遙通九曲谿松際谷聲清磬合竹間雲氣小樓迷禪心已與塵緣斷不礙孤猿午夜啼見名媛詩歸徐媛字小淑姑蘇人遊龍井殢雨漫成七絕三首玉液泠泠走碧沙芳池碎璧散冰霞花深古徑啼鶯澀黛溼雲寒染露華珊珊奇樹亂棲鴉龍窟遊鱗嬉淺沙繚繞青莎浮幾點憑流怪石似靈槎細霧輕煙小徑斜半空寒雨洗亭花山厨不作伊蒲饌拾得松丸自煮茶見林下詞選婦人中官附著今錄既以祠墓諸賢繫人物惟婦人中官別無可附婦人可考者三一吳越王妃仰氏咸淳臨安志在龍井放馬場案十國春秋仰氏湖州人父仁詮以牙將事文穆王有功績官至寧國軍節度使天福八年忠獻王納為元妃一宋劉婉容攢所武林舊事劉庵孝宗朝劉婉容攢所今歸龍井寺案宋史有劉婉儀傳無劉婉容傳婉儀傳稱婉儀與婉容俱高宗妃同被寵此云孝宗疑誤一宋主簿關君妻曾氏曾鞏撰表云在錢塘縣履泰鄉龍井之原表見元豐類稿中官可考者一明德西湖遊覽志德高麗人幼警悟讀書一目下數行洪武間黎王以獻高皇喜之俾事左右歷事五朝頗著勞績鎮守兩浙卒敕葬風篁嶺下又稱正統中嘗駐龍井云三賢祠塑像龍井故有元淨畫像見蘇軾書贈劉浙僧程珌遊記則增范仲淹蘇軾蘇轍道潛凡五人張雨詩則增胡則趙抃秦觀而無仲淹凡七人而敖陶孫臞翁詩集註云龍井寺有辯才師趙清獻蘇文忠塑像疑即三賢祠中所祀也海棠元淨海棠見咸淳臨安志塔前有海棠二株乃師手植是也蘇軾海棠見二老堂雜志寺有海棠一株蘇公手植是也顯應廟有二顯應廟祀宋胡則案咸淳臨安志府治又有顯應廟乃淨因寺土地也於潛三賢祠西湖有兩三賢堂既載入軼聞矣案趙之珩於潛縣志亦有三賢祠祀蘇軾及於潛令刁璹毛國華刁毛有德政蘇軾倅杭行縣至潛皆為賦詩東坡集於潛令刁同年野翁亭詩有云我來觀政問風謠皆云吠犬足生氂捕蝗至潛戲令毛國華詩有云羨君封境稻如雲自識人人不識君其人之賢可知兩元淨兩辯才已見軼聞案上天竺山志元皇慶二年住持竹屋元淨是又有兩元淨也四辯才宋高僧傳明律篇唐朔方龍興寺辯才姓李氏襄陽人是又有三辯才也東坡集有龜山辯才師七古又有潁川龜山長老四書王註龜山在泗州盱眙縣同時又有一辯才是有四辯才也案馬汝礪盱眙縣志龜山有二一在縣西南名上龜山一在縣東北臨淮河而仙釋止載宋二僧自性廣辯豈即此辯才耶東坡集海月碑海月名慧辯又有南華辯公住曹谿亦稱重辯長老又釋氏稽古略有南山法師慧才皆同時人續文獻通考有泗州山水陸院曉津禪師臨濟宗蘇軾戲問辯才師墨蹟蘇軾聞辯才法師復歸上天竺以詩戲問真蹟舊藏海寧某翰林家有南宋緝熙殿印及元虞集草書跋翰林後彫落鬻歸他姓今不知輾轉何所矣辟塵爐不藏龍井西湖遊覽志六通律寺有辟塵爐非木非石叩之錚然纖塵不染魏㟲錢塘縣志既載入六通而於古蹟復次入龍井名勝之列殊屬不倫其誤則不待考也入山之路西湖泊舟入山之所類稱曰步其一茆家步見咸淳臨安志丁家山橋下武林舊事茆家步繫大麥嶺下輟耕錄作毛家步今作茆家步西湖遊覽志花家山瀕湖而登為茆家步陳善杭州府志在飲馬橋北其一赤山步見西湖遊覽志赤山由湖而陟此者近定香橋為赤山步陳善杭州府志在赤山路口其一則見陳善杭州府志在茅家步北且稱俗皆曰埠又武林舊事第六橋通耿家步港當在棲霞嶺下然不著陳善杭州府志亦無之此上三步則入山所必經矣凡遊者航湖登陸以至龍井有赤山步茅家步二道而赤山步又有二道一由支徑過小麥嶺飲馬橋與茅家步路會蓋自東而西折而西北不經大麥嶺積慶山一則經大麥嶺積慶山如卷一田汝成所記則亦自東而西又折而北然後迆西北行茅家步路過九里松臙脂嶺則先自北而南然後自東南迆西北行與赤山支徑會當其未西北行稍折而北則至天竺路也由赤山步為南山由茆家步為北山入山之路大略如此考昔人紀秦觀則云出雷峯度南屏濯足惠因澗入靈石塢得支徑上風篁嶺周必大則云出暗門上風篁嶺午飯後過長耳相院由支徑至石屋水樂洞上煙霞嶺歸休淨慈程珌則云出清波門經淨慈寺過白蓮院上風篁嶺正皆赤山步路然諸賢不由北山而南山且不由南山赤山埠入而必經南屏淨慈者蓋因出清波門陸行不及航湖若秦觀則既航湖矣又因過南山約道潛同行是以亦由此路要之北山茆家步大路也較赤山為近此路當日已有特遊者偶無記述耳如馮夢禎歷龍井還孤山詩則必由茅家步出入無疑也然周必大既至嶺寺又稱午飯後過長耳相院則當其入山初未經法相分赤山大路必經法相而與茅家步會之支徑則不經法相又知必大亦由今赤山支徑至嶺也然此支徑又非秦觀所由之支徑蓋秦觀既入靈石塢然後得之此則不經靈石靈石即積慶也昔人遊歷合之於今大略如此若乃寺門之外亦有二道一過東北則南北兩山入寺大路一稍南益上至風篁嶺巔自巔南下近江矣此路中間未及嶺顛過寺右新舊小門不一里又分一路繞今寺牆外迆西北其路在嶺巔經楊梅塢抵天竺極崎𡼲今土人謂之新開路疑天門獅子峯在焉又今由茆家步入山未至寺門嶺東又有一路從此而南則為翁家山煙霞嶺石屋諸勝此正周必大到寺以後出山之支徑矣蓋大路之外其近嶺旁達支徑可知者又如此餘論題後一卷之書不勝異議志家為甚何則其地滄海成田則今昔遷改其書成不一手則彼此參差考其異同得失而論述之匪以云辯也蓋或庶幾愚者千慮之一得跋臣孟鋗草莽微末知聞短淺於乾隆十五年叨與本省鄉解十六年辛未二十二年丁丑兩逢皇上巡幸兩浙臣以計偕春官不獲隨士民後恭迎聖駕洎居里肄業備聞我皇上恭奉大安由江入浙童叟扶攜謠頌載路於時大澤溥洋與江海俱長溫言稠疊視家人父子加暱臣每以未得與觀聽自憾二十六年皇上軫念南民特諭二十七年正月三舉南巡典禮浙之士民忭舞騰躍而臣以初未與觀聽之列今得仰覩天顏欣喜尤倍伏聞補助之餘不廢瞻眺惟浙江杭州龍井者以龍神著稱其地山水幽邃在宋為壽聖院經高僧元淨住持交遊名賢如趙抃蘇軾輩風流照暎於今未泯守土臣工躬率居民訪稽勝蹟冀留宸賞臣竊考元僧以仁撰龍井志林右敘之志久失傳故實遺闕臣因詳覈地志旁及諸家編輯龍井見聞錄十卷敬謹繕寫進呈御覽自今以往天章炳煥泉石增光萬一敕脩寺志臣書雖觕淺褊略或得比於小說家之雜識叢編聊備採擇則臣之榮幸實甚浙江嘉興府秀水縣舉人揀選知縣臣汪孟鋗恭跋宋僧元淨外傳附宋僧元淨外傳卷目卷上於潛出家之所杭州曾經住持之所流寓教祖本師禪友弟子繼起之僧龍井法嗣上天竺法嗣卷下真贊東坡集尺牘道俗依仰辯博誦咒祛邪書拒左道緣契問答寄題龍井題名元淨詩著文塔銘未刻石復書龍井題名後題名書後不入石蘇軾乞塔銘蘇軾致茶果蘇軾紀夢遺像郡紳平塔龍井得歙硯手植山茶嶺塢皆名蘇子
