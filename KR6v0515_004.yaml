body:
  text: 臣汪孟鋗恭纂鄉寓人物人物以山水以寺著者晉葛洪房喬晉書本傳葛洪字稚川丹陽句容人也祖系吳大鴻臚父悌吳平後入晉為邵陵太守洪少好學尤好神仙導養之法從祖元吳時學道得仙號葛仙公以其鍊丹術授弟子鄭隱洪就學悉得其法後師事南海太守上黨鮑元元以女妻洪洪傳元業兼綜醫術吳興太守顧秘討石冰檄洪為將兵都尉破之冰平洪不論功賞徑至洛陽欲搜求異書以廣其學避地南土參廣州刺史嵇含軍事後還鄉里禮辟皆不赴元帝為丞相辟為椽以平賊功賜爵關內侯咸和初補州主簿轉司徒掾遷諮議參軍干寶深相親友薦洪才堪國史選為散騎常侍領大著作洪固辭不就以年老求為句漏令帝以洪資高不許洪曰非欲為榮以有丹耳帝從之洪遂將子姪俱行至廣州刺史鄧嶽留不聽去洪乃至羅浮山鍊丹嶽表補東宮太守又辭不就嶽乃以洪兄子望為記室參軍在山積年優游閑養著述不輟自號抱樸子因以名書其餘所著碑誄詩賦百卷移檄章表三十卷神仙良吏隱逸集異等傳各十卷又抄五經史漢百家之言方技雜事三百一十卷金匱藥方一百卷肘後要急方四卷後忽與嶽疏云當遠行尋師剋期便發嶽得疏狼狽往別而洪坐至日中兀然若睡嶽至遂不及見時年八十一視其顏色如生世以為得仙云見咸淳臨安志詳卷一謹案葛洪鍊丹相傳如此依志載入詳卷十隋檀越陳仲寶見續高僧傳詳卷三五代吳越王錢俶五代史世家俶字文德胡進思廢倧迎俶立之歷漢周襲封吳越國王宋興荊楚相次歸命俶孤太平興國三年詔俶來朝十國春秋吳越世家俶文穆王第九子母吳氏乾祐元年即王位端拱元年追封秦國王諡曰忠懿王任太師尚書令兼中書令國王凡四十年為元帥三十五年位極富貴善始善終好吟詠有詩曰政本集崇信釋氏前後造寺無算見楊傑院記詳卷一見鄧文原閣記詳卷二謹案俶以乾祐元年嗣位咸淳臨安志稱院以乾祐二年造即在俶嗣位之二年惟是志稱居民淩霄而楊傑院記鄧文原閣記俱係吳越考十國春秋顯德元年建慧日永明院五年重創靈隱寺乾德五年建淨心院開寶五年建總持寺獨無此院又顯德二年俶詔寺院非敕額者悉廢之疑淩霄實創始於乾祐而報國看經則後來所請之敕額也存考居民淩霄見咸淳臨安志詳卷二元金應桂詳卷三夏文彥圖繪寶鑑一之號蓀壁錢塘人在宋為縣令歸附後隱風篁嶺書法歐陽率更畫學李龍眠嘗作巖居上真出塵觀音刻石周仁榮薛應旂浙江通志仁榮字本心臨海人治易春秋禮而工為文章用薦署美化書院山長士俗為變泰定初召拜國子博士遷翰林修撰其所教弟子多為名人而泰不華實為進士第一周仔肩薛應旂浙江通志仔肩字本道臨海人以春秋登延祐五年進士與其兄仁榮俱以文學名浙江通志仔肩元延祐五年戊午霍希賢榜進士婺州錄事達溥化蘇天爵滋谿文稿有答達兼善郎中書夏時正杭州府志元至大延祐間翰林待制周仁榮本心弟進士仔肩本道門人右榜進士及第達溥化兼善兄弟師友皆講學龍井山中明聞啟祥魏㟲錢塘縣志啟祥字子將博綜羣書武林東南都會江閩越之士登賢書者公車至武林必質義於啟祥品題甲乙命梨棗曰行卷制義之有行卷自啟祥始萬歷壬子舉於南雍嘗與吳郡李流芳偕計吏入京師已至忽意不自得徑趣車返後以薦被徵不赴性好延納每庀舟車飭廚傳宴會客若置驛然所著有自娛齋稿子談明亦有聲見譚元春詩詳卷二孫治靈隱寺志聞子將孝廉絕志仕進築阿西山其言語妙天下馮夢禎黃汝亨一流人也朱彝尊明詩綜引劉孝則云子將靈心慧解逈絕古今有不可一世之意早與名場非其好也又靜志居詩話杭州先有讀書社倡自子將張天生馮千秋餘杭三嚴乃入於復社而登樓繼之文必六朝詩必三唐彬彬盛矣李流芳檀園集題畫跋吾友聞子將嘗言湖上兩浮圖雷峯如老衲寶俶如美人余極賞之吳銘道明復社姓氏補錄杭州四十三人首聞啟祥謹案吳應箕復社姓氏錄有聞啟禎子有蓋啟祥昆弟浙江通志啟祥列文苑傳人物以氏著者吳褚泰咸淳臨安志泰吳封錢塘臨平侯褚氏遂為錢塘郡姓歷六朝及唐代有顯人皆其後裔晉褚陶晉書文苑傳陶字季雅吳郡錢塘人宋褚含詳下褚伯玉傳齊褚伯玉蕭子顯南齊書高逸傳伯玉字元璩吳郡錢塘人高祖含父逷徃剡居瀑布山三十餘年隔絕人物梁褚仲都褚修姚思廉梁書孝行傳修吳郡錢塘人父仲都善周易修傳父業性至孝謹案褚家坎褚莊詳見卷一據稱漢末聚族居此因取咸淳臨安志古今人表錢塘褚氏去漢未遠者自泰至修凡七人列之表又列褚玠以下七人考歐陽修宋祁新唐書宰相世系表褚氏為漢褚少孫後裔孫重居河南陽翟其孫碧徙居丹陽姚思廉陳書褚玠傳河南陽翟人玠子亮新唐書褚亮傳杭州錢塘人以非土著之褚故不列咸淳臨安志蒲橋褚家塘褚氏故居是也表又有褚無量註鹽官人且志別有褚無量故居亦不列至右科進士表又有褚南仲虎臣大防俱錢塘人然無可考人物以文著者宋趙抃托克托宋史本傳抃字閱道衢州西安人進士及第為武安軍節度推官曾公亮薦為殿中侍御史彈劾不避權倖以龍圖閣直學士知成都神宗立召知諫院及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是乎知越州盡救荒之術復徙杭以太子少保致仕而官其子屼提舉兩浙常平以便養屼奉抃徧遊諸名山吳人以為榮諡清獻與元淨倡和詩見卷二蘇軾趙抃神道碑公少孤且貧刻意力學中景祐元年進士元豐二年加太子少保致仕時年七十二子屼侍公遊杭始公自杭致仕杭人留公不得行公曰六年當復來至是適六歲矣杭人德公逆者如見父母釋惟白續傳燈錄趙抃居士繫心宗教典青州多宴坐忽大雷震驚即契悟作偈曰默坐公堂虛隱几心源不動湛若水一聲霹𮦷頂門開喚起從前自家底錢勰宋史附傳勰字穆甫彥遠子五歲日誦千言十三歲制舉之業成熙三年以廕知尉氏縣授流內銓主簿以龍圖閣直學士兩知開封吏導人訴牒至七百勰隨即剖決蘇軾乘其據案時遺之詩操筆立就以報軾曰電掃廷訟響答詩筒近所未見也與元淨倡和詩見卷七蘇軾宋史本傳軾字子瞻眉州眉山人嘉祐二年試禮部歐陽修擢冠多士熙寧中通判杭州元祐三年拜龍圖閣學士知杭州請免本路上供米浚茅山鹽橋二河以通漕以餘力復完六井又取葑田為長堤以便行者名為蘇公堤軾二十年間再莅杭有德於民家有畫像飲食必祝諡文忠與元淨交善詳見各卷蘇轍宋史本傳轍字子由年十九與兄軾同登進士科又同策制舉元祐六年拜尚書右丞進門下侍郎崇寧中蔡京當國罷祠致仕築室於許號潁濱遺老諡文定撰辯才塔碑見卷八楊傑宋史文苑傳傑字次公無為人舉進士元豐中官太常元祐中為禮部員外郎出知潤州除兩浙提點刑獄自號無為子有文集二十餘卷樂記五卷撰延恩衍慶院記及十三詩辯才真贊詳見各卷上天竺山志宋齊玉法師四十八願後序孫莘老云四方言禪者黃蘗慧林為最盛黃蘗之道次公實傳之謹案傑記以元豐八年伴高麗僧至院傑官太常時也蘇軾集有送傑詩序謂以王事而從方外之樂亦指其事秦觀宋史文苑傳觀字少游一字太虛揚州高郵人登第調定海主簿蘇軾以賢良方正薦於朝紹聖初出通判杭州御史劉拯論其增損實錄貶監處州酒稅又以謁告寫佛書為罪削秩徙雷州徽宗立放還有淮海集四十卷撰遊龍井記龍井題名詳見各卷米芾宋史文苑傳芾字元章吳人以母侍宣仁后舊恩補含光尉歷太常博士知無為軍召為書畫學博士妙於翰墨得王獻之筆意山水人物自名一家好潔成癖所為譎異無為州治有石奇醜具衣冠拜之書秦觀遊龍井記釋守一方圓庵記見卷六程珌宋史本傳珌字懷古徽州休寧人紹熙四年進士授昌化主簿改知富陽縣寧宗時遷浙西提舉常平歷官端明殿學士致仕撰遊龍井記見卷八謹案珌洺水集撰寺院記極多載之咸淳臨安志者又有勝相院記報恩光孝寺記孤山三賢堂記鄭清之宋史本傳清之字德源慶元之鄞人初名燮字文叔嘉泰進士峽州教授紹定元年遷翰林學士知制誥簽書樞密院事六年繼史彌遠為右丞相淳祐五年賜第於西湖之漁莊九年拜太師左丞相兼樞密使十一年進封齊國公致仕有安晚堂集六十卷清之與彌遠立理宗駸至宰輔然端平間召用正人清之之力也撰秦觀龍井題名跋見卷八謹案跋稱紹定己丑蓋紹定之二年清之簽書樞密院時也趙立夫宋史宗室世系表魏王廷美子廣平郡王房下彥堪子咸淳臨安志郡守表溫州人見鄭清之跋秦觀龍井題名詳卷八謹案清之跋紹定己丑京尹趙公刻秦觀記據咸淳臨安志紹定元年趙立夫以朝請大夫尚書右司郎中除太府少師兼知杭州三年易以袁韶則為立夫無疑元鄧文原宋濂元史本傳文原字善之一字匪石綿州人父漳徙錢塘在宋時以流寓試浙西魁四川士至元中行中書省辟為杭州路儒學正皇慶中為國子司業首建白更學校之政歷翰林侍講學士撰藏經閣記見卷二明林右鮑復泰台州府志右字公輔與方希直王原采為友洪武初任王府教授為文章善馳騁且喜談古今豪傑事以自況許給事廷慎嘗贈之詩云握手步雲闕示我高世文渾融脫凡近要妙幾道真公輔笑曰吾豈文士耶廷慎曰子非文士豈有經濟才如古豪傑者乎公輔曰吾非豪傑亦不願為文人也嘗代父軍役聲譽並著撰龍井志敘見卷八馮夢禎南國子祭酒馮公誌銘夢禎字開之其先高郵人徙嘉興之秀水隆慶庚午舉於鄉萬歷丁丑會試第一選庶吉士撰龍井寺復賜田記送果上人敘觀音殿勸緣述見卷八人物以祠著者宋胡則宋史本傳則字子正婺州永康人果敢有才氣以進士起家補許田縣尉調憲州錄事參軍靈夏用兵轉運使索湘命則部送芻糧為一月計則曰為百日備尚恐不支奈何為一月耶湘懼無以給遣則遂入奏太宗因問以邊策對稱旨顧左右曰州縣豈乏人命記姓名中書後李繼隆討賊久不解湘語則曰微子幾敗我事一日繼隆移文轉運使曰兵且深入糧有繼乎則告湘曰彼師老將歸欲以糧乏為辭耳姑以有餘報之已而果為則所料初丁謂舉進士客許田則厚遇之謂貴顯故則驟進用至是謂罷政事出則為京西轉運使遷禮部郎中部內民訛言相驚至遣安撫乃定坐是徙廣西路轉運使又按宜州重辟十九人為辯活者九人累遷太常少卿乾興初坐丁謂黨降知信州徙福州以右諫議大夫知杭州初則在河北殿中侍御史王㳂嘗就則假官舟販鹽至是張宗海摘發之按驗得實出知陳州踰月授工部侍郎集賢院學士劉隨上疏言則奸邪濫聞天下比命知池州不肯行以罷去遂加美職何以風勸在位後徙杭州再遷兵部侍郎致仕卒則無廉名喜交結尚風義丁謂貶崖賓客隨散落則間遣人至海上饋問如平日在福州時前守陳絳嘗延蜀人龍昌期為眾人講易得錢十萬絳既坐罪遂自成都械昌期至則破械館以賓禮出俸錢為償之咸淳臨安志顯應廟在風篁嶺龍井衍慶寺側神姓胡名則婺之永康人天聖丙寅明道癸酉嘗再守杭有惠政在郡時獨無湖患以兵部侍郎致仕葬錢塘龍井山中建炎間方寇猖獗聚永康方巖山賊夜夢紫袍金帶神人現赤幟於空中隨就剿滅朝廷褒嘉為建廟封顯應侯自後累加封其龍井賜墳賜顯應墓神之赫宣著於方巖此不悉載謹案夢粱錄在郡無江潮之患小異又以顯應廟為顯慶廟字誤武林舊事廟在墓前浙江通志雍正九年李衞重修吳之器婺書名臣傳累知州郡皆以惠理稱又嘗奏減衢婺二州丁身錢鄉人懷其德立祠祀之其在方巖者故其讀書地也肸蠁甚盛宣和中巨盜方臘寇永康民避地於此賊顧絕澗緣大藤欲度忽有赤蛇嚙藤中斷賊皆墮死又有千人坑者兩石並起百仞相去不盈尺絕頂有泉可汲賊緣間道據之其魁夢神人策白馬飲泉次日泉遂涸大懼遂降守臣以聞於朝賜祠額曰赫靈至本朝遂遍於郡境不啻千百區焉謹案西湖遊覽志稱寶元中命則長子楷通守杭州以便養考則墓誌楷通判杭州又六年而則終正當寶元二年寶元紀號誤趙抃蘇軾釋元淨趙抃蘇軾詳上釋元淨詳卷三西湖遊覽志辯才與蘇子瞻趙閱道友善後人因建三賢祠祀之謹案咸淳臨安志花家山下稱為三賢堂人物以墓著者宋胡則詳上志銘見卷八咸淳臨安志在西湖龍井廣福院之麓陳剛中咸淳臨安志在龍井山風篁嶺沙盆塢公福州福清人慷慨挺特有志事功建炎二年李易榜登第紹興戊午任太府寺丞應詔上封事主議恢復忤秦檜意同年編修官胡銓以鯁切得罪貶新州作啟賀其行有云屈膝請和知廟堂禦侮之無策張膽論事喜樞廷經遠之有人遂與張九成等七人同謫送吏部差知䖍州安遠士論惜之有詩云同日七人俱去國何時萬里許還家公至縣適有嶺寇之擾究心招撫感瘴而沒其妻子扶柩至臨安得地葬焉其後湘中著紹興正論載公出處甚詳朱文公周益公皆跋語楊翱王安石臨川集太常博士錢塘楊君夫人吳氏志銘楊君翱字翰之其子蟠問銘西湖志在龍井吳天秩夏時正杭州府志天秩字平甫杭州人杜門著書不嗜榮利以郊恩授大庾尉調浮梁有文集十五卷武林舊事在龍井西湖志平甫集不傳其題名見於南屏石屋摩崖今尚存元方茂榮詳卷九西湖志在龍井方山明陳贄唐如璉餘姚縣志贄字惟成薦為儒學訓導纂修實錄兩浙事蹟皆贄採摭稱良史才任翰林待詔陞廣東參議遷太常少卿致仕投老西湖與騷人墨客為詩酒會程敏政篁墩集西湖百詠倡和詩敘太常會稽陳惟成博學多才尤長於詩其致政而歸也樂錢塘山水之勝日與名公碩彥往來西湖之上得宋季董靜傳西湖百詠和之好事者爭相傳誦焉夏時正杭州府志在風篁嶺龍井山子右通政嘉猷祔陳善杭州府志贄本餘姚人愛錢塘山水之勝構別業於武林城北及卒特賜酒以榮之所著有自怡容臺諸稿吳誠徐象梅兩浙名賢錄誠字尚忠錢塘人景泰辛未進士西湖志張弼吳公志銘交趾弄兵公巡撫雲南奮擊賊眾卒於官黔國公遣官歸櫬於鄉賜祭葬如禮在龍井山之風篁嶺謹案陳善杭州府志在五子嶺成化二十三年諭葬志銘足正其訛李昂浙江通志昂字文舉仁和人景泰甲戌進士成化間出知青州屬歲饑發廩以濟活民二十餘萬民列其治行三十四事立祠表海亭歷官都察院副都御史兩廣江右湖湘閩浙羣盜竊發親入賊巢斬獲萬計改督漕運開河濬源卒賜祭葬大司馬華容劉大夏表其墓陳善杭州府志在風篁嶺下汪諧浙江通志諧字伯諧仁和人天順庚辰進士授編修以禮部右侍郎兼學士乞休贈尚書陳善杭州府志在龍井宏治十三年諭葬子太常卿舉祔嘉靖六年諭葬沈銳浙江通志銳字文進仁和人成化己丑進士授刑部主事以南京刑部右侍郎乞歸值劉瑾摘往事以誣士大夫之不附己者遂落職嘉靖初乃復魏㟲錢塘縣志在龍井陳珂浙江通志珂字希白錢塘人宏治庚戌進士授刑部主事歷都察院副都御史巡撫河南剿平流賊徐郁等正德十年為大理寺正卿陳善杭州府志在龍井嘉靖十一年諭葬謹案浙江通志以珂為琦誤許嶽武林怡老會詩集嶽字子峻仕為南京工部主事歷員外郎中直隸常州廣西柳州梧州知府以副使致仕西湖志在風篁嶺沈瑞臨浙江通志瑞臨字夢錫萬歷丁丑進士授行人司正奉命冊封餽遺悉絕由南京工部郎中備兵川東時楊應龍煽動瑞臨練兵訓武終任應龍不敢叛以母老終養杜門斂迹精研濂洛關閩之書著易義十卷經解二十卷學者稱曰約齋先生魏㟲錢塘縣志在龍井劉安山謹案地志無劉安山之名冠以龍井必與龍井相近之山也疑以劉庵致誤武林舊事劉婉容攢所可証今風篁嶺西有劉安山錢夢龍魏㟲錢塘縣志在風篁嶺邳州同知費鏞浙江通志邵經邦處士費西村志銘鏞字鳴遠西湖志在龍井張伯元浙江通志處士伯元七月孤事母孝好學守禮魏㟲錢塘縣志在老龍井謹案浙江通志吳誠介節傳沈銳陳珂名臣傳沈瑞臨儒林傳陳贄下註傳見文苑而傳無之費鏞張伯元並題曰處士國朝沈堯章浙江通志堯章字佩彝仁和人瑞臨曾孫崇禎丙子舉於鄉正身端拱嘗慕范希文著先憂後樂論以見志趙世安仁和縣志順治中選臨海縣教諭兄堯年亦善文魏㟲錢塘縣志在錢塘龍井謹案歷朝浙江題名錄崇禎九年中式八十三名沈堯章錢塘縣附學生習易經浙江通志仁和人非是關大生魏㟲錢塘縣志在龍井風篁嶺鍵父贈知縣王一奇魏㟲錢塘縣志在雞籠山夏德昌魏㟲錢塘縣志在龍井金鐘山謹案魏㟲錢塘縣志王一奇夏德昌並題處士王起彪西湖志李之芳表忠錄集王虎子名起彪以春秋成進士授德興令三月化行而鄰封寇起討之不克罵賊而死魏㟲錢塘縣志在龍井風篁嶺學使王掞題曰異烈孤忠謹案謝旻江西通志王起彪錢塘人順治丁亥進士戊子授德興縣值金逆變起彪隨營次半載己丑江西平就任時餘蘖鄰邑董三等賊擁眾猝至起彪率民兵守之寡不敵眾被執於天君廟脅降不屈遂遇害雍正六年詔賜廟祀附識於此鄉寓人物題後地以人而傳假其名焉爾釋子以士夫而傳資其力焉爾自吳晉迄今姓氏爵里事蹟詳具羣籍洵夫山靈佛法與有光榮者也
