front:
  text: 龍井位於浙江杭州西湖南山南山源自天目山南山中有一主山曰風篁嶺嶺之巔有天池曰龍井今之龍井位於風篁嶺前宋時龍井位於嶺後在今龍井之上故名老龍井龍井本名龍泓一名龍泉世傳吳赤烏中葛洪鍊丹於此其地山水幽邃以龍神著稱相傳有龍在焉觸石為雲禱者皆應因建龍祠其地乃稱龍井此地又以茶名清馥雋永享有盛譽隋開皇十四年五九四真觀法師與道安禪師頭陀石室檀越陳仲寶等於此構立精舍曰崇恩演福寺乾祐二年九四九重建曰報國看經院熙寧中改壽聖院紹興三十一年一一六一改廣福院淳祐六年一二四六改延恩衍慶院俗稱龍井寺明弘治中洪水泛濫遂廢萬曆二十三年一五九五重修清康熙間僧一泓重葺北宋有高僧元淨住持元淨交游名賢與趙抃蘇軾輩相唱和風流照映於今未泯寺因以揚名元僧以仁嘗撰龍井志志久失傳故實遺闕清乾隆間浙江秀水汪孟鋗因詳核地志旁及正史文集一五二種纂次為龍井見聞録十卷分為十門山水古蹟名僧鄉寓人物物産碑刻書畫詩文軼聞餘論復以其事不涉龍井而關元淨者纂為宋僧元淨外傳二卷以附之所採資料皆録原文冠以書名先地志後諸家各以時代為先後間附考證體例明晰其中山水所以記形勝古蹟所以記建置名僧所以記高僧住持物産所以記産物碑刻書畫詩文所以記藝文軼聞與餘論所以考雜事舊聞也是録實為龍井寺而作也故先纂輯名僧後志鄉寓人物諸卷先後亦準此例因列為佛寺志書之一兹據清光緒十年一八八四錢塘嘉惠堂丁氏刋本景印恭録御製詩二首乾隆十六年辛未聖駕南巡幸天竺覽鄉民採茶製焙之法御製觀採茶作歌火前嫩火後老惟有騎火品最好西湖龍井舊擅名適來試一觀其道村男接踵下層椒傾筐雀舌還鷹爪地爐文火續續添乾釜柔風旋旋炒漫炒細焙有次第辛苦功夫殊不少王肅酪奴惜不知陸羽茶經太精討我雖貢茗未求佳防微猶恐開奇巧防微猶恐開奇巧採茶朅覽民艱曉二十二年丁丑聖駕南巡幸雲棲御製觀採茶作歌前日採茶我不喜率緣供覽官經理今日採茶我愛觀吳民生計勤自然雲棲取近跋山路都非吏備清蹕處無事回避出採茶相將男婦實勞劬叶嫩莢新芽細撥挑趁忙穀雨臨明朝雨前價貴雨後賤民間觸目陳鳴鑣由來貴誠不貴僞嗟哉老幼赴時意弊衣糲食曾不敷龍團鳳餅真無味臣孟鋗恭稽南巡盛典伏讀乾隆十六年御製觀採茶作歌詩中語及龍井又伏讀二十二年御製觀採茶作歌詩中有雲棲取近跋山路之句臣聞皇上再巡之歲雖未幸龍井而駕幸雲棲由風篁嶺南下經九溪十八澗御製詩云雲棲取近跋山路以此臣孟鋗既敬謹録登卷首乃復拜手稽首集經語而系以頌曰帝省其山詩大雅自南自北詩大雅幽幽南山詩小雅井泄不食易下經是興神物易上繫辭龍見而雩春秋左氏傳桓公五年陟則在巘詩大雅馬不契需周禮冬官有嘉樹焉春秋左氏傳昭公二年為蒼筤竹易說卦傳庶草蕃廡書洪範終朝采緑詩小雅維葉萋萋詩周南女執懿筐詩豳風帝庸作歌書益稷黼黻文章禮記月令高山仰止詩小雅山夾水澗爾雅釋山繩其祖武詩大雅倬彼雲漢詩大雅謹案御覽西湖志纂五雲山雲棲寺聖祖仁皇帝凡四幸焉率西水滸詩大雅南入於江書禹貢視遠如邇春秋左氏傳昭公元年至於海邦詩魯頌政在養民書大禹謨無射亦保詩大雅觀乎天文易上經光被四表書堯典浙江嘉興府秀水縣舉人揀選知縣臣汪孟鋗恭進龍井圖說謹案龍井在南山之北其嶺曰風篁自風篁嶺以上為獅子峯更上為天門山天門山在北高峯後為南北兩山之祖自龍井論則嶺居寺之西北圖於南列南高峯於北不列北高峯者以天門山見之嶺南之烟霞石屋不列則以翁家山統之也大小麥嶺丁家山本在西北花家山亦近茆家步而圖稍南者限於尺幅為澗橋留餘地也馬鞍山從舊志名螺螄山不從舊志名碧螺峯者以螺螄之為碧螺志無實證也劉安山地志不具積慶山在仙姑西南蓋皆靈竺之後山也不詳茆家步一路者龍井屬南山故詳南而略北也其上嶺出山大小徑路大略附見餘詳卷一山水卷十餘論龍井見聞録徵引書目梁蕭子顯南齊書唐姚思廉梁書姚思廉陳書房喬晉書李吉甫元和郡縣志釋道宣續高僧傳柳宗元河東集陸羽茶經宋歐陽修宋祁新唐書歐陽修新五代史司馬光資治通鑑樂史太平寰宇記潛說友咸淳臨安志周密武林舊事吳自牧夢粱録祝穆方輿勝覽釋贊寧宋高僧傳釋道源景德傳燈録釋惟白續傳燈録釋元敬元復武林西湖高僧事略釋惠洪林間録傅牧西湖古蹟事實周必大二老堂雜志釋道潛參寥子集釋居簡北澗集林逋和靖集范仲淹文正集蘇軾東坡集施元之蘇詩注蘇轍欒城集王安石臨川集韋驤錢塘集曾鞏元豐類稿秦觀淮海集朝公遡嵩山居士集郭祥正青山集周紫芝太倉稊米集姜夔白石詩集鄒浩道鄉集程珌洺水集敖陶孫臞翁詩集周必大平園集葉紹翁靖逸小稿樓鑰攻愧集蘇籀雙溪集鄭清之安晚堂集周文璞方泉集周弼汶陽端平詩雋謝翱晞髮集董嗣杲西湖百詠葛天民無懷小集姚鉉唐文粹陳起聖宋高僧詩選沈括夢溪筆談趙葵葦杭紀談元托克托宋史釋念常佛祖通載釋覺岸釋氏稽古略虞集道園學古録柳貫待制集王惲秋澗集黃溍文獻集蘇天爵滋溪文稿鄧文原素履齊稿張昱可閒老人集張雨句曲外史集成廷圭居竹軒集張翥蛻庵集王逢梧溪集楊維楨等西湖竹枝詞釋善住谷響集釋圓至筠溪牧潛集馬臻霞外詩集陳世隆宋詩補遺夏文彥圖繪寶鑑鄧椿畫鑑湯垕畫鑑李衎竹譜詳録明宋濂元史李賢等明一統志夏時正杭州府志薛應旗浙江通志田汝成西湖遊覽志陳善杭州府志聶心湯錢塘縣志馬汝礪盱眙縣志吳瓚武林紀事袁宏道石公集張京元西湖小記沈儀兩湖麈談録吳之鯨武林梵志吳本泰西溪梵隱志白琳靈隱寺志釋大壑淨慈寺志釋傳燈天台山方外志宋濂學士集林右公輔集徐一夔始豐稿王圻續文獻通考唐之淳萍居稿夏時湖山勝概記孫一元太白山人稿姚綬穀菴集方九敘十洲集祝時泰等西湖八社詩帖吳寬家藏集夏錫祚雪鴻堂詩草賀燦然五欲軒集王稚登客越志馮夢禎快雪堂集屠隆緯真詩集談元春嶽歸堂集傅巖花巢詩武林怡老會詩集李流芳檀園集田藝蘅煮泉小品董其昌畫禪室隨筆文震亨長物志安世鳳墨林快事郎瑛七修類稿徐𤊹榕陰新檢孫克宏碑目吳應箕復社姓氏録歷朝浙江題名録國朝御定廣羣芳譜康熙四十七年敕修浙江通志雍正十三年康熙督撫臣彚修浙江通志二十一年御覽西湖志纂乾隆十六年李衛西湖志魏㟲錢塘縣志趙世安仁和縣志趙之珩於潛縣志唐如璉餘姚縣志胡承謀湖州府志鮑復泰台州府志吳之器婺書孫治靈隱寺志釋廣賓上天竺山志張遂辰湖上編陸次雲湖壖雜記吳任臣十國春秋徐象梅兩浙名賢録謝旻江西通志顧祖禹方輿紀要朱彝尊曝書亭集查慎行敬業堂集厲鶚樊榭山房詩集朱彝尊明詩綜馮景蘇詩續補遺查慎行補注東坡編年詩谷應泰博物要覽吳銘道明復社姓氏補録龍井見聞録凡例杭州龍井北宋始著乾隆辛未丁丑恭逢聖駕南巡龍井未經臨幸伏讀御製觀採茶歌二首敬謹録登卷首以為山靈佛法之慶語關祖宗皇上國家者謹分別跳行書標題頂格者跳行書分別出格南山之北輒稱龍井山水一門期於貫串源委旁及嶺左右山水要不敢闌入他處以混界域焉寺則不在此例浙西士民望幸誠切龍井名勝所在佇邀宸顧並乞璇題即如匹練插劒二瀑布皆在昔未經開闢之勝録名見聞不敢曰志新增勝境概未詳列誠以翠華南來山川競秀從此標新領異非草莽小臣所敢次第也録為寺作故先名僧後鄉寓人物諸卷先後並準此郡邑志書名賢接踵則有人物一門龍井地處僻仄惟關繫寺院興廢者載之而以祠墓諸賢繫人物塔繫僧仍省去祠墓一門亦稍變成例者也詩文各附注標題之下詩之為遊觀贈答作者文之無題可繫者並各自為卷詩文見本集者不注有本集不載而見地志及他書者必注明參考同異以謹案別之附於諸家之後地志前列小敘其例舊矣今所傳宋人志如宋敏求長安志羅願新安志潛說友咸淳臨安志史能之咸淳毗陵志張元成嘉禾志陳耆卿赤城志皆同康熙中儀徵縣知縣陸師撰縣志用山海經郭璞注贊例每卷後附贊一首而卷前仍列小敘茲録謹刪去小敘易贊為題後蓋酌用其例焉採登書籍每條必冠以本書之名既不敢沒所自來亦因以著厯代先後諸家異同之故有未見原書者則必注明某書徵引字樣其次第則先地志次諸家仍各以時代為先後龍井以元淨興創得名其有事關元淨不涉龍井者割棄之則未免舊聞放失別為元淨外傳附見聞録之後臣汪孟鋗恭識龍井見聞録卷目山水卷一總敘山脈主山近嶺諸山風篁嶺四至水源近井諸水雜地名寺內外古蹟卷二歷代興建附寺址所在古蹟見咸淳臨安志者十七古蹟雜見傳記者十二古蹟不屬僧寺者三地志諸書所未詳者二名僧卷三開山僧說法僧住山僧僧塔可考者鄉寓人物卷四人物以山水以寺著者人物以氏著者人物以文著者人物以祠著者人物以墓著者物産卷五泉品二竹品一花品二茶品一附茶真贋優劣果品一藥品二鱗屬一碑刻書畫卷六碑之重刻者三原碑存者十一碑文見咸淳臨安志者八碑文見西湖志者二碑文見東坡集者一碑文見快雪堂集者一碑見文獻集文缺者一碑見府志文缺者二碑見縣志文缺者一書之可考者十一畫之可考者五古今體詩卷七名僧詩名賢詩文卷八名僧文名賢文軼聞卷九孝宗行幸咸澤機鋒元淨道潛優劣兩參寥兩辨才智月文捷胡則胡則永康方巖廟記虞集題陳述古詩三賢堂碁盤石映山片雲石龍口瀉水徐村翁家山葛井水與龍井伯仲記西湖登覽南山遊約遊龍井烹茶遊老龍井得茶玉岑詩社水漲陳剛中張伯雨瑞芝孫隆施捨演福寺餘論卷十南天竺當屬龍井一路宋時寺在嶺背今老龍井即當日龍井小龍井徑山龍井浙江龍井不一葛洪鍊丹處不足信封篁與龍井聯屬諸山水寺院九溪十八澗通江不滙龍井三獅子峯復一三茯苓泉誤兩君子泉兩噴月泉一地兩名寺名先後重出龍井演福為一他寺併歸演福亦稱龍井普澤院演福僧禪教互易魏㟲錢塘縣志舛復夢粱録因襲詩文編録之誤趙抃詩不見本集元淨著述元淨詩入蘇軾集元淨詩誤入蘇軾集名媛詩婦人中官附著三賢祠塑像海棠顯應廟有三於潛三賢祠兩元淨四辨才蘇軾戲問辨才師墨蹟辟塵爐不藏龍井入山之路
