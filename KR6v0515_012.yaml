body:
  text: 臣汪孟鋗恭纂卷下真贊咸淳臨安志趙抃贊師去天竺山空鬼哭天竺師歸道場光輝大士大悲師實焉依師乎真乎真金琉璃教宗智者法嗣韶師須彌有壞至道無為稽首慈相仰之贊之皆無妙幻豈勝言思東坡集贊余頃年嘗聞妙法於辨才老師今見其畫像乃以所聞者贊之即之浮雲無窮去之明月皆同欲知明月所在在汝唾霧之中咸淳臨安志楊傑贊月白風清雲閒水淥犀柄金爐寄天竺老龍頭角縮寒巖膏雨人間霑足東坡集尺牘久不奉書愧仰增深比日切惟法履佳休某忝冒過分碌碌無補日望東南一郡庶幾臨老復聞法音尚冀以時為衆自愛以下俱翰林某向與兒子竺僧名逮於觀音前剃落權寄緇褐去歲明堂恩已奏授承務郎謹與買得度牒一道以贖此子今附趙君齎納取老師意剃度一人仍告於觀音前略祝願過悚息悚息某少有微願須至仰煩切料慈照必不見罪某與舍弟某捐納乙百匹奉為先君霸州文安縣主簿纍贈中大夫先妣武昌郡太君程氏造地藏菩薩一尊併座及侍者二人菩薩身之大小如中形人所費盡以此絹而已若錢少即省鏤刻之工可也乞為指揮選匠便造造成示及專求便船迎取欲京師寺中供養也煩勞神用愧悚不已某啓法孫至領手教纍幅伏承道體安康以慰下情前此所惠書信皆領無狀每荷存記感怍亡已真贊更煩刻石甚愧不稱維摩贊近杜介刻脫卻數字好笑好笑唯金山石本乃是也信口妄語便蒙印可罪過罪過聞老師益健更乞倍加愛重且為東南道俗歸依也某衰病不復有功名意此去且勉歲月才得箇退縮方便即歸常州住也更告法師為禱諸聖令早得歸為幸此是真切之意勿令人知將為虛僞迫行冗中不宣杭州還朝某啓別來思仰日深比來道體何如某幸於鬧中抽頭得此閒郡雖未能超然遠引亦退老之漸也思企吳越諸道友江山之勝不去心或更送老請會稽一次老師必能為此一郡道侶少留山中勿便歸安養不肖更得少接清遊何幸如之惟千萬保重不宣以下俱潁州近日百事懶廢寢食之外頽然而已寫此數紙書一似小兒逃學來人催迫日推一日相知惠書皆不能答如相怪且為道此意老病不足責也道俗依仰東坡集杭州與大覺禪師書某啓奉別二十五年幾一世矣會見無時此懷可知到此欲奉書因循至今辱書具審起居安隱南方耆舊雕落惟明有老師杭有辨才道俗所共依仰蓋一時盛事比來時得從辨才遊老病昏塞頗有所警發恨不得一見老師更與鑽磨也歲暮山中苦寒千萬為衆自重不宣辨博始豐稿西嶺草堂續記古之桑門上首積行纍業蜚聲一時名垂後世蓋亦不鮮以錢塘言若聖達觀之神異辨才淨之辨博孤山圓之孤峻咸所宜慕者誦咒祛邪淮海集記龍井辨才事熙寧九年秀州嘉興縣令陶彖有子得疾甚異形色笑語非復平人令患之乃大出錢財聘謁巫祝厭勝百方終莫能治是歲辨才法師元淨適以事至秀法師高僧也隱於錢塘之天竺山傳天台教學者數百人又特善咒水疾病者飲其所咒水輒愈吳人尊事之令素聞其名即馳詣師具狀告曰兒始得疾時見一女子自外來相調笑久之俱去稍行至水濱遺詩曰生為木卯人死作幽獨鬼泉門長夜開衾幃待君至自是屢來且有言曰仲冬之月二七之間月盈之夕車馬來迎今去妖期逼矣未知所處願賜哀憐師乃許諾因杖策從至其家除地為壇設觀音像於中央取楊枝霑水灑而咒之三繞壇而去是夜兒寢安然不復如他時矣明日復來結跏趺座引兒問曰汝居何地而來至此答曰會稽之東卞山之陽是吾之宅古木蒼蒼師又問汝姓誰氏答曰吳王山上無人處幾度臨風學舞腰師曰汝柳姓乎乃囅然而笑師良久呵曰汝無始已來迷己逐物為物所轉溺於淫邪流浪千劫不自解脫入魔趣中橫生災害延及無辜汝今當知魔耶非魔魔即法界我今為汝宣說首楞嚴祕密神咒汝當諦聽痛自悔恨訟既往過愆返本來清淨覺性於是號泣不復有云是夜謂兒曰辨才之功汝父之虔無以加焉吾將去矣後二日復來曰久與子遊情不能遽捨願一舉觴為別因相對引滿既罷作詩一章曰仲冬二七是良時江下無緣與子期今日臨歧一杯酒共君千里遠相離遂去不復見余聞其事久矣元豐二年見辨才於龍井山問之信然書拒左道釋惠洪林間録杭州上天竺法師辨才悟法華三昧有至行宏天台教稱第一東吳講者宗尚之秀州有狂人號回頭左道以鼓俗流宣言當建窣堵坡為吳人福田施者雲委然憚入杭境以辨才不可欺故也不得已既來先以錢十萬詣上天竺飯僧且遣使通問曰今以修造錢若干願供僧一堂淨答其書曰道風遠來山川增勝誨言先至喜慰可量承以營建淨壇為飯僧之用竊聞教有明文不許互用聖者已遺明誨不知白佛當何以辭佇聞報章即令撰疏文也狂人大驚慚見其徒然淨之門弟子亦勸且禮之以化俗淨厲聲曰出家兒須具眼始得彼誠聖者吾敢不恭如其誕妄知而同之是失正念吾聞聖者具他心通今夕當與爾曹虔請於明日就此山與十方諸佛同齊即法法嚴敬跪讀疏文焚之明日率衆出迎而所謂狂人者竟不至學者皆服緣契東坡集跋舊與辨才書軾生平與辨才道眼相照之外緣契冥符者多矣始以五年九月三十日入山相對終日留此數紙明年此日在潁州作書與之有少留山中勿便歸安養之語而師實以是日化去又明年其徒惟楚攜此軸來為一太息五月十一日書問答上天竺山志東坡一日禮大士見座前普門品袖手展讀云咒詛諸毒藥所欲害身者念彼觀音力還著與本人東坡喟然嘆曰佛自仁心豈有免人之一難而害人之一命乎是亦去彼及此與夫不愛人者何異也我體佛之意而改正之曰咒詛諸毒藥所欲害身者念彼觀音力兩家都沒事問辨才曰何如辨才笑而不答謹案東坡集東坡居士曰觀音慈悲者也今人遭咒詛念觀音之力而使還著與本人則豈觀音之心哉今改之云云其文不同不言與辨才問答寄題龍井題名東坡集題秦太虛龍井題名記覽太虛題名皆余昔時遊行處閉目想之了然可數始余與辨才別五年乃自徐州遷於湖至高郵見太虛參寥遂載與俱辨才聞余至欲扁舟相過以結夏未果太虛參寥又相與適越云秋盡當還而余倉卒去郡遂不復見明年余謫居黃州辨才參寥遣人致問且以題名相示時去中秋不十日秋潦方漲水面千里月出房心間風露浩然所居去江無十步獨與兒子邁棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天因録以寄參寥使以示辨才有便至高郵亦可録以示太虛也元淨詩東坡集書辨才次韻參寥詩辨才作此詩時年八十一矣平生不學作詩如風吹水自成文理而參寥與吾輩詩乃如巧人織繡耳上天竺山志東坡過上天竺謁辨才款語間因言窗前兩松昨為風折一枝悵悵成一聯竟未得續其後舉以示公云龍枝已逐風雷變減卻虛窗半日涼坡續云天愛禪心圓且潔故添明月伴清光著文天台山方外志圓事理說辨才淨師撰謹案此說本見蘇轍辨才碑又碑稱示寂時出偈告衆楊傑記又云元淨與趙抃倡酬偈頌蓋俱失傳傳者惟心師銘一首而已塔銘未刻石東坡集惠州與參寥書海月真贊許他二十餘年矣因循不作因來諭輒為之不及作慧淨書幸付與此本也表忠觀記及辨才塔銘後來不見入石必是僕與舍弟得罪人未敢便刻也此真贊更請參寥相度如未可且與藏公處也復書龍井題名後東坡集跋太虛辨才廬山題名某與大覺禪師別十九年矣禪師脫屣當世雲棲海上謂不復見記乃爾拳拳耶撫卷太息欲一見之恐不可復得會與參寥師自廬山之陽並出而東所至皆禪師舊迹山中人多能言之者乃復書太虛與辨才題名之後以遺參寥太虛今年三十六參寥四十二某四十九辨才七十四禪師七十六矣此吾五人者當復相從乎生者可以一笑死者可以一嘆也元豐七年五月十九日慧日院大雨中書謹案蘇轍辨才碑元淨以元祐六年示寂年八十一逆計元豐七年正七十四而俗本題跋作四十七誤甚今從東坡集正之然此段乃跋太覺禪師廬山題名而刊集者題為跋太虛辨才廬山題名亦誤大覺住四明阿育王寺見蘇軾與寶覺禪老書軾又嘗為大覺撰鼎銘宸奎閣記宸奎閣者仁宗賜大覺偈頌記稱廬山僧懷璉皇祐中賜號大覺亦見與寶覺書題名書後不入石東坡集黃州與參寥書聰師相別五六年不謂便爾長進詩語筆蹤皆可畏遂為名僧法足非特巧慧而已又聞今年剃度可喜太虛只在高郵近舍弟過彼相見亦有書來題名絶奇辨才要書其後復寄一紙去然不須入石也黃州絶無所産又窘乏殊甚好便不能寄信物去只有布一匹作臥單懷悚懷悚蘇軾乞塔銘欒城集辨才碑子瞻謂辨才徒曰我固知師矣余弟子由知師不在我後我為汝請轍以公命不敢辭又天竺海月法師塔碑餘杭天竺有二大士一曰海月一曰辨才皆事明智韶法師以講說作佛事而心悟最上乘不為講說所縛吳越多禪衆聞其言者皆曰說教如是是亦禪也故吳越之人歸之與佛菩薩無異熙寧中余兄子瞻通守餘杭從二公遊敬之如師友後余與子瞻皆自嶺外得歸而子瞻終於毗陵餘杭參寥師弔余潁川既而曰辨才以子瞻故得銘於公海月獨未有銘公以子瞻其亦勿辭余亦許之今住天竺德賢師實公之高弟以銘授之俾刻之石銘曰佛本說一乘無二亦無三空洞無一物應物無不在欲以是教人人或不能信以其不信故故示以方便方便皆是幻是惠為真實有方便惠解無方便惠縛有惠方便解無惠方便縛惟惠惟方便更相為縛解縛脫解亦除然後至佛乘智者古智人具惠與方便示人西方觀其實則是幻由幻而得佛於以度衆生會歸於一乘何者非佛法海月辨才師智者之孫曾由教而得禪皆僧中第一我不識其面知其心中事作銘書塔石二公知其然上天竺山志東坡乞辨才塔碑於黃門與書曰兄自覺談佛不如弟及黃門作海月塔碑以東坡與之遊故云我不識師面知師心中事惜乎火失其書翰也蘇軾致茶果東坡集潁川與參寥書兩得手書具審法體佳勝辨才遂化去雖來去本無而情鍾我輩不免悽愴也今有奠文一首并銀二兩託為致茶果一奠之潁師得書且喜進道紙尾待得閒寫去餘惟萬萬自重又文曰孔老異門儒釋分宮又於其間禪律相攻我見大海西北南東江河雖殊其至則同雖大法師自戒定通律無持破垢淨皆空講無辨訥事理皆融如不動山如常撞鐘如一月水如萬竅風八十一年生雖有終遇物而應施則無窮我初適吳尚見五公講有辨臻禪有璉嵩後二十年獨餘此翁今又往矣後生誰宗道俗欷歔山澤改容誰持一杯往弔井龍我去杭時白叟黃童要我復來已許於中山無此老去將安從噫參寥子往奠必躬豈無他人莫寫我胸蘇軾紀夢東坡集海月辨公真贊并引錢塘佛者之盛蓋甲天下道德才智之士與夫妄庸巧僞之人雜處其間號為難齊故於僧職正副之外別補都僧正一員簿帳案牒奔走將迎之勞專責正副以下而都司總領要略實以行解表衆而已然亦通號為僧官故高舉遠引山棲絶俗之士不屑為之惟清通端雅外涉世而中遺物者乃任其事蓋亦難矣余通守錢塘時海月大師惠辨者實在此位神宇澄穆不見慍喜而緇素悅服余固喜從之遊時東南多事吏治少暇而余方年壯氣盛不安厥官每往見師清座相對時聞一言則百憂冰解形神俱泰因悟莊周所言東郭順子之為人人貌而天虛緣而葆真清而容物物無道正容以悟之使人之意也消蓋師之謂也與一日師臥疾使人請余入山適有所未暇旬餘乃往則師之化四日矣遺言須余至乃闔棺趺坐如生頂尚溫也余在杭州夢至西湖上有大殿榜曰彌勒下生而故人辨才海月之流皆行道其間師沒後二十一年余謫居惠州天竺淨惠師屬參寥子以書遺余曰檀越許與海月作真贊久不償此願何也余矍然而起為說贊曰人皆趨世出世者誰人皆遺世世誰為之爰有大士處此兩間非濁非清非律非禪惟是海月都司之式庶復見之衆縛自脫我夢西湖天宮化城見兩天竺宛如平生雲披月滿遺像在此誰其贊之惟東坡子遺像東坡集書贈劉浙僧到杭一遊龍井謁辨才遺像仍持密雲團為獻龍井孤山下有石室室前有六一泉白而甘當往一酌湖上壽星院竹極偉其旁智果院有參寥泉及新泉皆甘冷異常當特往一酌仍尋參寥子妙聰師之遺跡見潁沙彌亦當致意靈隱寺後高峯塔一上五里上有僧不下三十餘年矣不知今在否亦可一往元符二年五月十六日東坡居士書郡紳平塔上天竺山志辨才法師骨塔在老龍井山中萬歷間村鄰父老傳為郡紳李某平之龍井得歙硯蘇詩續補遺偶於龍井辨才處得歙硯甚奇詩馮景注硯譜玉兔朝元硯此為細羅紋刷絲歙石圓徑六寸高寸五分面有葱色兔月二像巧若畫成更無凹凸真五代前物也旁刻建中靖國元年改製下刻篆書一卷石兮呈祥俾翰林兮增光出煨燼兮不敗伊蘇氏兮其昌張九成識又二行子子孫孫永古用之案蘇氏其昌豈即先生辨才處所得硯與又先生倣毛穎戲作萬石君傳云羅紋歙人也其上世嘗隱龍尾山手植山茶上天竺山志辨才法師手植千葉山茶二本在白雲堂下雪液池上自宋歷元柯葉暢茂有呵護謹案志又載釋道衍雪液池詩注云上有辨才手植山茶今無則明初人已不及見矣嶺塢皆名蘇子上天竺山志梯子嶺一名蘇子嶺在華嚴塢嶺由東坡與辨才得名又華嚴塢俗呼心安塢以谷中為心安房也今深處有華嚴山居本名蘇子塢相傳東坡辨才嘗優游於此宋僧元淨外傳跋宋僧元淨嘗住上天竺龍井其退院也沈遘請天竺易禪為教意問答機鋒足罄南山之竹而宋釋惟白續傳燈録明瞿汝稷指月録一無所載所作偈頌亦復不傳獨魏㟲錢塘縣志經籍載集一卷西湖志亦謂與趙抃倡酬詩見本集然今亦未之見也傳元淨者有咸淳臨安志諸書率以碑銘為本少所潤益臣因編輯見聞録之次雜取載記元淨事蹟釐為外傳二卷每條加以標題不敢聯屬成文致失原書面目大抵蘇軾集居十之六七考軾仕杭樂交方外惠辨道潛了元仲殊思聰惠勤惠思清順可久宗本善本之流不可悉數而盛稱元淨與四明懷璉為道俗所仰道潛詩亦以元淨懷璉惠辨為大導師其高風淨行殆可想見仰惟睿鑒周宣考求故實如因龍井而及元淨則兹外傳之附見聞録後或希節取焉乾隆二十七年上元臣汪孟鋗熏沐敬書
