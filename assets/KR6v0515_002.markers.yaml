  - {type: variant, offset: 1848, length: 219, content: 吾佛亦如之。使吾黨祝髮以圓其頂、壞色以方其袍，乃欲其煩惱盡而理體圓、定慧修而德相顯也。蓋溺於理而不達於事、迷於事而不明於理者，皆不可謂之沙門。以制禮樂、為衣裳，至於舟車、器械、宮室之為，皆則而象之。故儒者冠圓冠以知天時，履句屨以知地形。蓋蔽於天而不知人、蔽於人而不知天者，皆不可謂之真儒矣。唯能通天、地、人者，真儒矣！唯能理事一如、向無異觀者，其真沙門歟！噫，人之處乎覆載之內，陶乎教化之中，具其形，服其服，用其器，而於其居也特不然哉？吾所以為是庵也，然則吾直以是為蘧廬爾。若夫以法性之圓、事相之方而規矩一切，則, 志彙: ''}
